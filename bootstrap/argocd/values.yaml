global:
  namespace: argocd
  clusterServer: https://kubernetes.default.svc

argocd:
  server:
    insecure: true

ingress:
  enabled: false
  className: cilium
  host: argocd.cluster.local
  tls:
    enabled: false
  annotations: {}

applications:
  platformServices:
    enabled: true
  landingZones:
    enabled: true

  
repos:
  - name: gitops
    project: bootstrap
    type: git
    url: https://github.com/jellebens/gitops.git
    targetRevision: main