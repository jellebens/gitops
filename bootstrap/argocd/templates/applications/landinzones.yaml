{{- if .Values.applications.landingZones.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: landing-zones
  namespace: {{ .Values.global.namespace }} 
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: bootstrap
  source:
    repoURL: https://github.com/jellebens/gitops.git
    targetRevision: main
    path: landing-zones
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}