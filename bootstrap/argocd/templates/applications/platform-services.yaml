{{- if .Values.applications.platformServices.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-services
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/jellebens/gitops.git
        revision: main
        directories:
          - path: platform-services/*
  template:
    metadata:
      name: 'platform-{{`{{ .path.basenameNormalized }}`}}'
    spec:
      project: bootstrap
      source:
        repoURL: https://github.com/jellebens/gitops.git
        targetRevision: main
        path: '{{`{{ .path.path }}`}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{`{{ .path.basenameNormalized }}`}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
{{- end }}