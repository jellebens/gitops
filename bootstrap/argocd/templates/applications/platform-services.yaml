{{- if .Values.applications.platformServices.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-services
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform-services
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/jellebens/gitops.git
        revision: main
        directories:
          - path: platform-services/**/*.yaml
  template:
    annotations:
      argocd.argoproj.io/sync-wave: "5"
    metadata:
      name: '{{`{{ .name }}`}}'
    spec:
      project: '{{`{{ .project }}`}}'
      source:
        repoURL: https://github.com/jellebens/gitops.git
        targetRevision: main
        path: '{{`{{ .path }}`}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{`{{ .namespace }}`}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
{{- end }}