# OpenClaw lab overrides.
# Defaults from landingzones/openclaw/values.yaml are used; add lab-specific
# overrides here (for example image tag, hostnames, auth tokens).

gateway:
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: openclaw-https

tlsCertificate:
  enabled: true
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer
