# InfluxDB admin credentials (influxdb/influxdb-auth), sealed via kubeseal.
# Keys consumed by the influxdb2 chart's adminUser.existingSecret:
#   admin-password, admin-token. Randomly generated + sealed 2026-06-28.
# To retrieve the plaintext later (InfluxDB UI login / minting client tokens):
#   kubectl -n influxdb get secret influxdb-auth -o jsonpath='{.data.admin-token}' | base64 -d
secret:
  sealedSecret:
    encryptedData:
      admin-password: ""
      admin-token: ""
