chaosDaemon:
  runtime: containerd
  socketPath: /run/k3s/containerd/containerd.sock

dashboard:
  securityMode: false
  ingress:
    enabled: true
    ingressClassName: cilium
    annotations:
      ingress.cilium.io/loadbalancer-mode: dedicated
      lbipam.cilium.io/ips: "192.168.50.202"
    hosts:
      - name: chaos-mesh.lab.local
        tls: true
        tlsSecret: chaos-mesh-dashboard-tls
    paths:
      - /

controllerManager:
  leaderElection:
    enabled: true