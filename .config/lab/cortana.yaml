# Cortana lab overrides.
#
# The Argo Application is disabled in .config/lab/apps.yaml until new
# namespace-scoped SealedSecrets are added for OpenAI, Discord, and Todoist.

discord:
  enabled: true
  homeChannel: "1517403545115295764"
  homeChannelName: cortana
  sealedSecret:
    encryptedToken: ""

todoist:
  enabled: false
  sealedSecret:
    encryptedToken: ""

config:
  platforms:
    discord:
      enabled: true
      home_channel:
        platform: discord
        chat_id: "1517403545115295764"
        name: cortana
  discord:
    require_mention: false
    auto_thread: false
    dm_policy: allowlist
    allow_from:
      - "105261851956224000"
    allowed_channels:
      - "1517403545115295764"
    free_response_channels:
      - "1517403545115295764"
    no_thread_channels:
      - "1517403545115295764"
    gateway_restart_notification: false
  tts:
    provider: edge
  stt:
    enabled: true
    provider: local
  voice:
    enabled: true
    auto_tts: true
    listen: true
