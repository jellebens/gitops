# Platform MQTT broker (EMQX 3-node HA) — lab env. See platform/mqtt/README.md.
# Every client uses mqtt.lab.local:1883; the A record in coredns-lab.yaml MUST
# point at the VIP below (bump the zone serial when either changes).
mqtt:
  # Cilium `platform` LB-IPAM pool (.180-.199). .180 is coredns-lab; .181 is
  # the first free platform VIP.
  loadBalancerIP: 192.168.50.181

secret:
  name: mqtt-auth
  sealedSecret:
    # Sealed against the `sealed-secrets` controller (ns argocd), scoped to
    # namespace=mqtt name=mqtt-auth. To rotate, see platform/mqtt/README.md.
    encryptedData:
      node-cookie: 
      dashboard-password: 
      users.csv: 
