# coredns-config value overrides for the lab env.
# Forward home LAN names that the cluster CoreDNS can't resolve itself to the
# resolver that knows them. NEVER forward the bare `local` zone (it would shadow
# cluster.local and break in-cluster service discovery) — but `lab.local` is a
# distinct suffix and is safe to forward whole.
forwards:
  - name: vesta.local        # Home Assistant + MQTT host (DHCP-reserved 192.168.50.18)
    to: 192.168.50.1         # router resolves vesta.local -> 192.168.50.18
                             # (vesta is now also vesta.lab.local in the zone; this
                             #  forward stays so existing .local references keep working)
  # Whole lab.local zone: resolve via the in-cluster authoritative PRIMARY
  # (coredns-lab @ .180) FIRST, fall back to the DS918 slave (.144) if the
  # cluster service is down.
  - name: lab.local
    to:
      - 192.168.50.180       # in-cluster authoritative primary (coredns-lab) — preferred
      - 192.168.50.144       # DS918 slave — fallback
    policy: sequential
