crds:
  enabled: true

grafana:
  enabled: true
  defaultDashboardsEnabled: true

  # Business Charts (Apache ECharts) panel — needed for the categorical
  # weekday × hour heatmap on the zeus monthly dashboard (#96); Grafana's
  # native heatmap can't do categorical axes. Frontend-only JS plugin
  # (arm64-safe); the pod downloads it from grafana.com at boot via
  # GF_INSTALL_PLUGINS.
  plugins:
    - volkovlabs-echarts-panel

  grafana.ini:
    auth.anonymous:
      enabled: true
      org_name: Main Org.
      org_role: Viewer
    auth.basic:
      enabled: false
    # Allow raw HTML/CSS in Text panels (used by a scoped <style> on the zeus
    # live-ops kiosk to tighten table cell padding). NOTE: this is instance-wide —
    # any Text panel can now inject HTML/CSS/JS, so only trusted editors here.
    panels:
      disable_sanitize_html: true

  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  # Grafana-folder placement for sidecar-provisioned dashboards (#127).
  # The sidecar reads the `grafana_folder` annotation on a dashboard ConfigMap
  # and writes its files into /tmp/dashboards/<annotation value>/;
  # foldersFromFilesStructure makes the provider turn those subdirectories into
  # Grafana folders. ConfigMaps WITHOUT the annotation (e.g. the built-in
  # kube-prometheus-stack dashboards) stay at the root -> "General", unchanged.
  # Folder placement does not touch dashboard UIDs, so kiosk URLs keep working.
  # (The dashboard sidecar's reload call is admin-authed via REQ_USERNAME/
  # REQ_PASSWORD — the unauthed-403 gotcha only affects the datasource path.)
  sidecar:
    dashboards:
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true

  # InfluxDB admin token (observability/grafana-influxdb-token) injected as env
  # INFLUXDB_TOKEN; the datasource references it as $INFLUXDB_TOKEN so the token
  # is never stored in plaintext in the provisioned datasource.
  envFromSecret: grafana-influxdb-token

  # The InfluxDB datasource is provisioned via a statically mounted file (the
  # grafana-influxdb-datasource ConfigMap from observability-config), NOT via the
  # additionalDataSources sidecar path. The sidecar writes its datasource file a
  # few seconds AFTER Grafana boot-provisions, and its reload call is unauthed
  # (403, basic auth off), so sidecar-managed datasources lose a boot race and
  # never register. A direct mount is present before Grafana starts -> loads
  # deterministically at boot. $INFLUXDB_TOKEN comes from envFromSecret above.
  extraConfigmapMounts:
    - name: influxdb-datasource
      mountPath: /etc/grafana/provisioning/datasources/influxdb.yaml
      subPath: influxdb.yaml
      configMap: grafana-influxdb-datasource
      readOnly: true
    # Jaeger datasource (#162) — same static-mount pattern (the sidecar path
    # loses the boot race + 403s on reload; see the ConfigMap comment in
    # platform/observability-config). No token: Jaeger's query API is
    # unauthenticated, in-cluster/gateway-only (CNP).
    - name: jaeger-datasource
      mountPath: /etc/grafana/provisioning/datasources/jaeger.yaml
      subPath: jaeger.yaml
      configMap: grafana-jaeger-datasource
      readOnly: true

  persistence:
    enabled: true
    type: pvc
    accessModes:
      - ReadWriteOnce
    size: 10Gi

  service:
    type: ClusterIP

  ingress:
    enabled: false

prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    scrapeInterval: 30s
    evaluationInterval: 30s
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 25Gi

alertmanager:
  enabled: true
  # Route zeus alerts to Home Assistant (webhook -> mobile_app push). HA webhook
  # automation id "zeus-alerts" translates the Alertmanager payload into a notify.
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['namespace', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'null'
      routes:
        - receiver: 'null'
          matchers:
            - alertname = "Watchdog"
        - receiver: 'ha-webhook'
          matchers:
            - namespace = "zeus"
          continue: false
    receivers:
      - name: 'null'
      - name: 'ha-webhook'
        webhook_configs:
          - url: 'http://vesta.local:8123/api/webhook/zeus-alerts'
            send_resolved: true
    templates:
      - '/etc/alertmanager/config/*.tmpl'
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

kubeEtcd:
  enabled: false

# k3s embeds the controller-manager, scheduler and kube-proxy inside the single
# k3s server process — there are no standalone pods/endpoints for the
# kube-prometheus-stack default targets to scrape, so KubeControllerManagerDown /
# KubeSchedulerDown / KubeProxyDown fired permanently (false positives since
# 2026-06-22). Disabling the component flag removes both the scrape target and
# the matching default rule group — the standard k3s fix (#174). k3s exposes
# their health via the apiserver/kubelet metrics that remain enabled.
kubeProxy:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: true

defaultRules:
  create: true

prometheusOperator:
  enabled: true