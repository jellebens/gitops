# In-cluster CoreDNS — AUTHORITATIVE PRIMARY for the lab.local zone (lab env).
# The DS918+ (192.168.50.144) is now a SLAVE that AXFRs this zone. Clients get
# this VIP (.180) as DHCP DNS1 and the DS918 as DNS2.
corednsLab:
  loadBalancerIP: 192.168.50.180  # platform LB-IPAM pool; LAN clients' DNS1
  # Cilium SNAT-masquerades LoadBalancer traffic, so AXFR from the DS918 arrives
  # at the pod with a cluster (cilium_host) source IP, not .144 — a bare
  # `to 192.168.50.144` ACL then REFUSES it. So allow `*` for the transfer ACL,
  # and keep .144 listed as the NOTIFY target (pushes zone changes to the slave).
  transferTo:
    - 192.168.50.144              # DS918 slave — NOTIFY target
    - "*"                         # allow AXFR (LB SNAT hides the real source IP)
  upstreams:
    - 192.168.50.1                # Asus router: answers .local + recurses internet
    - 1.1.1.1                     # fallback recursion
  # Authoritative zone. BUMP the serial on EVERY edit (DS918 slave keys off it).
  zoneFile: |
    $ORIGIN lab.local.
    $TTL 86400
    @   IN SOA ns.lab.local. hostmaster.lab.local. (
            2026070101 ; serial — BUMP on every change (YYYYMMDDnn)
            3600       ; refresh (1h backstop if NOTIFY to the slave is missed)
            180        ; retry
            1209600    ; expire
            10800 )    ; minimum
    @            IN NS  ns.lab.local.
    @            IN NS  ns2.lab.local.
    ns           IN A   192.168.50.180   ; in-cluster CoreDNS (this VIP) — primary
    ns2          IN A   192.168.50.144   ; DS918 — slave
    ; cluster services (Cilium gateway VIP)
    argocd       IN A   192.168.50.200
    grafana      IN A   192.168.50.200
    influxdb     IN A   192.168.50.200
    hermes       IN A   192.168.50.200
    chaos-mesh   IN A   192.168.50.200
    ; infra / hosts
    nas001       IN A   192.168.50.2
    vesta        IN A   192.168.50.18    ; Home Assistant + MQTT
    mercurius    IN A   192.168.50.150
    ; k3s control-plane name + nodes (reserved .151-.156 block)
    k3s          IN A   192.168.50.151   ; kube-API control-plane (master01)
    k3s-master01 IN A   192.168.50.151
    k3s-node01   IN A   192.168.50.152
    k3s-node02   IN A   192.168.50.153
    k3s-node03   IN A   192.168.50.154
    k3s-node04   IN A   192.168.50.155
    k3s-node05   IN A   192.168.50.156
