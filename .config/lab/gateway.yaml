gateway:
  name: cilium-gateway
  namespace: gateway
  className: cilium
  listenerName: http
  listenerPort: 80
  https:
    enabled: true
    listenerName: https
    listenerPort: 443
    hostname: argocd.lab.local
    tls:
      mode: Terminate
      certificateRefs:
        - group: ""
          kind: Secret
          name: argocd-server-tls
          namespace: argocd
  additionalHttpsListeners:
    - name: hermes-https
      port: 443
      hostname: hermes.lab.local
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: hermes-server-tls
            namespace: hermes
    - name: influxdb-https
      port: 443
      hostname: influxdb.lab.local
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: influxdb-server-tls
            namespace: influxdb
    - name: jaeger-https
      port: 443
      hostname: jaeger.lab.local
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: jaeger-server-tls
            namespace: jaeger
  annotations:
    lbipam.cilium.io/ips: "192.168.50.200"

routes:
  - name: argocd
    namespace: argocd
    listeners:
      - http
      - https
    hostnames:
      - argocd.lab.local
    backend:
      name: argocd-server
      port: 80

  # chaos-mesh route removed (#189): the chaos dashboard is an active,
  # destructive capability (pod-kill / network / IO fault) and must not be
  # LAN-reachable. It is now ClusterIP + port-forward-only, securityMode on,
  # and namespace-policed by an ingress-only CNP (platform/chaos-mesh-config).
  # The chaos-mesh.lab.local A record is left in place (harmless: resolves to
  # the gateway VIP but has no route -> 404).

  - name: grafana
    namespace: observability
    hostnames:
      - grafana.lab.local
    backend:
      name: kube-prometheus-stack-grafana
      port: 80

  - name: influxdb
    namespace: influxdb
    listeners:
      - influxdb-https
    hostnames:
      - influxdb.lab.local
    backend:
      name: influxdb-influxdb2
      port: 80

  - name: jaeger
    namespace: jaeger
    listeners:
      - http
      - jaeger-https
    hostnames:
      - jaeger.lab.local
    backend:
      name: jaeger-query
      port: 16686

  # Longhorn admin UI — NO gateway route on purpose (#193, security review
  # 2026-07-12). The Longhorn UI has NO built-in auth and can delete
  # volumes/replicas, so any LAN host that could resolve+reach longhorn.lab.local
  # would be able to wipe block storage. This is a HARD GATE before #176 phase-3
  # (migrating the hermes/Cortana state PVC, later InfluxDB #182 onto Longhorn):
  # once real state lives on Longhorn an unauthenticated LAN UI is MED-HIGH risk.
  #
  # Rather than TLS-only theater (a lab-CA HTTPS listener adds encryption, not
  # auth) or an unsupported per-route source allow-list (gateway traffic reaches
  # the backend as the reserved `ingress` identity — the LAN source IP is already
  # proxied away — and the gateway VIP/Service is shared across every route), the
  # UI is PORT-FORWARD-ONLY: `kubectl -n longhorn-system port-forward
  # svc/longhorn-frontend 8080:80`. That path is gated by cluster RBAC/kubeconfig
  # = real authentication. The longhorn-system CNP no longer admits the gateway
  # `ingress` identity (platform/longhorn/templates/ciliumnetworkpolicy.yaml).
  #
  # Follow-up (owner-gated, heavier): if browser access from the LAN is wanted,
  # stand up oauth2-proxy (real SSO) in front of a re-added route + a lab-CA
  # HTTPS listener — see platform/longhorn/README.md "UI".
  #
  # NOTE: the longhorn.lab.local A record in .config/lab/coredns-lab.yaml is left
  # in place deliberately (DNS zone is fragile/load-bearing); with no HTTPRoute
  # claiming the hostname the gateway simply returns no route, so it fails clean.
