gateway:
  name: cilium-gateway
  namespace: gateway
  className: cilium
  listenerName: http
  listenerPort: 80
  https:
    enabled: true
    listenerName: https
    listenerPort: 443
    hostname: argocd.lab.local
    tls:
      mode: Terminate
      certificateRefs:
        - group: ""
          kind: Secret
          name: argocd-server-tls
          namespace: argocd
  additionalHttpsListeners:
    - name: hermes-https
      port: 443
      hostname: hermes.lab.local
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: hermes-server-tls
            namespace: hermes
    - name: influxdb-https
      port: 443
      hostname: influxdb.lab.local
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: influxdb-server-tls
            namespace: influxdb
    - name: jaeger-https
      port: 443
      hostname: jaeger.lab.local
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: jaeger-server-tls
            namespace: jaeger
  annotations:
    lbipam.cilium.io/ips: "192.168.50.200"

routes:
  - name: argocd
    namespace: argocd
    listeners:
      - http
      - https
    hostnames:
      - argocd.lab.local
    backend:
      name: argocd-server
      port: 80

  - name: chaos-mesh
    namespace: chaos-mesh
    hostnames:
      - chaos-mesh.lab.local
    backend:
      name: chaos-dashboard
      port: 2333

  - name: grafana
    namespace: observability
    hostnames:
      - grafana.lab.local
    backend:
      name: kube-prometheus-stack-grafana
      port: 80

  - name: influxdb
    namespace: influxdb
    listeners:
      - influxdb-https
    hostnames:
      - influxdb.lab.local
    backend:
      name: influxdb-influxdb2
      port: 80

  - name: jaeger
    namespace: jaeger
    listeners:
      - http
      - jaeger-https
    hostnames:
      - jaeger.lab.local
    backend:
      name: jaeger-query
      port: 16686

  # Longhorn admin UI (#176). HTTP-only (shared http listener — see AGENTS.md
  # Known Pitfalls); UNAUTHENTICATED admin surface (can delete volumes), so it
  # rides LAN-only like the rest, never beyond the gateway.
  - name: longhorn
    namespace: longhorn-system
    hostnames:
      - longhorn.lab.local
    backend:
      name: longhorn-frontend
      port: 80
