gateway:
  name: cilium-gateway
  namespace: gateway
  className: cilium
  listenerName: http
  listenerPort: 80
  https:
    enabled: true
    listenerName: https
    listenerPort: 443
    hostname: argocd.lab.local
    tls:
      mode: Terminate
      certificateRefs:
        - group: ""
          kind: Secret
          name: argocd-server-tls
          namespace: argocd
  additionalHttpsListeners:
    - name: openclaw-https
      port: 443
      hostname: openclaw.lab.local
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: openclaw-server-tls
            namespace: openclaw
  annotations:
    lbipam.cilium.io/ips: "192.168.50.200"

routes:
  - name: argocd
    namespace: argocd
    listeners:
      - http
      - https
    hostnames:
      - argocd.lab.local
    backend:
      name: argocd-server
      port: 80

  - name: chaos-mesh
    namespace: chaos-mesh
    hostnames:
      - chaos-mesh.lab.local
    backend:
      name: chaos-dashboard
      port: 2333

  - name: grafana
    namespace: observability
    hostnames:
      - grafana.lab.local
    backend:
      name: kube-prometheus-stack-grafana
      port: 80
