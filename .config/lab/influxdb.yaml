# InfluxDB 2.x (influxdata influxdb2 chart) — durable time-series store for
# zeus savings/forecast history, long-term sensor history, capacity tracking.
#
# DB files live on NODE-LOCAL storage (local-path), NOT the SMB share: databases
# need block/POSIX semantics (mmap, flock, fsync) that SMB doesn't provide, and
# the share has proven flaky. Durability/migration comes from scheduled backups
# to the NAS (follow-up), and the future Proxmox+Ceph move is a StorageClass swap.
#
# Admin password + token come from the influxdb-auth SealedSecret (see the
# influxdb-config app). InfluxDB will stay Pending until that secret exists.
adminUser:
  organization: zeus
  bucket: zeus
  user: admin
  retention_policy: "0s" # infinite at the bucket level; tune retention later
  # Secret with keys: admin-password, admin-token
  existingSecret: influxdb-auth

persistence:
  enabled: true
  # STORAGE CLASS — migration to `longhorn` is PLANNED but deliberately INERT
  # here (card #182). Do NOT simply change this to `longhorn`:
  #   * `influxdb-influxdb2` is a standalone, already-Bound PVC and
  #     `storageClassName` on a bound PVC is IMMUTABLE — Argo/ServerSideApply
  #     would reject the in-place edit (the influxdb app goes OutOfSync/errored)
  #     and NO data would move.
  #   * The class is switched only as ONE step of the owner-scheduled maintenance
  #     window, AFTER a fresh `influx backup` + the old PV is Retain'd + the old
  #     PVC is deleted, so Argo provisions a fresh empty Longhorn PVC to restore
  #     into.
  # Full procedure + rollback + downtime window:
  #   platform/influxdb-config/RUNBOOK-longhorn-migration.md
  # Migration target (owner uncomments/flips this at the runbook's flip step —
  # NOT before, and only with the runbook's PVC delete/recreate around it):
  #   storageClass: longhorn
  storageClass: local-path
  accessMode: ReadWriteOnce
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
