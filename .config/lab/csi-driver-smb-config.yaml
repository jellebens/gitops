# SMB credentials for NAS001 (kube-system/smbcreds), sealed via kubeseal.

# Dedicated, strictly-separate storage for Cortana backups: its own NAS share
# (cortana-backup) and its own NAS user (cortana) — no overlap with zeus-data.
extraSecrets:
  - name: cortana-smbcreds
    namespace: kube-system
    sealedSecret:
      # Sealed for (kube-system/cortana-smbcreds); user = cortana.
      encryptedData:
        username: 
        password: 

extraStorageClasses:
  - name: smb-cortana
    source: //192.168.50.102/cortana-backup
    reclaimPolicy: Retain
    uid: 10000
    gid: 10000
    secretName: cortana-smbcreds
    secretNamespace: kube-system

secret:
  sealedSecret:
    encryptedData:
      username: ""
      password: ""
