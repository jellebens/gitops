# Bluetti optimizer lab overrides.

# Secrets, sealed for this cluster. Generate each value with kubeseal, e.g.:
#   echo -n "$HA_TOKEN" | kubeseal --raw \
#     --namespace zeus --name zeus-secrets \
#     --controller-name sealed-secrets --controller-namespace argocd
# Then paste the output under the matching key. MQTT_* / ENTSOE_TOKEN are
# optional; leave a key out if unused.
secret:
  sealedSecret:
    enabled: true
    encryptedData:
      HA_TOKEN: ""
      # MQTT_USER: "Ag..."
      # MQTT_PASS: "Ag..."
      # ENTSOE_TOKEN: "Ag..."

