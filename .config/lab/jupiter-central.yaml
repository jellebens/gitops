# jupiter-central lab overrides (price-service card #106, forecast-service
# card #126).
#
# ENTSO-E token, sealed for THIS namespace. Sealed blobs are namespace-scoped:
# the zeus blob in zeus.yaml cannot be pasted here, and the key name differs —
# price-service reads ENTSOE_API_TOKEN (zeus's config uses ENTSOE_TOKEN).
# Generate with the same plaintext token zeus uses:
#
#   echo -n "$ENTSOE_TOKEN" | kubeseal --raw \
#     --namespace jupiter-central --name jupiter-central-secrets \
#     --controller-name sealed-secrets --controller-namespace argocd
#
# Then paste the output below. Until then the deployment still comes up
# (envFrom is optional) and serves persisted last-good curves; live ENTSO-E
# fetches degrade exactly like an API outage.
secret:
  sealedSecret:
    enabled: true
    encryptedData:
      ENTSOE_API_TOKEN: ""

# --- forecast-service (card #126) ------------------------------------------
#
# OWNER STEP (one-time, blocks nothing else): the training CronJob needs the
# InfluxDB token, sealed for THIS namespace. Sealed blobs are namespace-
# scoped, so the zeus INFLUXDB_TOKEN blob in zeus.yaml cannot be pasted here
# (and the key name differs — the trainer reads INFLUX_TOKEN). Seal the same
# plaintext token zeus uses (or a read-scoped token for the zeus bucket):
#
#   echo -n "$INFLUX_TOKEN" | kubeseal --raw \
#     --namespace jupiter-central --name jupiter-influx \
#     --controller-name sealed-secrets --controller-namespace argocd
#
# Then, IN THE SAME COMMIT: paste the output as INFLUX_TOKEN below AND flip
# trainer.suspend to false. Until then the whole chart deploys cleanly — the
# serving side answers /healthz (and 503s /v1/forecast with no_usable_forecast,
# by contract) and the suspended CronJob never runs, so nothing crash-loops.
forecast:
  trainer:
    # Sealed INFLUX_TOKEN added 2026-07-04 (owner-sealed) — trainer live.
    suspend: false
  secret:
    sealedSecret:
      enabled: true
      encryptedData:
        INFLUX_TOKEN: ""

# --- reporting-service (gitops card #161-F) --------------------------------
#
# reporting REUSES this same forecast InfluxDB token — NO new InfluxDB seal.
# The reporting Deployment envFroms the `jupiter-influx` secret above (same
# namespace, same key INFLUX_TOKEN). That token is the InfluxDB ADMIN all-access
# token, the ONLY token with read+write on the `zeus` bucket (verified
# 2026-07-06: InfluxDB has exactly two tokens — admin all-access + a
# homeassistant write-only-to-homeassistant-bucket token). reporting needs READ
# (zeus_state/zeus_savings) + WRITE (jupiter_state/jupiter_daily_savings) on
# `zeus`, all covered. So the ONLY new secret reporting needs is its MQTT creds.
#
# ===========================================================================
# MAIN-SESSION OWNER STEP (blocks reporting's MQTT subscribe, nothing else):
# ===========================================================================
# reporting authenticates to EMQX as a NEW SUBSCRIBE-ONLY user `reporting` to
# consume jupiter/<site>/plan + jupiter/<site>/heartbeat for ALL sites. None of
# the existing EMQX users is a central subscriber (cell-tervuren is a per-site
# PUBLISHER; zeus-mqtt / homeassistant / mqtt-admin are unrelated), so a new
# user is required. The creds live in the SealedSecret `jupiter-reporting-secrets`
# (ns jupiter-central), keys MQTT_USER / MQTT_PASS. Sealed blobs are NAMESPACE +
# NAME scoped: no other namespace's blob can be pasted here.
#
# 1. Mint the EMQX `reporting` user (REST API — see platform/mqtt/README.md
#    "Per-client user management") with a SUBSCRIBE-ONLY ACL:
#      allow  subscribe  jupiter/+/plan
#      allow  subscribe  jupiter/+/heartbeat
#      deny   all        #
#    (no publish, no other topic). Mirror it into platform/mqtt/files/acl.conf
#    for DR — ALREADY DONE in this PR.
# 2. Seal each value for THIS namespace/secret:
#      printf '%s' "$MQTT_USER" | kubeseal --raw \
#        --namespace jupiter-central --name jupiter-reporting-secrets \
#        --controller-name sealed-secrets --controller-namespace argocd
#      printf '%s' "$MQTT_PASS" | kubeseal --raw \
#        --namespace jupiter-central --name jupiter-reporting-secrets \
#        --controller-name sealed-secrets --controller-namespace argocd
# 3. Paste the outputs below as MQTT_USER / MQTT_PASS and remove the empty {}.
#
# UNTIL the blobs are filled: encryptedData stays empty and the SealedSecret is
# NOT rendered (templates/reporting-sealed-secret.yaml renders only when
# non-empty). The whole chart still deploys cleanly (envFrom is optional:true) —
# reporting serves /healthz + /metrics, reads/writes InfluxDB via the reused
# token, and its MQTT subscribe is a best-effort no-op (jupiter_reporting_*
# gauges stay absent) until the creds land. reporting actuates NOTHING regardless.
reporting:
  secret:
    sealedSecret:
      enabled: true
      encryptedData: {} # { MQTT_USER: "Ag...", MQTT_PASS: "Ag..." }
