# jupiter-tervuren lab overrides — per-site CELL secrets (card #139, P3.4).
#
# ===========================================================================
# MAIN-SESSION OWNER STEP (blocks the cell's MQTT publish, nothing else):
# ===========================================================================
# The tervuren cell authenticates to the EMQX broker as a PER-SITE user to
# publish jupiter/tervuren/plan + jupiter/tervuren/heartbeat. The credentials
# live in the SealedSecret `jupiter-tervuren-secrets` (namespace
# jupiter-tervuren), keys MQTT_USER / MQTT_PASS (and HA_TOKEN, optional — see
# below). Sealed blobs are NAMESPACE-scoped: no other namespace's blob can be
# pasted here.
#
# 1. Mint the EMQX cell user (username e.g. `cell-tervuren`) with an ACL that
#    allows PUBLISH to `jupiter/tervuren/#` (plan + heartbeat). No subscribe
#    needed for shadow.
# 2. Seal each value for THIS namespace/secret, e.g.:
#
#      echo -n "$MQTT_USER" | kubeseal --raw \
#        --namespace jupiter-tervuren --name jupiter-tervuren-secrets \
#        --controller-name sealed-secrets --controller-namespace argocd
#      echo -n "$MQTT_PASS" | kubeseal --raw \
#        --namespace jupiter-tervuren --name jupiter-tervuren-secrets \
#        --controller-name sealed-secrets --controller-namespace argocd
#
# 3. Paste the outputs below as MQTT_USER / MQTT_PASS and remove the empty {}.
#
# HA_TOKEN is NOT required by the 0.4.0 SHADOW cell — the live HA reads (SoC,
# grid power) are deferred to #142 and default to soc_min / None. Seal it too
# only if you want #142 to be a value-only flip; otherwise leave it out. The
# whole chart deploys cleanly without any of these (envFrom is optional:true) —
# the cell runs, plans, serves /metrics + /healthz, and its MQTT publish is a
# best-effort no-op until the creds land (telemetry only, never actuation).
#
# UNTIL the blobs are filled: encryptedData stays empty and the SealedSecret is
# NOT rendered (templates/sealed-secret.yaml renders only when non-empty).
secret:
  sealedSecret:
    enabled: true
    # cell-tervuren EMQX user (minted 2026-07-05; ACL allow jupiter/tervuren/#,
    # deny else).
    #
    # HA_TOKEN (card #152 — HA READ wiring): the value below is a CLEARLY-MARKED
    # PLACEHOLDER, NOT a real sealed blob. The main session seals the real HA
    # long-lived token for THIS namespace/secret and REPLACES the placeholder
    # BEFORE this PR is merged (merging deploys via Argo, and a placeholder token
    # would make the cell 401 against HA). Seal with:
    #   echo -n "$HA_TOKEN" | kubeseal --raw \
    #     --namespace jupiter-tervuren --name jupiter-tervuren-secrets \
    #     --controller-name sealed-secrets --controller-namespace argocd
    # The cell stays SHADOW (controller: shadow + control.enabled: false), so it
    # only READS HA once the real token lands; it actuates nothing.
    encryptedData:
      MQTT_USER: ""
      MQTT_PASS: ""
      # TODO(main session): real sealed HA_TOKEN. This is a PLACEHOLDER, not a
      # valid sealed blob — replace it (kubeseal, see the comment above) BEFORE
      # merging this PR. Argo deploys on merge; a placeholder token = HA 401.
      HA_TOKEN: "AgPLACEHOLDER_SEAL_HA_TOKEN_IN_MAIN_SESSION"
