# Hermes lab overrides.

gateway:
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: hermes-https
  httpToHttpsRedirect:
    enabled: true
    sectionName: http

tlsCertificate:
  enabled: true
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

discord:
  enabled: true
  sealedSecret:
    encryptedToken: 

extraAgents:
  cortana:
    enabled: true
    discord:
      enabled: true
      secretName: hermes-cortana-discord-token
      secretKey: discord-token
      envName: DISCORD_BOT_TOKEN
      homeChannel: "1517403545115295764"
      homeChannelName: cortana
      sealedSecret:
        encryptedToken: 
    persistence:
      size: 5Gi
    config:
      display:
        skin: ares
      model:
        default: gpt-5.4-mini
        provider: openai-api
        base_url: https://api.openai.com/v1
      terminal:
        backend: local
        cwd: /opt/data/workspace
        timeout: 180
        home_mode: profile
      platform_toolsets:
        discord:
          - hermes-discord
      platforms:
        discord:
          home_channel:
            platform: discord
            chat_id: "1517403545115295764"
            name: cortana
      discord:
        require_mention: false
        auto_thread: false
        dm_policy: allowlist
        allow_from:
          - "105261851956224000"
        allowed_channels:
          - "1517403545115295764"
        free_response_channels:
          - "1517403545115295764"
        no_thread_channels:
          - "1517403545115295764"
        gateway_restart_notification: false
      tts:
        provider: edge
      stt:
        enabled: true
        provider: local
      voice:
        auto_tts: true
      agent:
        system_prompt: |-
          You are Cortana, a voice-first Hermes agent in Discord.
          Keep spoken replies concise, direct, and conversational. You are
          separate from the main Hermes bot and should act as the dedicated
          assistant for the Cortana channel. When connected through Discord
          voice, prefer natural spoken responses unless the user explicitly
          asks for detail, code, or a written artifact.
      toolsets:
        - hermes-cli
        - mcp
      memory:
        memory_enabled: true
        user_profile_enabled: true
