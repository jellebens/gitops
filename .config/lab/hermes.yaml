# Hermes lab overrides.

gateway:
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: hermes-https
  httpToHttpsRedirect:
    enabled: true
    sectionName: http

tlsCertificate:
  enabled: true
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

discord:
  enabled: true
  sealedSecret:
    encryptedToken: 

extraAgents:
  cortana:
    enabled: true
    discord:
      enabled: true
      secretName: hermes-cortana-discord-token
      secretKey: discord-token
      envName: DISCORD_BOT_TOKEN
      homeChannel: "1517403545115295764"
      homeChannelName: cortana
      sealedSecret:
        encryptedToken: 
    persistence:
      size: 5Gi
    config:
      display:
        skin: ares
      model:
        default: gpt-5.4-mini
        provider: openai-api
        base_url: https://api.openai.com/v1
      terminal:
        backend: local
        cwd: /opt/data/workspace
        timeout: 180
        home_mode: profile
      platform_toolsets:
        discord:
          - hermes-discord
      platforms:
        discord:
          enabled: true
          home_channel:
            platform: discord
            chat_id: "1517403545115295764"
            name: cortana
      plugins:
        enabled:
          - platforms/discord
        disabled: []
      discord:
        require_mention: false
        auto_thread: false
        dm_policy: allowlist
        allow_from:
          - "105261851956224000"
        allowed_channels:
          - "1517403545115295764"
          - "1511628794849660990"
        free_response_channels:
          - "1517403545115295764"
          - "1511628794849660990"
        no_thread_channels:
          - "1517403545115295764"
          - "1511628794849660990"
        gateway_restart_notification: false
      tts:
        provider: openai
        openai:
          model: gpt-4o-mini-tts
          voice: shimmer

      stt:
        enabled: true
        provider: openai
        openai:
          model: gpt-4o-mini-transcribe
      voice:
        enabled: true
        auto_tts: true
        listen: true
      agent:
        system_prompt: |-
          You are Cortana, a voice-first Hermes agent in Discord.
          You are separate from the main Hermes bot and act as the dedicated
          personal assistant for the Cortana channel.

          Your current focus is personal assistance: help manage calendar
          events, mail, reminders, and todos. In the future this agent may
          coordinate more specialized sub-agents, but for now keep your own
          behavior centered on the personal assistant role.

          Voice is a first-class interface. When connected through Discord
          voice, listen for spoken requests and prefer concise, natural spoken
          responses unless the user explicitly asks for detail, code, or a
          written artifact.

          Learn from repeated corrections, preferences, routines, names,
          locations, working hours, and communication style. Use memory and the
          user profile to personalize future replies, but do not invent facts
          or silently treat one-off requests as permanent preferences. Ask
          before storing or acting on sensitive personal, financial, medical,
          legal, credential, or access-control information.

          Confirm before sending mail, deleting or moving mail, creating or
          changing calendar commitments, or creating todos with external impact.
      toolsets:
        - hermes-cli
        - mcp
      memory:
        memory_enabled: true
        user_profile_enabled: true
