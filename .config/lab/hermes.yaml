# Hermes lab overrides.
#
# The single agent is Cortana, promoted into the main deployment. Her base
# config (persona, voice, MS365, delegation, writer playbook) lives in
# landingzones/hermes/values.yaml; only environment/secret bits are set here.

gateway:
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: hermes-https
  httpToHttpsRedirect:
    enabled: true
    sectionName: http

tlsCertificate:
  enabled: true
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

# Adopt Cortana's existing state PVC in place (no copy). Argo keeps this PVC
# when extraAgents.cortana is removed and prunes the old hermes-state instead.
persistence:
  claimName: hermes-cortana-state

# Cortana's Discord bot. The sealed blob below was sealed for the secret name
# `hermes-cortana-discord-token` in namespace hermes, so keep that name.
discord:
  enabled: true
  secretName: hermes-cortana-discord-token
  secretKey: discord-token
  envName: DISCORD_BOT_TOKEN
  homeChannel: "1517403545115295764"
  homeChannelName: cortana
  sealedSecret:
    encryptedToken: 

# No additional standalone agents — Cortana is the only agent now.
extraAgents: {}

# --- Writer subagent git target -------------------------------------------
# Cortana delegates blog/article writing to a subagent that commits here.
# The private deploy key is sealed for secret hermes-writer-git-ssh (key
# id_ed25519) in namespace hermes; add the matching public key to the repo as a
# WRITE deploy key before the first sync.
git:
  enabled: true
  repoUrl: git@github.com:jellebens/blog.git
  branch: main
  postsSubdir: content/posts
  ssh:
    sealedSecret:
      encryptedKey: 

# --- Nightly SQLite-safe backup to SMB ------------------------------------
# SQLite (WAL) can't live on CIFS; live state stays on local-path and is backed
# up to the smb-hermes StorageClass nightly via the online .backup API.
backup:
  enabled: true
