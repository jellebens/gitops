{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.gateway.parentRef.namespace }}
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: platform
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.parentRef.name }}
  namespace: {{ .Values.gateway.parentRef.namespace }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: {{ .Values.gateway.parentRef.name }}
    app.kubernetes.io/part-of: platform
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: {{ .Values.gateway.parentRef.sectionName }}
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
{{- end }}
