image:
  repository: ghcr.io/openclaw/openclaw
  tag: "2026.5.19"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

gateway:
  enabled: true
  # Reference to an existing Cilium-managed Gateway (Gateway API)
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: http
  hostnames:
    - openclaw.lab.local

tlsCertificate:
  enabled: false
  secretName: openclaw-server-tls
  commonName: openclaw.lab.local
  dnsNames:
    - openclaw.lab.local
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Gateway shared token sourced from a SealedSecret and injected as the
# OPENCLAW_GATEWAY_TOKEN env var. When enabled, omit config.gateway.auth.token
# so the token is never rendered into the plaintext ConfigMap.
gatewayToken:
  enabled: true
  secretName: openclaw-gateway-token
  secretKey: gateway-token

config:
  gateway:
    mode: local
    bind: lan
    port: 8080
    auth:
      mode: token
    controlUi:
      allowedOrigins:
        - http://openclaw.lab.local
        - https://openclaw.lab.local
