image:
  repository: ghcr.io/openclaw/openclaw
  tag: "2026.5.19"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

gateway:
  enabled: true
  # Reference to an existing Cilium-managed Gateway (Gateway API)
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: http
  hostnames:
    - openclaw.lab.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  gateway:
    mode: local
    bind: lan
    port: 8080
    auth:
      mode: none
    controlUi:
      allowedOrigins:
        - http://openclaw.lab.local
