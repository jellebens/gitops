image:
  repository: ghcr.io/openclaw/openclaw
  tag: "2026.6.1"
  pullPolicy: IfNotPresent

replicaCount: 1

# Persist OpenClaw runtime state (identity keys, device pairings, agents,
# tasks) across pod restarts. The openclaw.json config itself comes from the
# ConfigMap; this PVC backs the rest of ~/.openclaw.
persistence:
  enabled: true
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /home/node/.openclaw

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

gateway:
  enabled: true
  # Reference to an existing Cilium-managed Gateway (Gateway API)
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: http
  hostnames:
    - openclaw.lab.local

tlsCertificate:
  enabled: false
  secretName: openclaw-server-tls
  commonName: openclaw.lab.local
  dnsNames:
    - openclaw.lab.local
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

resources:
  requests:
    cpu: "3.5"
    memory: 6Gi
  limits:
    cpu: "3.5"
    memory: 6Gi

# Gateway shared token sourced from a SealedSecret and injected as the
# OPENCLAW_GATEWAY_TOKEN env var. When enabled, omit config.gateway.auth.token
# so the token is never rendered into the plaintext ConfigMap.
gatewayToken:
  enabled: true
  secretName: openclaw-gateway-token
  secretKey: gateway-token

openai:
  enabled: true
  secretName: openclaw-openai-api-key
  secretKey: api-key

discord:
  enabled: true
  secretName: openclaw-discord-token
  secretKey: discord-token
  envName: DISCORD_BOT_TOKEN

config:
  agents:
    defaults:
      model:
        primary: openai/gpt-5.5
  plugins:
    allow:
      - discord
    bundledDiscovery: compat
  gateway:
    mode: local
    bind: lan
    port: 8080
    auth:
      mode: token
    controlUi:
      allowedOrigins:
        - http://openclaw.lab.local
        - https://openclaw.lab.local
  channels:
    discord:
      enabled: true
      token:
        source: env
        provider: default
        id: DISCORD_BOT_TOKEN
      dmPolicy: allowlist
      allowFrom:
        - "105261851956224000"
      groupPolicy: allowlist
      guilds:
        "1277644140909170688":
          requireMention: true
          users: ["105261851956224000"]
          channels:
            "1511628794849660990":
              requireMention: true
            
          
