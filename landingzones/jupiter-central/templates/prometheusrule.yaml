{{- if .Values.prometheusRule.enabled }}
# Availability alerts via kube-state-metrics (kube-prometheus-stack ships it)
# plus, since card #115, the PriceFeedDegraded-class rules over the
# jupiter_price_* series the price-service /metrics endpoint exports
# (jupiter services/price — the source-label taxonomy mirrors zeus:
# primary | primary-partial | cache-fresh | cache | cache-partial | none).
#
# Since card #172 also the day-ahead PUBLISH-TIME rules over the jupiter
# PR #52 expectation metrics (OWNER RULE: tomorrow's prices only exist from
# 15:00 Europe/Brussels):
#   jupiter_price_tomorrow_expected      0/1, clock+config driven, process-
#                                        global (NO zone label), flips at
#                                        publish-by (15:00 local, DST-aware)
#   jupiter_price_tomorrow_present{zone} 0/1, tomorrow's market-local-date
#                                        slots present in the served curve
#
# The metric-based rules are silently inert until the ServiceMonitor scrape
# actually succeeds (their vectors are simply absent) — i.e. until the
# jupiter release that ships /metrics is deployed. Zeus keeps its own
# ZeusPriceSourceDegraded / ZeusPricePartialCoverage / ZeusNoPriceData rules:
# those stay the degraded-price-feed signal for the LIVE battery (zeus keeps
# its full fallback chain even on prices.source=jupiter); the rules here
# watch the central feed itself.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: price-service
  namespace: jupiter-central
  labels:
    app.kubernetes.io/name: price-service
    app.kubernetes.io/part-of: jupiter
    # Picked up by the kube-prometheus-stack Prometheus ruleSelector.
    release: {{ .Values.prometheusRule.releaseLabel | quote }}
spec:
  groups:
    - name: jupiter-price-service
      rules:
        - alert: JupiterPriceServiceDown
          # `up` from the ServiceMonitor scrape (job = the Service name), the
          # mirror of ZeusDown. severity warning, not critical, ON PURPOSE:
          # consumers degrade gracefully — zeus/cells fall back to direct
          # ENTSO-E fetch and their own local last-good caches (invariant 2),
          # so the battery keeps being commanded. Revisit the severity once
          # the fleet actually rides this service as its primary price path.
          # NOTE: also fires while the deployed image predates /metrics (the
          # scrape 404s) — expected until the post-#115 jupiter release lands.
          expr: up{job="price-service",namespace="jupiter-central"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: jupiter price-service metrics target is down
            description: >-
              Prometheus has not been able to scrape price-service /metrics
              for 10m (pod down, or the deployed image predates the /metrics
              endpoint). Cells/zeus fall back to direct ENTSO-E + local
              caches, but the central price path is unobserved.
        - alert: JupiterPriceServiceNoReplica
          # kube-state-metrics view (works even with the ServiceMonitor off or
          # the Deployment deleted outright, which `up`-based rules miss).
          # Was named JupiterPriceServiceDown before card #115 gave that name
          # to the up==0 rule above.
          expr: >-
            kube_deployment_status_replicas_available{namespace="jupiter-central",deployment="price-service"} == 0
            or
            absent(kube_deployment_status_replicas_available{namespace="jupiter-central",deployment="price-service"})
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: jupiter price-service has no available replica
            description: >-
              The jupiter-central price-service deployment has had no ready
              replica for 10m. Cells/zeus fall back to direct ENTSO-E + local
              caches, but the central price path is down.
        - alert: JupiterPriceServiceCrashLooping
          # Restart churn (e.g. a wedged PVC mount or a bad image) that the
          # Down rule can miss when the pod flaps in and out of Ready.
          expr: >-
            increase(kube_pod_container_status_restarts_total{namespace="jupiter-central",container="price-service"}[30m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: jupiter price-service is restarting repeatedly
            description: >-
              More than 3 container restarts in 30m in jupiter-central/price-service.
              Check pod events and logs (image pull, PVC bind, crash on boot).
        - alert: JupiterPriceFeedDegraded
          # The ENTSO-E feed behind the service is unhealthy, mirroring
          # ZeusPriceSourceDegraded (30m of degraded input, warning). Two
          # signals, either sustained for 30m:
          #   - jupiter_price_cooldown_active == 1: retries were exhausted
          #     recently and keep being exhausted (the 120s cooldown only
          #     stays up across evaluations while fetches keep failing).
          #   - cache age > 26h: no successful ENTSO-E fetch for a zone
          #     across a whole day-ahead publication boundary. 26h, NOT
          #     lower, because a healthy cache-first steady state can
          #     legitimately go ~23h between real fetches (a ~13:00 CET
          #     publication covers the 36h horizon until roughly the next
          #     midday) — a smaller threshold would page on the routine
          #     daily rhythm. The gauge updates at serve time, so it only
          #     moves while consumers are actually polling (zeus polls the
          #     service every cycle).
          expr: >-
            jupiter_price_cooldown_active == 1
            or
            jupiter_price_cache_age_seconds > 93600
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: jupiter price-service ENTSO-E feed is degraded
            description: >-
              The price-service has been in ENTSO-E retry cooldown and/or
              serving curves last fetched more than 26h ago for 30m. Serves
              ride the last-good cache (consumers still get curves), but the
              upstream feed needs attention.
        - alert: JupiterPricePartialCoverage
          # Mirror of ZeusPricePartialCoverage: serves labelled *-partial
          # cover the horizon START but not its end, so consumers LOCF-flat-
          # line the tail. LONG `for:` on purpose (same rationale as zeus):
          # only a STUCK partial — a feed staying short across a publication
          # boundary — should page. 6h matches the zeus rule's deliberate
          # conservative pick.
          #
          # REFINED by card #172 — the raw rule was expectation-blind: with
          # a 36h optimizer horizon, every serve from midnight until the
          # day-ahead publication is *-partial BY DESIGN (tomorrow's prices
          # do not exist before 15:00 Europe/Brussels — owner rule), so the
          # 6h sustain would have fired ~06:00 every day on a perfectly
          # healthy feed. Gated on jupiter_price_tomorrow_expected == 1 the
          # sustain only counts inside the 15:00→midnight window where a
          # short curve is actually anomalous (fires ~21:00 on a genuinely
          # stuck feed). The `or absent(...)` leg keeps the rule ARMED with
          # its ORIGINAL behavior until the jupiter release that ships the
          # expectation metric deploys — without it the gate would silently
          # disable the alert. Vector matching: the LHS is sum by (zone),
          # expected is process-global (no labels kept) — match on the
          # empty label set (`and on()`).
          # NOT touched (absolute, clock-independent signals — the card's
          # explicit non-goal): JupiterPriceFeedDegraded (cooldown / 26h
          # cache age) and JupiterPriceNoUsableCurve below.
          expr: >-
            (sum by (zone) (increase(jupiter_price_curve_serves_total{source_label=~".+-partial"}[1h])) > 0)
            and on ()
            ((jupiter_price_tomorrow_expected == 1) or absent(jupiter_price_tomorrow_expected))
          for: 6h
          labels:
            severity: warning
          annotations:
            summary: jupiter price-service serving partial-coverage curves
            description: >-
              Zone {{ "{{ $labels.zone }}" }} has been served *-partial curves
              (horizon tail uncovered, LOCF-flat for consumers) continuously
              for 6h. A transient end-of-horizon tail is normal and clears at
              day-ahead publication; a sustained partial means ENTSO-E is
              returning a short curve.
        - alert: JupiterPriceTomorrowMissing
          # Card #172. Tomorrow's day-ahead prices should be in the served
          # curve once the publish-by time (15:00 Europe/Brussels, DST-aware
          # — the expectation gauge owns that clock logic) has passed. Fires
          # when a zone's curve still lacks tomorrow's slots 45m past
          # publish-by (~15:45 local). Vector matching: present carries
          # {zone}, expected does not — match ignoring(zone); both series
          # come off the same scrape target, so the remaining
          # instrumentation labels line up. Inert until the jupiter release
          # that ships the PR #52 metrics deploys (vectors simply absent).
          # Warning only: consumers still hold today's full curve — the
          # optimizer just plans tomorrow on a LOCF-flat tail.
          expr: >-
            (jupiter_price_tomorrow_present == 0)
            and ignoring (zone)
            (jupiter_price_tomorrow_expected == 1)
          for: 45m
          labels:
            severity: warning
          annotations:
            summary: tomorrow's day-ahead prices missing past publish-by
            description: >-
              Zone {{ "{{ $labels.zone }}" }}: the day-ahead publish-by time
              (15:00 Europe/Brussels) has passed and tomorrow's slots are
              still not present in the served curve (sustained 45m).
              Consumers keep today's curve; tomorrow is being planned on a
              LOCF-flat price tail until the curve arrives.
        - alert: JupiterPriceTomorrowMissingCritical
          # Card #172. Same predicate sustained 2h (~17:00 local): by then
          # the evening/overnight charge plan is being built on a flat-tail
          # price assumption — escalate. ENTSO-E publication or the fetch
          # path is genuinely broken, not merely late.
          expr: >-
            (jupiter_price_tomorrow_present == 0)
            and ignoring (zone)
            (jupiter_price_tomorrow_expected == 1)
          for: 2h
          labels:
            severity: critical
          annotations:
            summary: tomorrow's day-ahead prices still missing 2h past publish-by
            description: >-
              Zone {{ "{{ $labels.zone }}" }}: 2h past the day-ahead
              publish-by (15:00 Europe/Brussels) and tomorrow's slots are
              still absent from the served curve. ENTSO-E publication or the
              price-service fetch path is broken; overnight optimization
              will run on a LOCF-flat price tail.
        - alert: JupiterPriceNoUsableCurve
          # Mirror of ZeusNoPriceData (critical): serves labelled `none` are
          # the machine-readable 503 — a consumer asked and got NOTHING
          # (fetch failed/stale AND the last-good cache elapsed). Consumers
          # then fall to their own local caches, but the central feed has no
          # price signal at all.
          expr: >-
            sum by (zone) (increase(jupiter_price_curve_serves_total{source_label="none"}[15m])) > 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: jupiter price-service has no usable curve for a zone
            description: >-
              Zone {{ "{{ $labels.zone }}" }} has been answered 503
              no_usable_curve for 15m (fetch failing and last-good cache
              elapsed). Consumers are on their own local caches; the central
              price feed is effectively dark for this zone.
{{- end }}
