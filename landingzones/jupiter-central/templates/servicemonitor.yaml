{{- if .Values.serviceMonitor.enabled }}
# Scrapes GET /metrics on the API port (`http`, 8080) — jupiter card #115
# wired prometheus_client into the price-service on the same port. Enabled
# via values.yaml since card #115. NOTE: against a pre-/metrics image
# (0.1.0) this scrape 404s and `up` reads 0 until the next jupiter release
# is deployed (see values.yaml sequencing note).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: price-service
  namespace: jupiter-central
  labels:
    app.kubernetes.io/name: price-service
    app.kubernetes.io/part-of: jupiter
    # Picked up by the kube-prometheus-stack Prometheus serviceMonitorSelector.
    release: {{ .Values.serviceMonitor.releaseLabel | quote }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: price-service
  namespaceSelector:
    matchNames:
      - jupiter-central
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
