{{- if and .Values.forecast.secret.sealedSecret.enabled .Values.forecast.secret.sealedSecret.encryptedData }}
# InfluxDB token for the training CronJob (key INFLUX_TOKEN). Only rendered
# once .config/<env>/jupiter-central.yaml provides a real sealed blob — see
# the owner step documented there (sealed blobs are namespace-scoped; the
# zeus INFLUXDB_TOKEN blob cannot be reused for this namespace).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.forecast.secret.name }}
  namespace: jupiter-central
spec:
  encryptedData:
    {{- range $k, $v := .Values.forecast.secret.sealedSecret.encryptedData }}
    {{- if $v }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- end }}
  template:
    metadata:
      name: {{ .Values.forecast.secret.name }}
      namespace: jupiter-central
    type: Opaque
{{- end }}
