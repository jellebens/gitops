# In-cluster API endpoint. Consumers (zeus, cells) reach this at
# http://forecast-service.jupiter-central.svc.cluster.local:8080
apiVersion: v1
kind: Service
metadata:
  name: forecast-service
  namespace: jupiter-central
  labels:
    app.kubernetes.io/name: forecast-service
    app.kubernetes.io/part-of: jupiter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forecast-service
  ports:
    - name: http
      port: {{ .Values.forecast.service.port }}
      targetPort: http
      protocol: TCP
