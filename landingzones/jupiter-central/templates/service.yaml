# In-cluster API endpoint. Zeus (card #107, prices.source: jupiter) reaches
# this at http://price-service.jupiter-central.svc.cluster.local:8080
apiVersion: v1
kind: Service
metadata:
  name: price-service
  namespace: jupiter-central
  labels:
    app.kubernetes.io/name: price-service
    app.kubernetes.io/part-of: jupiter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: price-service
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
