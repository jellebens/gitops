{{- if and .Values.reporting.secret.sealedSecret.enabled .Values.reporting.secret.sealedSecret.encryptedData }}
# MQTT credentials for the reporting-service's telemetry consumer — the NEW
# subscribe-only EMQX user `reporting` (keys MQTT_USER / MQTT_PASS). Rendered
# ONLY once .config/<env>/jupiter-central.yaml provides real sealed blobs; until
# then this is skipped and the Deployment's envFrom (optional: true) keeps the
# pod up (the MQTT subscribe is a best-effort no-op — reporting is a pure
# consumer, never on any actuation path).
#
# Sealed blobs are NAMESPACE + NAME scoped: seal for ns jupiter-central / secret
# jupiter-reporting-secrets (see the owner step in that .config file + README).
# NOTE: this is a SEPARATE secret from jupiter-influx (the shared InfluxDB
# token) — the InfluxDB token is REUSED, only the MQTT creds are new.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.reporting.secret.name }}
  namespace: jupiter-central
spec:
  encryptedData:
    {{- range $k, $v := .Values.reporting.secret.sealedSecret.encryptedData }}
    {{- if $v }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- end }}
  template:
    metadata:
      name: {{ .Values.reporting.secret.name }}
      namespace: jupiter-central
    type: Opaque
{{- end }}
