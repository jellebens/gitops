{{- if .Values.reporting.savingsParity.enabled }}
# reporting-service SAVINGS PARITY monitor (jupiter reporting, gitops card
# #161-H). A NEW, SEPARATE PrometheusRule (name reporting-savings-parity) that
# diffs the jupiter reporting-service's savings figure against zeus's live
# banked savings. This is the ADR-0022 "savings history must read unbroken"
# gate: it must stay green (near-zero divergence) through the soak before any
# kiosk savings-panel is migrated off zeus onto jupiter.
#
# JOIN: jupiter_savings_today_eur (reporting-service, jupiter-central) carries
# site_id="tervuren", but the PROMETHEUS zeus_savings_* series carry NO site_id
# label (zeus tags its INFLUXDB writes with site_id, but its /metrics gauges are
# label-free — the single tervuren battery). So every zeus term is FIRST wrapped
# in label_replace(zeus_savings_*, "site_id", "tervuren", "", "") to inject the
# label, exactly the pattern the jupiter-shadow harness uses to join zeus_* vs
# jupiter_* (landingzones/jupiter-shadow/templates/prometheusrule.yaml). WITHOUT
# this the `max by (site_id)` on the zeus side yields site_id="" which cannot
# `on(site_id)` join jupiter's site_id="tervuren" -> empty result / NO DATA
# (the bug this rule shipped with, fixed card #161-H-fix). If the zeus side stops
# exporting, the label_replace has no input and the parity series simply go
# absent — the dashboard shows "no data", not a false 0.
#
# ***INDEPENDENCE-PENDING CAVEAT — READ BEFORE TRUSTING A GREEN RESULT***
# During the soak jupiter_savings_* currently RE-READS zeus's banked savings
# result out of the shared InfluxDB bucket. So jupiter_savings_today_eur is, by
# construction, ~identical to zeus_savings_today_eur RIGHT NOW and this parity
# is trivially exact. The MEANINGFUL divergence test only begins once the
# "savings independence" refinement lands (jupiter computing savings from its
# OWN jupiter_state history instead of re-reading zeus). Until then:
#   * treat a green parity as "the pipeline is wired", NOT "the logic is
#     validated";
#   * the alert threshold is deliberately CONSERVATIVE (a loose EUR tolerance +
#     a long `for:`) so it does not imply precision the current setup can't
#     deliver.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: reporting-savings-parity
  namespace: jupiter-central
  labels:
    app.kubernetes.io/name: reporting-service
    app.kubernetes.io/part-of: jupiter
    # Picked up by the kube-prometheus-stack Prometheus ruleSelector.
    release: {{ .Values.reporting.savingsParity.releaseLabel | quote }}
spec:
  groups:
    # ------------------------------------------------------------------ #
    # 1. Parity recording rules — the diff series the dashboard reads.     #
    #    Recorded on (site_id).                                            #
    # ------------------------------------------------------------------ #
    - name: jupiter-reporting-savings-parity
      interval: 30s
      rules:
        # ABSOLUTE daily-savings divergence (EUR): |jupiter - zeus|. THE gate
        # signal. ~0 by construction during the re-read soak; becomes meaningful
        # once jupiter computes savings independently (see header caveat).
        - record: jupiter_savings_parity_abs_eur
          expr: |
            abs(
              max by (site_id) (jupiter_savings_today_eur)
              - on(site_id)
              max by (site_id) (label_replace(zeus_savings_today_eur, "site_id", "tervuren", "", ""))
            )
        # SIGNED divergence (EUR): + = jupiter over-reports vs zeus, - = under.
        # Same magnitude as the abs series but keeps the direction for triage.
        - record: jupiter_savings_parity_signed_eur
          expr: |
            max by (site_id) (jupiter_savings_today_eur)
            - on(site_id)
            max by (site_id) (label_replace(zeus_savings_today_eur, "site_id", "tervuren", "", ""))
        # RELATIVE divergence (fraction of the zeus figure): |jupiter - zeus| /
        # |zeus|, clamped so a near-zero zeus denominator does not blow up. Useful
        # as a scale-free companion to the abs series once savings are non-trivial.
        - record: jupiter_savings_parity_rel_ratio
          expr: |
            jupiter_savings_parity_abs_eur
            / on(site_id)
            clamp_min(abs(max by (site_id) (label_replace(zeus_savings_today_eur, "site_id", "tervuren", "", ""))), 0.01)
        # COMPONENT diffs (baseline / actual) were DROPPED here — gitops card #181,
        # from Clio's #164 soak. They joined jupiter_savings_baseline_eur /
        # jupiter_savings_actual_eur against zeus_savings_baseline_eur /
        # zeus_savings_actual_eur, but zeus has NEVER exported those two component
        # series (it exports only zeus_savings_today_eur / zeus_daily_savings_eur /
        # zeus_horizon_cum_savings_eur / zeus_predicted_savings_eur), so
        # jupiter_savings_parity_baseline_abs_eur / _actual_abs_eur produced ZERO
        # samples since birth — the join input on the zeus side is always empty.
        # Component attribution of a future gap would require exporting the zeus
        # components, but zeus decommission (#169) is near, so the rules (and the
        # dead zeus targets on the "Baseline vs actual" dashboard panel) are removed
        # rather than kept as permanently-empty series. The top-level abs/signed/rel
        # parity above is unaffected (it joins zeus_savings_today_eur, which IS
        # exported).
        # BOTH-PRESENT gate: 1 when both savings series are exporting for the
        # site; ABSENT (not 0) when either is missing — so the dashboard/alert
        # distinguishes "compared and agree" from "nothing to compare".
        - record: jupiter_savings_parity_both_present
          expr: |
            (max by (site_id) (jupiter_savings_today_eur) > bool -1e12)
            * on(site_id)
            (max by (site_id) (label_replace(zeus_savings_today_eur, "site_id", "tervuren", "", "")) > bool -1e12)

    # ------------------------------------------------------------------ #
    # 2. Alerts. WARNING only — reporting never actuates; a fire means      #
    #    "not yet a clean cross-check", a kiosk-migration readiness signal,  #
    #    NOT a live-battery incident.                                        #
    # ------------------------------------------------------------------ #
    - name: jupiter-reporting-savings-parity-alerts
      rules:
        - alert: JupiterReportingSavingsParityNoData
          # Neither side is producing the joined parity series — one of
          # jupiter_savings_today_eur / zeus_savings_today_eur stopped exporting,
          # so the cross-check is blind. (Absent, not 0: nothing to compare.)
          expr: absent(jupiter_savings_parity_both_present)
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: jupiter reporting savings parity has no data
            description: >-
              jupiter_savings_parity_both_present has been absent for 30m —
              jupiter_savings_today_eur (reporting-service) or
              zeus_savings_today_eur (live battery) stopped being scraped, so the
              savings cross-check cannot run. Check the reporting-service
              ServiceMonitor / pod and the zeus metrics endpoint.
        - alert: JupiterReportingSavingsParityDiverged
          # Sustained absolute daily-savings divergence beyond tolerance. This is
          # the ADR-0022 gate — it must sit near 0 through a clean soak before any
          # kiosk savings-panel migration.
          #
          # ***INDEPENDENCE PENDING***: during the soak jupiter re-reads zeus's
          # banked figure, so this is ~0 by construction and a fire here would
          # more likely indicate a plumbing bug (bad InfluxDB read, wrong bucket,
          # stale re-read) than a genuine logic divergence. The REAL divergence
          # test only begins once jupiter computes savings from its own
          # jupiter_state history. Threshold + `for:` are deliberately loose so a
          # green result now is not over-interpreted as precision parity.
          expr: max by (site_id) (jupiter_savings_parity_abs_eur) > {{ .Values.reporting.savingsParity.absToleranceEur }}
          for: {{ .Values.reporting.savingsParity.for }}
          labels:
            severity: warning
          annotations:
            summary: jupiter reporting savings diverges from zeus (cross-check, independence pending)
            description: >-
              Site {{ "{{ $labels.site_id }}" }} — |jupiter_savings_today_eur -
              zeus_savings_today_eur| has exceeded
              {{ .Values.reporting.savingsParity.absToleranceEur }} EUR for
              {{ .Values.reporting.savingsParity.for }}. CAVEAT: during the soak
              jupiter RE-READS zeus's banked savings, so this parity is exact by
              construction — a fire most likely means a reporting-service
              plumbing bug (InfluxDB read / bucket / stale re-read), NOT a genuine
              savings-logic divergence. Investigate the reporting-service before
              concluding a logic gap. The meaningful divergence test begins once
              jupiter computes savings independently (savings-independence
              refinement).
{{- end }}
