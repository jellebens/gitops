{{- if .Values.persistence.enabled }}
# Per-zone last-good day-ahead curve cache (PRICE_CACHE_DIR). Small,
# re-fetchable data: local-path is enough (see values.yaml for the rationale
# vs zeus's smb class).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: price-service-cache
  namespace: jupiter-central
  labels:
    app.kubernetes.io/name: price-service
    app.kubernetes.io/part-of: jupiter
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
