{{- if .Values.forecast.persistence.enabled }}
# Shared forecast-artifact volume: the training CronJob WRITES
# <site_id>/<target>.json here (atomic tmp+rename), the serving deployment
# READS it (mounted read-only). local-path is enough: artifacts are fully
# regenerated by every trainer run (see values.yaml for the co-location
# mechanics — WaitForFirstConsumer + PV node affinity keep the server pod and
# trainer Jobs on the node that holds the volume).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forecast-artifacts
  namespace: jupiter-central
  labels:
    app.kubernetes.io/name: forecast-service
    app.kubernetes.io/part-of: jupiter
spec:
  accessModes:
    - {{ .Values.forecast.persistence.accessMode }}
  {{- with .Values.forecast.persistence.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.forecast.persistence.size }}
{{- end }}
