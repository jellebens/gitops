# jupiter-central landing zone — price-service (jupiter P1 card #106).
#
# The service is the central ENTSO-E price API (jupiter repo,
# services/price): GET /healthz + GET /v1/curve?zone=... per
# zeus:.docs/jupiter/architecture.md. It is a CENTRAL SINGLETON — one
# instance serves every bidding zone / site. Bidding zones are a PER-REQUEST
# query parameter, not server config, so there is deliberately no ConfigMap
# here: the only knobs the app reads are the env vars below (PORT,
# PRICE_CACHE_DIR, ENTSOE_API_TOKEN, SITE_ID).
image:
  repository: jellebens/jupiter-price
  # jupiter repo release tag (arm64, --provenance=false — the cluster is arm64).
  tag: "0.3.1"
  pullPolicy: IfNotPresent

# Central singleton. The last-good cache PVC is RWO (local-path pins it to a
# node), and one fetch per zone per publication is the whole point — never
# scale this up without rethinking the cache.
replicaCount: 1

service:
  # Container/service port; exported to the app as PORT. Zeus (card #107) will
  # reach it at http://price-service.jupiter-central.svc.cluster.local:8080.
  port: 8080

# D4 site identity: central singletons run as site_id "central". Exported as
# the SITE_ID env var (jupiter_shared.site); shows up in /healthz.
siteId: central

# Scoped CiliumNetworkPolicy, INGRESS-ONLY by repo convention: a Cilium policy
# with only `ingress` rules default-denies inbound to the pod while leaving
# EGRESS fully open (the service needs egress to the public ENTSO-E API; a
# broader egress lockdown is a separate, human-reviewed step). Inbound allowed:
# Prometheus scrapes from the observability namespace plus the namespaces
# listed below (zeus consumes /v1/curve from card #107 on).
networkPolicy:
  enabled: true
  # Namespace Prometheus (kube-prometheus-stack) runs in.
  metricsScrapeNamespace: observability
  # In-cluster consumers allowed to reach the service port. Each per-site
  # jupiter cell namespace (jupiter-<site>) must be listed so its cell can
  # fetch /v1/curve + /v1/forecast (#139 — without this the cell times out and
  # safe-holds). zeus = the incumbent; jupiter-tervuren = the P3 shadow cell.
  allowedClientNamespaces:
    - zeus
    - jupiter-tervuren

# Prometheus Operator ServiceMonitor, scraping GET /metrics on the service
# port (jupiter card #115 wired prometheus_client into the price-service —
# same port 8080 as the API, no separate metrics port). ENABLED from card
# #115 on. SEQUENCING: the scrape only succeeds once the price-service image
# that ships /metrics (the release AFTER 0.1.0) is deployed; against 0.1.0 it
# scrapes 404s and parks `up` at 0 (harmless but noisy — JupiterPriceService-
# Down will fire until the image lands).
serviceMonitor:
  enabled: true
  interval: 30s
  # Prometheus selects ServiceMonitors with this label (serviceMonitorSelector).
  releaseLabel: kube-prometheus-stack

# Prometheus alerting rules (kube-prometheus-stack picks these up by label).
# Availability via kube-state-metrics plus, since card #115, the
# PriceFeedDegraded-class rules over the jupiter_price_* series (zeus-parity
# source taxonomy) — see templates/prometheusrule.yaml for the thresholds
# and their rationale.
prometheusRule:
  enabled: true
  releaseLabel: kube-prometheus-stack

# Per-zone last-good curve cache (PRICE_CACHE_DIR). local-path (k3s default,
# same choice as platform/mqtt): the cache is small and re-fetchable from
# ENTSO-E, so NAS durability (zeus's smb class) is not warranted — losing the
# node only degrades the first request per zone to a fresh fetch. RWO +
# local-path pins the pod to the node holding the volume; fine for a
# single-replica cache.
persistence:
  enabled: true
  storageClassName: "local-path"
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data

# Small stdlib HTTP server + one requests call per zone per publication.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Probes on GET /healthz (always answers: ThreadingHTTPServer comes up before
# any fetch; a missing ENTSOE token or a dead ENTSO-E API does NOT fail
# /healthz — degraded serving is by design, availability alerts catch it).
probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 4

runtime:
  uid: 1000
  gid: 1000

# Secret injected as env via envFrom (optional: true, so the first sync does
# not block on the seal). Key ENTSOE_API_TOKEN — the exact env var name
# app.py reads (NOTE: zeus calls its key ENTSOE_TOKEN; this service does not).
# The app tolerates an absent token: it still serves persisted last-good
# curves, and a fetch without a token degrades exactly like an ENTSO-E outage.
# Provide the sealed value in .config/<env>/jupiter-central.yaml (kubeseal —
# see that file; sealed blobs are namespace-scoped, so zeus's sealed
# ENTSOE_TOKEN can NOT be reused here).
secret:
  name: jupiter-central-secrets
  sealedSecret:
    enabled: true
    encryptedData: {} # { ENTSOE_API_TOKEN: "Ag..." }

# ---------------------------------------------------------------------------
# forecast-service (jupiter P2 cards #120/#121, deployed by gitops card #126).
#
# Second tenant of this landing zone: the central forecast SERVING API
# (jupiter repo, services/forecast) plus its batch training CronJob. The
# server is deliberately dumb — it serves the last artifact the trainer baked
# onto the shared PVC and never trains/fetches in-request. Same image for
# both; the CronJob overrides the entrypoint with the jupiter-forecast-train
# console script.
forecast:
  image:
    repository: jellebens/jupiter-forecast
    # jupiter repo release tag (arm64, --provenance=false — the cluster is arm64).
    tag: "0.3.1"
    pullPolicy: IfNotPresent

  # Central singleton, same reasoning as the price-service: the artifact PVC
  # is RWO on local-path (node-pinned) and one instance serves every site.
  replicaCount: 1

  service:
    # Container/service port; exported to the app as PORT. Consumers reach it
    # at http://forecast-service.jupiter-central.svc.cluster.local:8080.
    port: 8080

  # Shared artifact volume (FORECAST_ARTIFACT_DIR): the trainer WRITES
  # <site>/<target>.json here, the server READS it (mounted read-only).
  # local-path (k3s default) is fine for v1: artifacts are fully regenerated
  # by every trainer run, so losing the node only costs one training run —
  # NAS durability (zeus's smb class) is not warranted. local-path is RWO and
  # node-pinned, but its volumeBindingMode is WaitForFirstConsumer: the PV is
  # created on the first consumer's node and carries node affinity, and the
  # scheduler honors PV node affinity for every later pod — so the serving
  # pod and the trainer Jobs co-locate on that node automatically, no
  # nodeSelector needed. (If that node dies, pods go Pending and the artifact
  # is rebuilt on the next trainer run once rescheduled — accepted for v1;
  # RWX via the smb class is the later option if this ever hurts.)
  persistence:
    enabled: true
    storageClassName: "local-path"
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /artifacts

  # Serving is a pure local file slice (no model evaluation on the request
  # path) — small footprint; pandas import is the memory floor.
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Probes on GET /healthz (stdlib HTTP server, answers before/without any
  # artifact on disk — a missing artifact 503s /v1/forecast, never /healthz).
  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 4

  # Training CronJob (same image, entrypoint jupiter-forecast-train).
  # Reads site-tagged history from InfluxDB + Open-Meteo temps, fits the
  # zeus-parity forecaster ladder and bakes artifacts onto the PVC (rw).
  trainer:
    # SUSPENDED until the jupiter-influx SealedSecret below carries a real
    # sealed token (see .config/lab/jupiter-central.yaml): without the token
    # every run exits 2 (config error) and just noise-fails. Flip to false in
    # the same commit that adds the sealed blob. The serving side deploys and
    # answers /healthz fine either way (no artifact yet -> documented 503 on
    # /v1/forecast, no crash-loop anywhere).
    suspend: true
    # Every 6h, offset from the top of the hour to dodge the :00/:05 cron
    # crowd (influxdb backups run at :05/:30). Four bakes/day keeps the
    # served horizon fresh against the 24h staleness alert with lots of
    # margin (the bake is 168h deep).
    schedule: "17 */6 * * *"
    # If the controller misses the window (node down, suspend flip), still
    # start up to 15 min late rather than skipping the run.
    startingDeadlineSeconds: 900
    concurrencyPolicy: Forbid
    # One retry after a transient failure (Influx hiccup); a systematic
    # failure surfaces via JupiterForecastTrainingFailing instead of pod spam.
    backoffLimit: 1
    # A run is minutes of work; hard-kill anything wedged well before the
    # next 6h window.
    activeDeadlineSeconds: 1800
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    # Fitting/baking with pandas over 30d of history — modest but real.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    # The fleet's shared bucket — same wiring zeus itself uses (influx.url/
    # org/bucket in landingzones/zeus values). Token comes from the
    # jupiter-influx SealedSecret (INFLUX_TOKEN), NOT from here.
    influx:
      url: http://influxdb-influxdb2.influxdb
      org: zeus
      bucket: zeus

  # --sites-json document, rendered verbatim into the forecast-train-sites
  # ConfigMap. Keys MUST match jupiter_forecast.train.SiteSpec exactly — the
  # trainer REJECTS unknown keys by design (a typo must not silently fall
  # back to a default). tervuren coordinates/base_temp_c mirror the zeus
  # forecast.weather values. include_untagged: TRANSITION ERA ONLY — zeus
  # started site-tagging its Influx writes 2026-07-04; drop this once the P4
  # backfill lands (or the 30d training window rolls past the cutover).
  sites:
    - site_id: tervuren
      latitude: 50.857017
      longitude: 4.5362013
      timezone: Europe/Brussels
      base_temp_c: 21.0
      include_untagged: true

  # InfluxDB token for the trainer, injected via envFrom (optional: true so
  # the chart deploys before the seal exists — the trainer is suspended until
  # then anyway). Key INFLUX_TOKEN — the exact env var the trainer reads
  # (NOTE: zeus calls its key INFLUXDB_TOKEN; this trainer does not). Sealed
  # blobs are namespace-scoped: the zeus blob canNOT be reused here. Provide
  # the sealed value in .config/<env>/jupiter-central.yaml — see the owner
  # step documented there and in the README.
  secret:
    name: jupiter-influx
    sealedSecret:
      enabled: true
      encryptedData: {} # { INFLUX_TOKEN: "Ag..." }

  # ServiceMonitor for GET /metrics on the API port (same port 8080 —
  # jupiter_forecast_requests_total / serves / no_usable / artifact_age /
  # build_info, wired in the jupiter #120 card).
  serviceMonitor:
    enabled: true
    interval: 30s
    releaseLabel: kube-prometheus-stack

  # Alerting (kube-prometheus-stack ruleSelector picks these up by label).
  prometheusRule:
    enabled: true
    releaseLabel: kube-prometheus-stack
    # jupiter_forecast_artifact_age_seconds threshold: 24h. The trainer bakes
    # every 6h, so 24h stale = four consecutive missed/failed trainings.
    artifactStaleSeconds: 86400

# ---------------------------------------------------------------------------
# reporting-service (jupiter reporting card #161, deployed by gitops card
# #161-F).
#
# Third tenant of this landing zone: the central fleet-reporting / savings
# service (jupiter repo services/reporting, image jellebens/jupiter-reporting,
# package jupiter_reporting — ADR-0013). OWNER NAMING DECISION: the k8s
# workload/Service is `reporting-service` (NO jupiter- prefix; it is already in
# the jupiter-central namespace), matching price-service / forecast-service; the
# Docker IMAGE keeps the registry-convention jupiter-reporting name.
#
# A PURE CONSUMER (never on any actuation path): it subscribes to the lars'
# retained MQTT plan/heartbeat and re-exposes jupiter_reporting_* gauges; reads
# the site-tagged realized zeus_state/zeus_savings series from InfluxDB to emit
# jupiter_savings_*; and writes durable jupiter_state/jupiter_daily_savings back
# to the same shared bucket. Central singleton (site_id=central). No PVC and no
# CronJob (unlike forecast) — all state is in InfluxDB/Prometheus.
reporting:
  image:
    repository: jellebens/jupiter-reporting
    # jupiter repo release tag (arm64, --provenance=false — the cluster is arm64).
    # v0.7.1 (d3c2741) is the first release that actually produced the image —
    # v0.7.0's build failed on a test-all collision (fixed by #44), no artifact.
    tag: "0.7.1"
    pullPolicy: IfNotPresent

  # Central singleton, single writer of the durable jupiter_* series (see the
  # Deployment's Recreate note). Never scale up.
  replicaCount: 1

  service:
    # Container/service port; exported to the app as PORT. Exposes /healthz +
    # /metrics only (no consumer API); the Service exists for the ServiceMonitor.
    port: 8080

  # Fleet sites the consumer subscribes to + the realized refresh runs for
  # (REPORTING_SITES, comma-separated). One today: tervuren. Add sites here as
  # the fleet grows — the EMQX `reporting` user's wildcard subscribe
  # (jupiter/+/plan + jupiter/+/heartbeat) already covers future sites.
  sites: "tervuren"
  # Site timezone for the InfluxDB reads / daily savings bucketing (REPORTING_TZ).
  tz: "Europe/Brussels"
  # Realized-refresh + MQTT staleness-sweep cadence in seconds
  # (REPORTING_REFRESH_SECONDS).
  refreshSeconds: 60

  # InfluxDB read+write against the fleet's ONE shared bucket — SAME url/org/
  # bucket the forecast trainer and zeus itself use. INFLUX_URL has an implicit
  # :80 (the influxdb-influxdb2 Service listens on 80 -> targetPort 8086).
  influx:
    url: http://influxdb-influxdb2.influxdb
    org: zeus
    bucket: zeus
    # REUSE the forecast trainer's InfluxDB token: the `jupiter-influx` secret
    # already exists in THIS namespace (jupiter-central) with key INFLUX_TOKEN,
    # and it holds the InfluxDB ADMIN ALL-ACCESS token — the ONLY token with
    # read+write on the `zeus` bucket (verified 2026-07-06: InfluxDB has exactly
    # two tokens — the admin all-access one and a homeassistant write-only-to-
    # homeassistant-bucket one). reporting needs READ (zeus_state/zeus_savings)
    # + WRITE (jupiter_state/jupiter_daily_savings) on `zeus`, which the admin
    # token grants. So NO new InfluxDB SealedSecret is minted — the Deployment
    # just envFroms this existing secret. (SealedSecrets are namespace+name
    # scoped; reuse works precisely because reporting shares the namespace and
    # references the same secret name.)
    secretName: jupiter-influx

  # MQTT consumer connection (consumer.py). Host/port/keepalive/client-id are
  # non-secret; MQTT_USER/MQTT_PASS come from the SealedSecret below.
  mqtt:
    enabled: true
    # Stable broker address (Cilium LB-IPAM VIP; A record in coredns-lab).
    host: mqtt.lab.local
    port: 1883
    keepaliveSeconds: 60
    clientId: reporting-central

  # MQTT credentials — the NEW subscribe-only EMQX user `reporting`
  # (keys MQTT_USER / MQTT_PASS). SEPARATE from jupiter-influx. Injected via
  # envFrom (optional: true so the first sync does not block on the seal — the
  # subscribe is a best-effort no-op until the creds land). Provide the sealed
  # values in .config/<env>/jupiter-central.yaml (owner step — see that file +
  # the README + the PR notes for the exact EMQX user + ACL). Sealed blobs are
  # namespace+name scoped, so they must be sealed for
  # jupiter-central / jupiter-reporting-secrets.
  secret:
    name: jupiter-reporting-secrets
    sealedSecret:
      enabled: true
      encryptedData: {} # { MQTT_USER: "Ag...", MQTT_PASS: "Ag..." }

  # Scoped CiliumNetworkPolicy, INGRESS-ONLY by repo convention (egress fully
  # open). Inbound: Prometheus /metrics scrape + kubelet /healthz. Egress
  # lockdown is a human-reviewed OPT-IN (egress.enabled, default false) — the
  # exact InfluxDB + MQTT destinations are pre-wired below so flipping it on is a
  # value-only change.
  networkPolicy:
    enabled: true
    metricsScrapeNamespace: observability
    egress:
      enabled: false
      # In-cluster InfluxDB (influxdb-influxdb2.influxdb): Service port 80.
      influxNamespace: influxdb
      influxPort: 80
      # EMQX broker VIP on the LAN (mqtt.lab.local == 192.168.50.181). Off-
      # cluster LoadBalancer target -> toCIDR /32, port 1883.
      mqttCIDR: 192.168.50.181/32
      mqttPort: 1883

  # Small stdlib HTTP server + a paho MQTT client + periodic pandas InfluxDB
  # reads/writes. pandas import is the memory floor (same as forecast serving).
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Probes on GET /healthz (stdlib ThreadingHTTPServer — up before the broker /
  # InfluxDB background jobs; a dead broker or Influx degrades reporting but does
  # NOT fail /healthz, by design).
  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 4

  # ServiceMonitor for GET /metrics on the API port (jupiter_reporting_* +
  # jupiter_savings_* + build_info; port 8080).
  serviceMonitor:
    enabled: true
    interval: 30s
    releaseLabel: kube-prometheus-stack
