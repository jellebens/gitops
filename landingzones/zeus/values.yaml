image:
  repository: jellebens/zeus
  # 0.8.0 = commander signal (#150): zeus_commander metric + retained MQTT
  # heartbeat zeus/tervuren/commander. Additive — zeus stays commander=1
  # (control.enabled true); the JUPITER cell interlock keys on this signal.
  tag: "0.8.1"
  pullPolicy: IfNotPresent

replicaCount: 1

# Scoped CiliumNetworkPolicy for the zeus namespace. INGRESS-ONLY by design:
# a Cilium policy with only `ingress` rules default-denies inbound to the zeus
# pod while leaving EGRESS fully open, so live traffic to Home Assistant / MQTT
# (vesta.local), in-cluster InfluxDB, the SMB NAS, and the weather/price APIs is
# untouched. The only inbound allowed is a Prometheus scrape of the metrics port
# from the namespace below. A fuller egress lockdown is a separate, human-
# reviewed decision — do not enable it here without validating every egress hop.
networkPolicy:
  enabled: true
  # Namespace Prometheus (kube-prometheus-stack) runs in; it scrapes the metrics
  # port. Must match the observability app's destination namespace.
  metricsScrapeNamespace: observability

# --- Distributed tracing (card #179) ---------------------------------------
# OTel OTLP export to the Jaeger v2 backend (platform/jaeger). The env var's
# PRESENCE is the whole switch (zeus.tracing, jupiter #179 pattern):
# enabled: false removes it and zeus constructs zero SDK objects —
# byte-identical to pre-#179. DEFAULT ON: the jaeger CNP already admits OTLP
# from the zeus namespace, and zeus's price-service calls carry a W3C
# traceparent so the cross-check request chain stitches into the same traces
# the lar produces. Fail-open by construction (small bounded drop-on-full
# batch queue, lazy imports, never raises) — a down collector costs dropped
# spans, never a control cycle. Requires the zeus #179 release (older images
# simply ignore the env var).
tracing:
  enabled: true
  # gRPC OTLP (4317). The HTTP variant is :4318 with the same host.
  endpoint: "http://jaeger-collector.jaeger.svc.cluster.local:4317"

# Prometheus scraping via the Prometheus Operator (kube-prometheus-stack).
serviceMonitor:
  enabled: true
  # 15s for a near-real-time kiosk (the scrape interval is the freshness ceiling,
  # not the poll). See ADR-0003. Overrides the 30s global scrapeInterval for zeus.
  interval: 15s
  # Prometheus selects ServiceMonitors with this label (serviceMonitorSelector).
  releaseLabel: kube-prometheus-stack

# Prometheus alerting rules (kube-prometheus-stack picks these up by label).
prometheusRule:
  enabled: true
  releaseLabel: kube-prometheus-stack

# Grafana dashboard provisioned as a ConfigMap, discovered by the
# kube-prometheus-stack Grafana sidecar (watches all namespaces).
dashboard:
  enabled: true
  # Label the sidecar watches for (kube-prometheus-stack default).
  sidecarLabel: grafana_dashboard
  # Grafana folder the dashboards are provisioned into, via the sidecar's
  # folder annotation (FOLDER_ANNOTATION=grafana_folder, set in
  # .config/lab/observability.yaml). Program-level "Jupiter" grouping (#127).
  folderAnnotation: grafana_folder
  folder: Jupiter

# Persist generated savings reports + history on NAS001 (SMB) so data survives
# node loss. Backed by the csi-driver-smb 'smb' StorageClass.
persistence:
  enabled: true
  storageClassName: "smb"
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /app/reports

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Kubernetes liveness/readiness probes on the /metrics port (card #60). Zeus is a
# LIVE battery controller: the probes exist so a WEDGED process (e.g. a kernel-
# level SMB hang on the reports mount that stops the process dead) gets restarted
# instead of leaving the battery uncommanded with no self-healing. They are tuned
# to NEVER kill a healthy pod — a restart loop on the controller is worse than the
# bug being fixed. This is safe because /metrics is served on prometheus_client's
# own daemon thread (brought up before any PVC I/O), so it answers independently
# of the control loop: a merely slow optimization cycle can't fail these probes,
# only a genuinely stuck process can.
probes:
  # Readiness marks the pod NotReady (drops it from the Service, pausing scrapes)
  # if /metrics stops answering; it does NOT restart, so it is the gentle signal.
  readiness:
    initialDelaySeconds: 15  # config load + metrics.serve() is sub-second; 15s is ample
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3      # ~45s unresponsive before NotReady
  # Liveness RESTARTS the pod, so it is deliberately far more tolerant: the
  # process must be unresponsive on /metrics for ~3 min continuously
  # (periodSeconds * failureThreshold = 30 * 6) before a restart. The metrics
  # thread comes up within seconds of process start (before PVC I/O), so a
  # freshly (re)started healthy pod always passes — no restart loop is possible.
  liveness:
    initialDelaySeconds: 60  # generous cold-start room (rehydration timeout is 10s)
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 6      # ~180s wedged before a restart

runtime:
  uid: 1000
  gid: 1000

# Secret injected as env (HA_TOKEN / MQTT_USER / MQTT_PASS / ENTSOE_TOKEN); the
# config.yaml below references them as ${VAR}. Provide the sealed values in
# .config/<env>/zeus.yaml (kubeseal). The Deployment mounts the
# resulting Secret with envFrom (optional, so first sync does not block).
secret:
  name: zeus-secrets
  sealedSecret:
    enabled: true
    encryptedData: {} # { HA_TOKEN: "Ag...", MQTT_USER: "Ag...", ... }

# Rendered verbatim into /config/config.yaml. Mirrors the project's
# config.example.yaml. Override per environment in .config/<env>/.
config:
  home_assistant:
    base_url: "http://vesta.local:8123"  # resolved in-cluster via coredns-config (forwards vesta.local -> router)
    token: "${HA_TOKEN}"
    verify_ssl: true
  mqtt:
    host: mqtt.lab.local  # in-cluster EMQX broker VIP (jupiter #112; was vesta.local Mosquitto)
    port: 1883
    username: "${MQTT_USER}"
    password: "${MQTT_PASS}"
    discovery_prefix: homeassistant
    base_topic: zeus
  # Durable long-term series + FUTURE-dated forecast curves (Prometheus can't
  # store the future). Token injected via the zeus-secrets envFrom (INFLUXDB_TOKEN).
  influx:
    enabled: true
    url: http://influxdb-influxdb2.influxdb
    org: zeus
    bucket: zeus
    token: "${INFLUXDB_TOKEN}"
    # JUPITER D5 tenancy (#119): tag every Influx point with the site.
    # Existing untagged history stays readable (dashboards audited); the
    # historical re-tag backfill is a human-gated P4 step.
    site_id: "tervuren"
  battery:
    usable_capacity_kwh: 13.0 # Apex 300 + 2x B500K
    # AC input capped at 10 A (~2.2 kW), shared by passthrough load + charging,
    # so grid charging can never exceed ~2.2 kW (and only gets the headroom under
    # the current load). Discharge to loads is not input-limited. Raised from
    # 7 A/1.54 kW after the connection was upgraded — see ADR-0001 (backtest
    # showed the 7 A cap throttled arbitrage; knee ~10 A).
    max_charge_kw: 2.2
    max_discharge_kw: 3.84
    max_grid_import_kw: 2.2
    soc_min_pct: 10
    soc_max_pct: 100
    charge_efficiency: 0.95
    discharge_efficiency: 0.95
    # Outage backup reserve: the optimizer will not discharge below this SoC, so
    # arbitrage never drains the critical-load battery's backup. Tune to taste
    # (higher = more backup, less arbitrage headroom).
    backup_reserve_pct: 30
    # Weather-dependent reserve: on hot days (max horizon temp >= 25C, when A/C
    # dominates and outages are less likely) relax the reserve to 10% for more
    # usable capacity. Set hot_weather_temp_c: 0 to disable.
    hot_weather_temp_c: 25
    hot_weather_reserve_pct: 10
  entities:
    soc: sensor.ap3002532000565690_battery_level
    grid_input_power: sensor.buzzbrick_ap3002532000565690_grid_input_power
    ac_output_power: sensor.buzzbrick_ap3002532000565690_alternating_current_out_power
    # Load to plan discharge against = the critical loads the battery actually
    # serves, i.e. the inverter AC output power (W). Forecasting against the
    # Fluvius whole-home counter was both wrong-scope (battery can't power the
    # whole home) and produced a ~0 forecast, so the optimizer never discharged.
    house_load_power: sensor.buzzbrick_ap3002532000565690_alternating_current_out_power
    house_load_is_counter: false
    # Dedicated A/C power plug (W) for the two_component forecast (base + A/C).
    # NB: sensor.bluetti_power is the Bluetti unit (also named "A/C Power") — the
    # real A/C plug is sensor.office_a_c_power.
    ac_power: sensor.office_a_c_power
    solar_power: sensor.buzzbrick_ap3002532000565690_photovoltaics_input_power
    # DECOMMISSIONED 2026-07-02: was sensor.current_electricity_market_price
    # (HA's ENTSO-E integration). It sat unavailable for 16h+ and zeroed the
    # savings report; savings are now priced from zeus's own resilient ENTSO-E
    # day curve (#54). Empty = the HA per-slot fallback path is skipped entirely
    # — zeus has NO dependency on any HA price sensor.
    current_price: ""
    # Fluvius digital-meter running monthly peak grid power (kW) -> the
    # capaciteitstarief is billed on this. Recorded as zeus_capacity_peak_kw.
    capacity_peak_power: sensor.fluvius_meter_1sag1100121989_peak_power
    # Aeotec Home Energy Meter on the grid mains: live whole-home grid power (W),
    # published as zeus_grid_power_w for live capacity-peak tracking. Re-paired
    # 2026-06-27 (old node froze) -> "utility_room" names; clamp now oriented
    # correctly (import lands in consumption). No export at this site (no solar;
    # Fluvius injection always 0), so export is left unset and zeus_grid_power_w =
    # consumption — this also dodges the meter's stale-register residue.
    grid_power_import: sensor.utility_room_home_energy_meter_electric_consumption_w
  # CUTOVER 2026-07-06 (#153): zeus DEMOTED to a check. enabled=false stops zeus
  # actuating and makes it emit zeus_commander=0 (#150); zeus keeps forecasting,
  # optimizing and reporting savings as the live CROSS-CHECK. The jupiter tervuren
  # cell is now the sole battery controller (controller: live). ROLLBACK: set this
  # true again (zeus reclaims the battery, commander=1, and the cell's interlock
  # stands it down). The previous price automations must stay disabled.
  control:
    enabled: false
    mode: working_mode
    working_mode:
      entity: select.apex300_working_mode
      charge_option: "CHARGING"
      discharge_option: "DISCHARGING"
      idle_option: "PASSTHROUGH"
      intent_threshold_kw: 0.1
  prices:
    # Fetch BE day-ahead prices DIRECTLY from the ENTSO-E Transparency API —
    # no Home Assistant, no community nordpool integration in the path.
    # (2026-07-01: nordpool HA integration went stale; HA's ENTSO-E integration
    # worked, so we cut straight to ENTSO-E. Token in zeus-secrets/ENTSOE_TOKEN.)
    # Resilience: staleness guard + last-good cache (memory + PVC-persisted) +
    # retry with backoff/jitter — see zeus ADR-0011 and cards #48/#50/#57/#58.
    # 2026-07-04 (#108 soak): consume the jupiter price-service. On ANY
    # jupiter failure zeus falls through to the direct ENTSO-E path below,
    # then the local last-good cache, then safe hold (card #107) — the
    # entsoe: block stays authoritative for the fallback.
    source: jupiter
    jupiter:
      base_url: http://price-service.jupiter-central.svc.cluster.local:8080
    # DECOMMISSIONED 2026-07-02: the ha_forecast alternative pointed at
    # sensor.average_electricity_price (HA's ENTSO-E integration), which went
    # unavailable for 16h+ on 07-02 (same failure class as the nordpool
    # integration on 07-01, see ADR-0011). zeus must have NO dependency on any
    # HA price sensor; ENTSO-E direct (+cache) is the only price path. Empty
    # entity keeps the generic feature disabled for this deployment.
    ha_forecast:
      entity: ""
      forecast_attribute: prices_today
    entsoe:
      api_token: "${ENTSOE_TOKEN}"
      area_code: "10YBE----------2"
      # Persist the last-good ENTSO-E curve to the PVC (card #50) so it survives
      # restarts. ABSOLUTE on purpose: zeus config.py defaults this to the
      # relative 'reports/entsoe_last_good.json', which only lands on the mount
      # by WORKDIR /app coincidence — pin it like the other /app/reports/* paths.
      cache_path: /app/reports/entsoe_last_good.json
    price_scale: 1.0 # ENTSO-E parser already yields EUR/kWh
    import_markup: 0.0
    # VAT on the effective IMPORT price (card #118). Composition (zeus.prices):
    #   import_price = (raw_price + import_markup) * (1 + vat_rate)
    # 0.06 = Belgium's reduced residential energy VAT (permanent since 2023),
    # confirmed against the owner's Bolt invoice (every energy line at 6%).
    # IMPORT-only: injection/export compensation is ex-VAT, so export_price is
    # NOT VAT-adjusted. NOTE: takes effect only once a zeus image that supports
    # prices.vat_rate ships (older images ignore this key); before that image
    # the value is inert. Bumps zeus_battery_savings_today going forward from the
    # deploy date — annotate the dashboard at the change date, do NOT rewrite
    # history.
    vat_rate: 0.06
    export_price: 0.0
  optimizer:
    horizon_hours: 36
    # 15-min to match Nord Pool's 15-min settlement: the optimizer sees the
    # intra-hour spread and the "current price" is the live quarter. 36h -> 144
    # slots, ~40ms solve. Safe since 0.1.33: the load forecast is slot-duration
    # aware (forecasts hourly, expands to slots scaling by duration) and a
    # non-Optimal solve falls back to a price heuristic instead of PASSTHROUGH.
    slot_minutes: 15
    # Battery-wear cost per kWh of throughput (charge+discharge each). 0.0 =
    # maximize energy savings, wear-agnostic. It still won't cycle for nothing:
    # round-trip efficiency (~90%) is a natural floor on pointless cycling. A
    # sweep on 2026-06-28 vs the live curve showed 0.03 sat past a cliff (skipped
    # a €0.51/kWh peak, ~2.5x less savings); 0.0 captures every profitable spread.
    cycle_penalty: 0.0
    terminal_value_price: null
    # Capacity-tariff peak shaving (capaciteitstarief). ENABLED 2026-07-03 (#84).
    # rate_eur_per_kw_month = the Fluvius contract rate; floor_kw 2.5 is the
    # regulated minimum (no benefit shaving below it). peak_reserve_pct: 10 means
    # during predicted-peak slots ONLY the optimizer may discharge down to
    # soc_min_pct (10%) — deliberately dipping into the outage-backup reserve to
    # shave the billed monthly peak (owner-chosen maximum shaving). The HARD floor
    # stays soc_min_pct; outside peak slots the normal backup_reserve_pct (30% /
    # hot-weather 10%) applies. Predicted peaks come from the HEM hour-of-week p90
    # detector (zeus_predicted_peak_slot).
    capacity:
      enabled: true
      rate_eur_per_kw_month: 3.3
      floor_kw: 2.5
      peak_reserve_pct: 10
      peak_discharge_incentive_eur_per_kwh: 0.05
  forecast:
    # JUPITER P2.5 (#123): consume the central forecast-service; on ANY failure
    # zeus falls back to in-process fitting for that cycle (the local forecaster
    # stays warm). site_id defaults to influx.site_id (tervuren).
    source: jupiter
    jupiter:
      base_url: http://forecast-service.jupiter-central.svc.cluster.local:8080
    # Two-component: flat base load + temperature-driven A/C (from the A/C plug).
    # Falls back to the single temp model until the (forward-only) A/C history
    # has enough slots (~a day).
    model: two_component
    history_days: 30
    # Accumulate realized load on the PVC so the forecaster keeps more than HA's
    # short recorder retention.
    load_cache_path: /app/reports/load_history.csv
    # A/C plug history (forward-only; the plug's pre-existing history is ignored).
    ac_persist_path: /app/reports/ac_history.csv
    store_days: 120
    weather:
      # Home coordinates (from HA config). Temperature via Open-Meteo (no key).
      latitude: 50.857017
      longitude: 4.5362013
      # Cooling-degree base ~ the indoor A/C setpoint (the "eye" reads ~22C
      # inside); A/C load accrues as outdoor climbs above this.
      base_temp_c: 21.0
      past_days: 14
      forecast_days: 2
  reporting:
    timezone: Europe/Brussels
    output_dir: /app/reports
    # Battery only charges from grid and powers critical loads -> arbitrage model.
    mode: arbitrage
  run:
    # Re-plan + actuate every 15 min to follow the 15-min market price blocks.
    interval_minutes: 15
    dry_run: false # LIVE actuation
    # Re-plan early (between cycles) when the live load drops, opening charge
    # headroom under the import cap. Also refreshes the live (measured) metrics
    # each poll -> 10s for a near-real-time kiosk (ADR-0003). Each poll makes a few
    # HA reads, so don't push this much lower.
    poll_seconds: 10
    replan_load_drop_kw: 0.4
    # The Aeotec HEM doesn't push live Watts reliably, so actively poll it every
    # 60s (it answers polls fine) to keep zeus_grid_power_w fresh for the capacity
    # cross-check. 60s gives ~15 samples per quarter for the 15-min average.
    grid_power_poll_seconds: 60
  metrics:
    enabled: true
    port: 9000
