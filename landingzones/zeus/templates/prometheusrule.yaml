{{- if and .Values.config.metrics.enabled .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: zeus
  namespace: zeus
  labels:
    app.kubernetes.io/name: zeus
    app.kubernetes.io/part-of: zeus
    # Picked up by the kube-prometheus-stack Prometheus ruleSelector.
    release: {{ .Values.prometheusRule.releaseLabel | quote }}
spec:
  groups:
    - name: zeus
      # ALERTING CONVENTION since the P4 cutover (2026-07-06, #153 / audit #174):
      # zeus is a DEMOTED advisory cross-check (control.enabled=false) emitting
      # zeus_commander{site_id="tervuren"} == 0; the jupiter LAR commands the
      # battery. Two classes of rule:
      #   * controller-era (meaningful only while zeus commands the battery):
      #     gated with `and on() (max(zeus_commander) == 1)` — silent while zeus
      #     is demoted, auto-rearmed the moment zeus is re-promoted
      #     (control.enabled=true -> commander=1), so the gate doubles as the
      #     rollback safety net.
      #   * check-health (zeus must keep running/computing for the parity check
      #     to have value): kept UNGATED.
      # Vector matching: max() aggregates away zeus_commander's labels (site_id,
      # instance, ...) and on() matches on the empty label set, so the gate
      # composes with any left-hand series regardless of its labels.
      # zeus-vs-LAR divergence signals are NOT alerted here — they belong to the
      # jupiter shadow harness; the expectation-aware price-coverage alerts are
      # owned by the jupiter-central rules (#172).
      rules:
        - alert: ZeusDown
          expr: up{job="zeus-metrics"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Zeus metrics target is down
            description: Prometheus has not been able to scrape zeus /metrics for 10m.
        - alert: ZeusCycleStalled
          expr: time() - zeus_last_cycle_timestamp_seconds > 7200
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Zeus optimizer cycle stalled
            description: No completed optimization cycle for over 2h (cycles run hourly).
        - alert: ZeusCycleFailing
          expr: increase(zeus_cycle_failures_total[1h]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Zeus optimization cycles are failing
            description: '{{ "{{ $value }}" }} cycle failure(s) in the last hour.'
        - alert: ZeusPriceSourceDegraded
          # zeus is self-healing over a price-feed hiccup: it fell back to the
          # secondary price entity (1) or the last-good cached curve (2). The
          # battery is still commanded (not coasting), but the primary feed
          # needs attention.
          #
          # Codes it deliberately EXCLUDES (zeus v0.1.54 source model,
          # zeus/zeus/main.py _SRC + zeus/zeus/metrics.py):
          #   0 = primary AND the cache-first "cache-fresh" serve (#63): a
          #       full-coverage serve of immutable, already-published day-ahead
          #       prices is HEALTHY, not degraded — mapping it here would page
          #       every steady-state cycle where the ENTSO-E call is skipped.
          #   4 = partial horizon coverage (#58): handled by its own
          #       ZeusPricePartialCoverage warning below, NOT lumped in with a
          #       hard degrade. With a 36h horizon and day-ahead publication at
          #       ~13:00 CET the tail is uncovered most of the day BY DESIGN, so
          #       a naive == 4 alert would page permanently — hence the long
          #       `for:` on the dedicated rule rather than inclusion here.
          #   3 = no data at all: its own ZeusNoPriceData critical rule.
          #
          # POST-CUTOVER (#174): KEPT UNGATED — check-health. This watches
          # zeus's own input pipeline, not its command authority: a broken
          # primary feed degrades the parity check's fidelity (exactly the
          # inputs-divergence class of noise) and needs fixing regardless of
          # who commands the battery. ("battery is still commanded" above is
          # pre-cutover wording; while demoted read it as "the advisory plan is
          # still computed".)
          expr: zeus_price_source == 1 or zeus_price_source == 2
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Zeus running on a degraded price source
            description: The primary price feed has been unavailable for 30m; zeus is on the fallback entity / cached curve. Check the price integration.
        - alert: ZeusPricePartialCoverage
          # #58: code 4 = a "*-partial" serve (primary-partial / fallback-partial
          # / cache-partial). The served curve covers the horizon START but not
          # its END, so zeus LOCF-flat-lines the uncovered tail. Distinct from a
          # plain cache serve (2): the flat tail can silently mis-shape the
          # optimizer's later slots, so it warrants its own signal.
          #
          # LONG `for:` on purpose. The routine end-of-horizon tail is uncovered
          # most of the day by design and clears each afternoon when the next
          # day-ahead curve publishes (~13:00 CET). `for: 6h` rides through that
          # normal daily window so a benign tail self-heals before firing, and
          # only a STUCK partial (a feed that stays short across a publication
          # boundary — a genuinely short/broken curve, now rarer given #57
          # backoff + #63 cache-first) sustains long enough to page.
          # NOTE FOR REVIEW: 6h is a deliberate conservative pick, not derived
          # from measured data — tune against real partial-coverage dwell times.
          #
          # POST-CUTOVER (#174): commander-gated — controller-era. Double-role
          # rule: it is also expectation-blind (no notion of the day-ahead
          # publish-by deadline; it fired continuously from the 07-06 cutover).
          # While zeus is demoted a flat-lined tail only mis-shapes zeus's
          # ADVISORY plan, not the battery, so the commander gate suffices; the
          # expectation-aware LAR-side coverage alerting is owned by the
          # jupiter-central rules (#172).
          expr: (zeus_price_source == 4) and on() (max(zeus_commander) == 1)
          for: 6h
          labels:
            severity: warning
          annotations:
            summary: Zeus price curve has partial horizon coverage
            description: The served price curve has covered only the start of the optimization horizon (uncovered tail LOCF-flat-lined) for 6h. A transient end-of-horizon tail is normal and self-clears at day-ahead publication; a sustained partial means the feed is returning a short curve. Check the price integration.
        - alert: ZeusNoPriceData
          # No prices from primary, fallback, or cache -> zeus is holding a SAFE
          # IDLE each cycle (no arbitrage) until a feed returns. More urgent than
          # a mere degrade because there is no price signal at all.
          #
          # POST-CUTOVER (#174): KEPT UNGATED — check-health (absolute feed
          # staleness). With no price data at all the parity check runs blind
          # and its would-be plan is worthless; also worth knowing promptly
          # since a shared upstream (ENTSO-E) could hit the LAR too.
          expr: zeus_price_source == 3
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: Zeus has no price data
            description: Primary, fallback, and cached price sources have all been empty for 15m; zeus is holding a safe idle (no charge/discharge) until a feed returns.
        - alert: ZeusSocCriticallyLow
          # POST-CUTOVER (#174): KEPT UNGATED — physical-battery telemetry, not
          # command authority: zeus merely OBSERVES SoC, and this is the only
          # SoC-floor alert in this repo (an independent safety net on the
          # battery whoever commands it). Watch item: the LAR's peak-shaving
          # policy may deliberately ride to its 10% floor — if that makes this
          # flap, tighten the threshold or move ownership to the jupiter rules
          # rather than commander-gating a physical-safety signal.
          expr: zeus_soc_percent < 12
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: Zeus battery SoC critically low
            description: 'SoC has been {{ "{{ $value }}" }}% for over 1h (near the floor).'
        - alert: ZeusControlUnavailable
          # The working-mode select went unavailable -> zeus commands are no-ops.
          #
          # POST-CUTOVER (#174): commander-gated — controller-era. With zeus
          # demoted (control.enabled=false) its commands are no-ops BY DESIGN,
          # so an unavailable control surface is not actionable from zeus's
          # side; the LAR owns actuation health. Auto-rearms as a critical if
          # zeus is ever re-promoted.
          expr: (zeus_control_available == 0) and on() (max(zeus_commander) == 1)
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Zeus cannot control the battery
            description: The control entity (working-mode select) has been unavailable for 10m; zeus charge/discharge commands have no effect.
        - alert: ZeusOptimizerNotOptimal
          # The LP solver returned a non-Optimal status (e.g. Infeasible), so zeus
          # is running on the price-percentile fallback rather than a real plan.
          # Usually a bad/over-stated forecast or mis-set bound. Savings degrade
          # until fixed.
          #
          # POST-CUTOVER (#174): KEPT UNGATED — check-health. A non-Optimal LP
          # means zeus's would-be plan is the crude percentile fallback, which
          # makes the zeus-vs-LAR parity comparison meaningless; the check only
          # has value while the solver genuinely solves. Internal computation
          # health, independent of who commands the battery.
          expr: zeus_solver_optimal == 0
          for: 20m
          labels:
            severity: warning
          annotations:
            summary: Zeus optimizer not solving to optimality
            description: The dispatch LP has been non-Optimal for 20m; zeus is on the price-percentile fallback (charge cheap / discharge expensive) instead of an optimized plan.
        - alert: ZeusBatteryStateMismatch
          # Measured battery mode disagrees with the commanded mode -> actuation is
          # likely failing or another controller is driving the battery. Covers:
          # commanded DISCHARGING/PASSTHROUGH not honoured, and CHARGING that is
          # actually DISCHARGING. EXCLUDES the benign "commanded CHARGING but idle"
          # case (charging is throttled under the shared grid-import cap, so it can
          # legitimately read idle). Gated on control being available (a dead
          # control surface is covered by ZeusControlUnavailable).
          #
          # POST-CUTOVER (#174): commander-gated — controller-era. This rule
          # compares demoted zeus's WOULD-BE mode against a battery that now
          # follows the jupiter LAR, so post-cutover it was pure noise (15
          # flaps/24h; shadow harness verified logic_divergence=0 — the
          # disagreement was input-driven, not a battery fault). zeus-vs-LAR
          # divergence is the jupiter shadow harness's signal, not an alert
          # here. Auto-rearms if zeus is re-promoted.
          expr: (((zeus_mode_code != ignoring(__name__) zeus_actual_mode_code) unless ignoring(__name__) ((zeus_mode_code == 1) and ignoring(__name__) (zeus_actual_mode_code == 0))) and ignoring(__name__) (zeus_control_available == 1)) and on() (max(zeus_commander) == 1)
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Zeus battery not in the commanded mode
            description: Measured battery mode has differed from the commanded mode (zeus_mode_code vs zeus_actual_mode_code) for 15m while control is available; charge/discharge actuation may be failing or something else is driving the battery.
{{- end }}
