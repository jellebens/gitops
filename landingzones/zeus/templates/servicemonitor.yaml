{{- if and .Values.config.metrics.enabled .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zeus
  namespace: zeus
  labels:
    app.kubernetes.io/name: zeus
    app.kubernetes.io/part-of: zeus
    # Picked up by the kube-prometheus-stack Prometheus serviceMonitorSelector.
    release: {{ .Values.serviceMonitor.releaseLabel | quote }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: zeus
  namespaceSelector:
    matchNames:
      - zeus
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
