apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeus
  namespace: zeus
  labels:
    app.kubernetes.io/name: zeus
    app.kubernetes.io/part-of: zeus
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: zeus
  # Single long-running loop; never run two side by side or they would issue
  # conflicting commands to the battery.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zeus
        app.kubernetes.io/part-of: zeus
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and .Values.secret.sealedSecret.enabled .Values.secret.sealedSecret.encryptedData }}
        checksum/secret: {{ include (print $.Template.BasePath "/sealed-secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.runtime.uid }}
        runAsGroup: {{ .Values.runtime.gid }}
        fsGroup: {{ .Values.runtime.gid }}
      containers:
        - name: optimizer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
                optional: true
          {{- if .Values.config.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.config.metrics.port }}
              protocol: TCP
          # Probes hit the prometheus_client /metrics server, which runs on its
          # own daemon thread (started before any PVC I/O). It answers regardless
          # of the control loop's state and only stops if the whole process is
          # wedged (e.g. a kernel-level SMB hang on the reports mount) — exactly
          # the failure we want Kubernetes to restart. Thresholds are deliberately
          # generous: zeus is a LIVE battery controller and a restart loop is worse
          # than the bug, so a HEALTHY pod must never be killed. See card #60.
          {{- with .Values.probes.readiness }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          {{- with .Values.probes.liveness }}
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: reports
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: zeus-config
        {{- if .Values.persistence.enabled }}
        - name: reports
          persistentVolumeClaim:
            claimName: zeus-reports
        {{- end }}
