image:
  repository: ghcr.io/openclaw/openclaw
  tag: "2026.6.1"
  pullPolicy: IfNotPresent

replicaCount: 1

persistence:
  enabled: true
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /home/node/.openclaw

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

gateway:
  enabled: true
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: http
  hostnames:
    - hermes.lab.local
  httpToHttpsRedirect:
    enabled: false
    sectionName: http

tlsCertificate:
  enabled: false
  secretName: hermes-server-tls
  commonName: hermes.lab.local
  dnsNames:
    - hermes.lab.local
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

gatewayToken:
  enabled: true
  secretName: hermes-gateway-token
  secretKey: gateway-token

openai:
  enabled: true
  secretName: hermes-openai-api-key
  secretKey: api-key

config:
  agents:
    defaults:
      model:
        primary: openai/gpt-5.5
    list:
      - id: hermes
        default: true
        name: Hermes
        workspace: /home/node/.openclaw/workspace
        agentDir: /home/node/.openclaw/agents/hermes/agent
        model:
          primary: openai/gpt-5.5
        identity:
          name: Hermes
          theme: concise AI assistant for everyday planning, writing, and operations support
  gateway:
    mode: local
    bind: lan
    port: 8080
    auth:
      mode: token
    controlUi:
      allowedOrigins:
        - http://hermes.lab.local
        - https://hermes.lab.local
