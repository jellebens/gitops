image:
  repository: nousresearch/hermes-agent
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

persistence:
  enabled: true
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /opt/data

service:
  type: ClusterIP
  port: 80
  targetPort: 9119

gateway:
  enabled: true
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: http
  hostnames:
    - hermes.lab.local
  httpToHttpsRedirect:
    enabled: false
    sectionName: http

tlsCertificate:
  enabled: false
  secretName: hermes-server-tls
  commonName: hermes.lab.local
  dnsNames:
    - hermes.lab.local
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

openai:
  enabled: true
  secretName: hermes-openai-api-key
  secretKey: api-key

runtime:
  uid: "10000"
  gid: "10000"

gatewayProcess:
  enabled: true
  args:
    - gateway
    - run

dashboard:
  enabled: true
  port: 9119
  host: 0.0.0.0
  insecure: true

config:
  model:
    default: gpt-5.5
    provider: custom
    base_url: https://api.openai.com/v1
  terminal:
    backend: local
    cwd: /opt/data/workspace
    timeout: 180
    home_mode: profile
  memory:
    memory_enabled: true
    user_profile_enabled: true
