image:
  repository: nousresearch/hermes-agent
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

persistence:
  enabled: true
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /opt/data

service:
  type: ClusterIP
  port: 80
  targetPort: 9119

gateway:
  enabled: true
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: http
  hostnames:
    - hermes.lab.local
  httpToHttpsRedirect:
    enabled: false
    sectionName: http

tlsCertificate:
  enabled: false
  secretName: hermes-server-tls
  commonName: hermes.lab.local
  dnsNames:
    - hermes.lab.local
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

openai:
  enabled: true
  secretName: hermes-openai-api-key
  secretKey: api-key

runtime:
  uid: "10000"
  gid: "10000"

gatewayProcess:
  enabled: true
  args:
    - sleep
    - infinity

dashboard:
  enabled: true
  port: 9119
  host: 0.0.0.0
  insecure: true

config:
  display:
    skin: ares
  mcp:
    servers:
      ms365:
        command: npx
        args:
          - -y
          - "@softeria/ms-365-mcp-server"
          - --preset
          - mail,calendar
          - --allowed-scopes
          - User.Read Mail.ReadWrite Mail.Send Calendars.ReadWrite
        env:
          XDG_CACHE_HOME: /opt/data/.cache
          XDG_CONFIG_HOME: /opt/data/.config
          MS365_MCP_EXPECTED_USERNAME: jellebens@outlook.com
        toolFilter:
          include:
            - list-mail-*
            - get-mail-*
            - create-mail-*
            - create-draft-email
            - send-mail
            - send-draft-message
            - update-mail-*
            - delete-mail-*
            - move-mail-*
            - copy-mail-*
            - reply-mail-*
            - reply-all-mail-*
            - forward-mail-*
            - create-reply-*
            - create-reply-all-*
            - create-forward-*
            - add-mail-*
            - list-calendar-*
            - get-calendar-*
            - create-calendar-event
            - update-calendar-event
            - delete-calendar-event
            - cancel-calendar-event
            - get-schedule
            - find-meeting-times
        requestTimeoutMs: 30000
        connectionTimeoutMs: 30000
        supportsParallelToolCalls: false
  model:
    default: gpt-5.5
    provider: custom
    base_url: https://api.openai.com/v1
  terminal:
    backend: local
    cwd: /opt/data/workspace
    timeout: 180
    home_mode: profile
  toolsets:
    - hermes-cli
    - mcp
  memory:
    memory_enabled: true
    user_profile_enabled: true
