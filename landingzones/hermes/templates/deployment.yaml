apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: hermes
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
        app.kubernetes.io/part-of: hermes
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.cortana.soul }}
        checksum/cortana-soul: {{ include (print $.Template.BasePath "/cortana-soul-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.writer.soul }}
        checksum/writer-soul: {{ include (print $.Template.BasePath "/writer-soul-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.aetos.soul }}
        checksum/aetos-soul: {{ include (print $.Template.BasePath "/aetos-soul-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.hebe.soul }}
        checksum/hebe-soul: {{ include (print $.Template.BasePath "/hebe-soul-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.openai.enabled }}
        checksum/openai-api-key: {{ include (print $.Template.BasePath "/openai-sealed-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if and .Values.discord.enabled .Values.discord.sealedSecret.encryptedToken }}
        checksum/discord-token: {{ include (print $.Template.BasePath "/hermes-discord-token.yaml") . | sha256sum }}
        {{- end }}
    spec:
      {{- if .Values.persistence.enabled }}
      securityContext:
        fsGroup: 1000
      {{- end }}
      initContainers:
        - name: seed-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              mkdir -p /opt/data/workspace
              cp /config/config.yaml /opt/data/config.yaml
              {{- if .Values.cortana.soul }}
              cp /config/SOUL.md /opt/data/SOUL.md
              {{- end }}
              /opt/hermes/.venv/bin/python - <<'PY'
              import json
              from pathlib import Path

              state_file = Path("/opt/data/gateway_state.json")
              if state_file.exists():
                  try:
                      state = json.loads(state_file.read_text())
                  except json.JSONDecodeError:
                      state = {}
                  desired_state = state.get("desired_state")
                  runtime_state = state.get("gateway_state")
                  if desired_state is None and runtime_state in {"draining", "starting"}:
                      state["gateway_state"] = "running"
                      state["desired_state"] = "running"
                      state["recovered_from_state"] = runtime_state
                      state_file.write_text(json.dumps(state, separators=(",", ":")) + "\n")
              PY
              {{- if .Values.git.enabled }}
              # Writer git setup is best-effort: never block the agent on it.
              (
                set -e
                mkdir -p /opt/data/.ssh {{ .Values.git.clonePath }}
                cp /secrets/git-ssh/{{ .Values.git.ssh.secretKey }} /opt/data/.ssh/id_ed25519
                chmod 700 /opt/data/.ssh
                chmod 600 /opt/data/.ssh/id_ed25519
                printf '%s\n' {{ .Values.git.ssh.knownHosts | trim | quote }} > /opt/data/.ssh/known_hosts
                export GIT_SSH_COMMAND="ssh -i /opt/data/.ssh/id_ed25519 -o UserKnownHostsFile=/opt/data/.ssh/known_hosts -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
                # init runs as root but the clone is hermes-owned on restarts;
                # allow git to operate on it without dubious-ownership errors.
                git config --global --add safe.directory {{ .Values.git.clonePath }}
                {{- with .Values.git.repoUrl }}
                if [ ! -d {{ $.Values.git.clonePath }}/.git ]; then
                  git clone {{ . }} {{ $.Values.git.clonePath }}
                else
                  git -C {{ $.Values.git.clonePath }} remote set-url origin {{ . }}
                  git -C {{ $.Values.git.clonePath }} fetch --prune origin || true
                fi
                git -C {{ $.Values.git.clonePath }} checkout {{ $.Values.git.branch }} 2>/dev/null || git -C {{ $.Values.git.clonePath }} checkout -B {{ $.Values.git.branch }} origin/{{ $.Values.git.branch }} 2>/dev/null || true
                git -C {{ $.Values.git.clonePath }} config user.name {{ $.Values.git.author.name | quote }}
                git -C {{ $.Values.git.clonePath }} config user.email {{ $.Values.git.author.email | quote }}
                {{- end }}
              ) || echo "[seed] WARN: writer git setup failed; agent starting without it"
              {{- end }}
              {{- if .Values.hebe.git.enabled }}
              # Hebe (update watcher) git setup is best-effort: never block the
              # agent on it. Her key is installed at a distinct path and pinned to
              # her clone via a per-repo core.sshCommand, so it never clashes with
              # the writer's global GIT_SSH_COMMAND key.
              (
                set -e
                mkdir -p /opt/data/.ssh {{ .Values.hebe.git.clonePath }}
                cp /secrets/hebe-git-ssh/{{ .Values.hebe.git.ssh.secretKey }} {{ .Values.hebe.git.ssh.keyPath }}
                chmod 700 /opt/data/.ssh
                chmod 600 {{ .Values.hebe.git.ssh.keyPath }}
                # Merge Hebe's host key into the shared known_hosts (append if absent).
                touch /opt/data/.ssh/known_hosts
                printf '%s\n' {{ .Values.hebe.git.ssh.knownHosts | trim | quote }} >> /opt/data/.ssh/known_hosts
                sort -u /opt/data/.ssh/known_hosts -o /opt/data/.ssh/known_hosts
                git config --global --add safe.directory {{ .Values.hebe.git.clonePath }}
                {{- with .Values.hebe.git.repoUrl }}
                HEBE_SSH="ssh -i {{ $.Values.hebe.git.ssh.keyPath }} -o UserKnownHostsFile=/opt/data/.ssh/known_hosts -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
                if [ ! -d {{ $.Values.hebe.git.clonePath }}/.git ]; then
                  GIT_SSH_COMMAND="$HEBE_SSH" git clone {{ . }} {{ $.Values.hebe.git.clonePath }}
                else
                  git -C {{ $.Values.hebe.git.clonePath }} remote set-url origin {{ . }}
                  GIT_SSH_COMMAND="$HEBE_SSH" git -C {{ $.Values.hebe.git.clonePath }} fetch --prune origin || true
                fi
                # Pin the key to this clone so Hebe's `git` needs no env var.
                git -C {{ $.Values.hebe.git.clonePath }} config core.sshCommand "$HEBE_SSH"
                git -C {{ $.Values.hebe.git.clonePath }} checkout {{ $.Values.hebe.git.baseBranch }} 2>/dev/null || git -C {{ $.Values.hebe.git.clonePath }} checkout -B {{ $.Values.hebe.git.baseBranch }} origin/{{ $.Values.hebe.git.baseBranch }} 2>/dev/null || true
                git -C {{ $.Values.hebe.git.clonePath }} config user.name {{ $.Values.hebe.git.author.name | quote }}
                git -C {{ $.Values.hebe.git.clonePath }} config user.email {{ $.Values.hebe.git.author.email | quote }}
                {{- end }}
              ) || echo "[seed] WARN: hebe git setup failed; agent starting without it"
              {{- end }}
              chown -R {{ .Values.runtime.uid }}:{{ .Values.runtime.gid }} /opt/data
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: state
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
              readOnly: true
            {{- if .Values.cortana.soul }}
            - name: cortana-soul
              mountPath: /config/SOUL.md
              subPath: SOUL.md
              readOnly: true
            {{- end }}
            {{- if .Values.git.enabled }}
            - name: git-ssh
              mountPath: /secrets/git-ssh
              readOnly: true
            {{- end }}
            {{- if .Values.hebe.git.enabled }}
            - name: hebe-git-ssh
              mountPath: /secrets/hebe-git-ssh
              readOnly: true
            {{- end }}
      containers:
        {{- if .Values.gatewayProcess.enabled }}
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml .Values.gatewayProcess.args | nindent 12 }}
          env:
            - name: HERMES_UID
              value: {{ .Values.runtime.uid | quote }}
            - name: HERMES_GID
              value: {{ .Values.runtime.gid | quote }}
            {{- if .Values.dashboard.enabled }}
            - name: HERMES_DASHBOARD
              value: "true"
            - name: HERMES_DASHBOARD_HOST
              value: {{ .Values.dashboard.host | quote }}
            - name: HERMES_DASHBOARD_PORT
              value: {{ .Values.dashboard.port | quote }}
            - name: HERMES_DASHBOARD_INSECURE
              value: {{ .Values.dashboard.insecure | quote }}
            {{- end }}
            {{- if .Values.openai.enabled }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.secretName | quote }}
                  key: {{ .Values.openai.secretKey | quote }}
            {{- end }}
            {{- if .Values.discord.enabled }}
            - name: {{ .Values.discord.envName | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.discord.secretName | quote }}
                  key: {{ .Values.discord.secretKey | quote }}
            - name: DISCORD_HOME_CHANNEL
              value: {{ .Values.discord.homeChannel | quote }}
            - name: DISCORD_HOME_CHANNEL_NAME
              value: {{ .Values.discord.homeChannelName | quote }}
            {{- end }}
            {{- if .Values.git.enabled }}
            - name: GIT_SSH_COMMAND
              value: "ssh -i /opt/data/.ssh/id_ed25519 -o UserKnownHostsFile=/opt/data/.ssh/known_hosts -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
            {{- end }}
          ports:
            {{- if .Values.dashboard.enabled }}
            - name: http
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
            {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: state
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.writer.soul }}
            - name: writer-soul
              mountPath: {{ .Values.writer.soulPath }}
              subPath: SOUL.md
              readOnly: true
            {{- end }}
            {{- if .Values.aetos.soul }}
            - name: aetos-soul
              mountPath: {{ .Values.aetos.soulPath }}
              subPath: SOUL.md
              readOnly: true
            {{- end }}
            {{- if .Values.hebe.soul }}
            - name: hebe-soul
              mountPath: {{ .Values.hebe.soulPath }}
              subPath: SOUL.md
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: state
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.claimName | default "hermes-state" }}
        {{- end }}
        - name: config
          configMap:
            name: hermes-config
        {{- if .Values.cortana.soul }}
        - name: cortana-soul
          configMap:
            name: hermes-cortana-soul
        {{- end }}
        {{- if .Values.writer.soul }}
        - name: writer-soul
          configMap:
            name: hermes-writer-soul
        {{- end }}
        {{- if .Values.aetos.soul }}
        - name: aetos-soul
          configMap:
            name: hermes-aetos-soul
        {{- end }}
        {{- if .Values.hebe.soul }}
        - name: hebe-soul
          configMap:
            name: hermes-hebe-soul
        {{- end }}
        {{- if .Values.git.enabled }}
        - name: git-ssh
          secret:
            secretName: {{ .Values.git.ssh.secretName | quote }}
            defaultMode: 0400
            items:
              - key: {{ .Values.git.ssh.secretKey | quote }}
                path: {{ .Values.git.ssh.secretKey | quote }}
        {{- end }}
        {{- if .Values.hebe.git.enabled }}
        - name: hebe-git-ssh
          secret:
            secretName: {{ .Values.hebe.git.ssh.secretName | quote }}
            defaultMode: 0400
            items:
              - key: {{ .Values.hebe.git.ssh.secretKey | quote }}
                path: {{ .Values.hebe.git.ssh.secretKey | quote }}
        {{- end }}
