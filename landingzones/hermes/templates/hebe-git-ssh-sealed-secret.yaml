{{- if and .Values.hebe.git.enabled .Values.hebe.git.ssh.sealedSecret.encryptedKey }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.hebe.git.ssh.secretName | quote }}
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: hermes
spec:
  encryptedData:
    {{ .Values.hebe.git.ssh.secretKey }}: {{ .Values.hebe.git.ssh.sealedSecret.encryptedKey }}
  template:
    metadata:
      name: {{ .Values.hebe.git.ssh.secretName | quote }}
      namespace: hermes
    type: Opaque
{{- end }}
