{{- if and .Values.cerberus.trello.enabled .Values.cerberus.trello.sealedSecret.encryptedApiKey .Values.cerberus.trello.sealedSecret.encryptedToken }}
# Trello API credentials for the Cerberus watchdog subagent (card #187).
# Read-only diagnosis + Trello card creation ONLY — cerberus never mutates the
# cluster or the battery. The key/token let cerberus reach the Trello REST API
# (api.trello.com) over the pod's open egress to file/dedup cards, mirroring the
# in-cluster curl pattern it already uses for Prometheus. Both halves are sealed
# (SealedSecrets, controller `sealed-secrets` in ns `argocd`); only the encrypted
# values live in git. Disabled until the sealed values are provided in the
# environment overlay (.config/lab/hermes.yaml).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.cerberus.trello.secretName | quote }}
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: hermes
spec:
  encryptedData:
    {{ .Values.cerberus.trello.apiKeyKey }}: {{ .Values.cerberus.trello.sealedSecret.encryptedApiKey }}
    {{ .Values.cerberus.trello.tokenKey }}: {{ .Values.cerberus.trello.sealedSecret.encryptedToken }}
  template:
    metadata:
      name: {{ .Values.cerberus.trello.secretName | quote }}
      namespace: hermes
    type: Opaque
{{- end }}
