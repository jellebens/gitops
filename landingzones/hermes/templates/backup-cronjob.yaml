{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hermes-backup
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: hermes
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  # If a window is missed (controller down, stuck predecessor just killed),
  # still start up to this late; after that, wait for the next nightly window.
  startingDeadlineSeconds: {{ .Values.backup.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      # Hard-kill a run that hangs (e.g. an unmountable SMB volume kept the
      # 2026-06-29 job in ContainerCreating for 10 days; with Forbid above,
      # that silently blocked every later run). A normal run takes ~30s, so
      # anything past this deadline is wedged: the job is marked Failed and
      # the next nightly window can run.
      activeDeadlineSeconds: {{ .Values.backup.activeDeadlineSeconds }}
      # GC finished jobs after a few days (history limits above trim sooner);
      # freshness is watched by the HermesBackupNotRun alert, not job objects.
      ttlSecondsAfterFinished: {{ .Values.backup.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: hermes-backup
            app.kubernetes.io/part-of: hermes
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          # The live state PVC is local-path (node-pinned, RWO); co-locate the
          # backup pod on the same node as the agent so it can attach the volume.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: hermes
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
              args:
                - |
                  set -eu
                  TS="$(date +%Y%m%d-%H%M%S)"
                  # Stage on local disk first: SQLite's .backup does page-by-page
                  # writes/fsyncs that are pathologically slow over CIFS. Bulk-copy
                  # the finished files to the SMB share at the end.
                  STAGE="/stage/${TS}"
                  DEST="/backup/${TS}"
                  mkdir -p "$STAGE"
                  DBS="{{ range .Values.backup.databases }}{{ . }} {{ end }}"
                  /opt/hermes/.venv/bin/python - "$STAGE" $DBS <<'PY'
                  import os, sqlite3, sys
                  dest = sys.argv[1]
                  for name in sys.argv[2:]:
                      src = os.path.join("/state", name)
                      if not os.path.exists(src):
                          continue
                      con = sqlite3.connect(src)
                      bck = sqlite3.connect(os.path.join(dest, name))
                      with bck:
                          con.backup(bck)
                      bck.close()
                      con.close()
                      print("backed up", name)
                  PY
                  {{- range .Values.backup.extraPaths }}
                  [ -e "/state/{{ . }}" ] && cp -a "/state/{{ . }}" "$STAGE/" || true
                  {{- end }}
                  # publish to SMB in one sequential bulk copy
                  mkdir -p "$DEST"
                  cp -a "$STAGE"/. "$DEST"/
                  rm -rf "$STAGE"
                  find /backup -maxdepth 1 -type d -name '20*' -mtime +{{ .Values.backup.retentionDays }} -exec rm -rf {} + || true
                  echo "backup complete: $DEST"
              volumeMounts:
                - name: state
                  mountPath: /state
                - name: stage
                  mountPath: /stage
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: {{ .Values.persistence.claimName | default "hermes-state" }}
            - name: stage
              emptyDir: {}
            - name: backup
              persistentVolumeClaim:
                claimName: hermes-backup
{{- end }}
