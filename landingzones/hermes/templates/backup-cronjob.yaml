{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hermes-backup
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: hermes
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: hermes-backup
            app.kubernetes.io/part-of: hermes
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          # The live state PVC is local-path (node-pinned, RWO); co-locate the
          # backup pod on the same node as the agent so it can attach the volume.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: hermes
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: backup
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                - /bin/sh
                - -c
              args:
                - |
                  set -eu
                  TS="$(date +%Y%m%d-%H%M%S)"
                  DEST="/backup/${TS}"
                  mkdir -p "$DEST"
                  DBS="{{ range .Values.backup.databases }}{{ . }} {{ end }}"
                  /opt/hermes/.venv/bin/python - "$DEST" $DBS <<'PY'
                  import os, sqlite3, sys
                  dest = sys.argv[1]
                  for name in sys.argv[2:]:
                      src = os.path.join("/state", name)
                      if not os.path.exists(src):
                          continue
                      con = sqlite3.connect(src)
                      bck = sqlite3.connect(os.path.join(dest, name))
                      with bck:
                          con.backup(bck)
                      bck.close()
                      con.close()
                      print("backed up", name)
                  PY
                  {{- range .Values.backup.extraPaths }}
                  [ -e "/state/{{ . }}" ] && cp -a "/state/{{ . }}" "$DEST/" || true
                  {{- end }}
                  find /backup -maxdepth 1 -type d -name '20*' -mtime +{{ .Values.backup.retentionDays }} -exec rm -rf {} + || true
                  echo "backup complete: $DEST"
              volumeMounts:
                - name: state
                  mountPath: /state
                - name: backup
                  mountPath: /backup
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: {{ .Values.persistence.claimName | default "hermes-state" }}
            - name: backup
              persistentVolumeClaim:
                claimName: hermes-backup
{{- end }}
