# Admin API credentials for the Plutus AI-cost tracker subagent (card #41).
# Plutus reports the owner's AI-subscription token/cost usage READ-ONLY — it
# never spends, buys, or changes anything. Each provider's usage/cost API needs
# an ADMIN-scoped key that is DISTINCT from the normal inference key:
#   * Anthropic — an Admin API key (sk-ant-admin...), created by an org admin in
#     the Anthropic Console. The normal hermes-openai-api-key / a plain
#     sk-ant-api... key CANNOT read the org usage & cost report.
#   * OpenAI — an Admin key (sk-admin...), created by an org owner in the org
#     settings. A plain project key CANNOT read /v1/organization/usage|costs.
# Both halves are sealed (SealedSecrets, controller `sealed-secrets` in ns
# `argocd`); only the encrypted values live in git. Each provider is DISABLED
# until BOTH its `.enabled` flag is set and its sealed key is provided in the
# environment overlay (.config/lab/hermes.yaml) — an absent provider is simply
# skipped by Plutus (it never invents a number). See the hermes README for the
# provisioning steps.
{{- if and .Values.plutus.anthropic.enabled .Values.plutus.anthropic.sealedSecret.encryptedAdminKey }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.plutus.anthropic.secretName | quote }}
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: hermes
spec:
  encryptedData:
    {{ .Values.plutus.anthropic.adminKeyKey }}: {{ .Values.plutus.anthropic.sealedSecret.encryptedAdminKey }}
  template:
    metadata:
      name: {{ .Values.plutus.anthropic.secretName | quote }}
      namespace: hermes
    type: Opaque
{{- end }}
{{- if and .Values.plutus.openai.enabled .Values.plutus.openai.sealedSecret.encryptedAdminKey }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.plutus.openai.secretName | quote }}
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: hermes
spec:
  encryptedData:
    {{ .Values.plutus.openai.adminKeyKey }}: {{ .Values.plutus.openai.sealedSecret.encryptedAdminKey }}
  template:
    metadata:
      name: {{ .Values.plutus.openai.secretName | quote }}
      namespace: hermes
    type: Opaque
{{- end }}
