{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: jupiter-shadow-dashboard
  namespace: jupiter-shadow
  labels:
    app.kubernetes.io/name: jupiter-shadow
    app.kubernetes.io/part-of: jupiter
    # Picked up by the kube-prometheus-stack Grafana dashboard sidecar
    # (watches ALL namespaces). Same mechanism as the zeus dashboards.
    {{ .Values.dashboard.sidecarLabel }}: "1"
data:
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
