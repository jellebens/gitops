{{- if .Values.prometheusRule.enabled }}
# jupiter-shadow — the SHADOW PARITY HARNESS (jupiter P3.6, card #141).
#
# Per evaluation, join zeus's ACTUAL dispatch (Prometheus zeus_* from the LIVE
# battery in ns zeus) against the tervuren lar's SHADOW plan (jupiter_lar_*
# in ns jupiter-tervuren) and quantify divergence. Recording rules synthesise a
# family of jupiter_shadow_* series (all site_id-labelled) that the soak
# dashboard (uid jupiter-shadow-parity) reads. This is what gates the P4
# cutover: sustained clean parity = safe to flip a site to live.
#
# APPROACH: Prometheus recording rules + a Grafana dashboard ONLY — no new
# service, no lar edit, no MQTT consumer. Chosen because BOTH stacks already
# expose the needed setpoints + source codes as scraped metrics:
#   zeus  : zeus_target_charge_kw / zeus_target_discharge_kw (ns zeus, NO
#           site_id label — the single tervuren battery), zeus_price_source
#           (0=primary 1=fallback 2=cache 3=none 4=partial), zeus_forecast_source,
#           zeus_charge_guard_trips_total.
#   lar   : jupiter_lar_target_charge_kw / _discharge_kw, jupiter_lar_price_source
#           (0=primary 1=cache 2=none), jupiter_lar_forecast_source — ALL
#           carry site_id="tervuren".
#
# JOIN MECHANICS: zeus_* has no site_id, so every zeus term is label_replace'd
# with site_id="tervuren" and joined `on(site_id)` against the lar term. The
# result set is exactly {site_id="<site>"}. If EITHER side stops exporting, the
# join yields no samples — the jupiter_shadow_* series simply go absent (the
# dashboard shows "no data", not a false 0). That absence is the both-present
# gate (jupiter_shadow_both_present).
#
# INTENT DERIVATION mirrors the lar's own jupiter_lar.plan._intent exactly:
#   charge_kw > 0  -> 1 (charging); discharge_kw > 0 -> 2 (discharging);
#   else 0 (passthrough/idle). Encoded as
#   (charge>0) + 2*(discharge>0) — an optimizer never sets both in one slot.
#
# PARITY COVERAGE (see card #141 / README for the gap analysis):
#   FULL from metrics : intent-match, setpoint-delta (kW), guard-conflict,
#                       and inputs source-CLASS parity (primary vs degraded).
#   PARTIAL from metrics: inputs_equal attribution. The two source enums are
#                       NOT numerically identical (zeus has 5 codes, the lar
#                       3), so we compare a derived degrade-CLASS (source==0 =
#                       primary/healthy vs !=0 = degraded), NOT the raw code.
#
# ROLES SINCE THE 2026-07-06 GO-LIVE (ADR-0023): the LAR is the live commander
# and zeus runs demoted as the cross-check — the harness now cross-checks
# zeus's (advisory) plan against the LIVE lar dispatch, roles swapped from the
# original #141 shadow soak. The series names/semantics are unchanged (a
# divergence is a divergence either way); guard_conflict is the one rule whose
# DIRECTION flipped (see its comment).
#
# FINE-GRAINED INPUTS EQUALITY (card #147): the lar now exports
# jupiter_lar_soc_pct and (via the reporting-service's plan-doc consumer)
# jupiter_reporting_capacity_peak_kw — so SoC and running-peak equality join
# the source-class comparison in jupiter_shadow_inputs_equal, and
# jupiter_shadow_logic_divergence_strict is the tightened gate signal.
# price_curve_etag / forecast_trained_at have NO zeus-side counterpart series,
# so cross-stack equality on them is impossible; they are exposed
# (jupiter_reporting_plan_*) for change-attribution on the lar side.
# DEPLOYMENT ORDER: the #147 series only exist once the jupiter release that
# ships them (lar + reporting) is deployed — until then the NEW rules (and the
# redefined guard_conflict) evaluate to ABSENT while every pre-#147 series
# keeps working. Absent = "not comparable yet", never a false 0.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: jupiter-shadow
  namespace: jupiter-shadow
  labels:
    app.kubernetes.io/name: jupiter-shadow
    app.kubernetes.io/part-of: jupiter
    # Picked up by the kube-prometheus-stack Prometheus ruleSelector.
    release: {{ .Values.prometheusRule.releaseLabel | quote }}
spec:
  groups:
    # ------------------------------------------------------------------ #
    # 1. Per-side derived series (site_id-labelled). Recorded first so the  #
    #    parity rules below read clean, named inputs.                       #
    # ------------------------------------------------------------------ #
    - name: jupiter-shadow-derived
      # Evaluate a touch faster than the default so the soak series track the
      # ~hourly cycles with headroom (cheap vector math, no range selectors
      # except the guard window).
      interval: 30s
      rules:
        # zeus commanded intent, from its current-slot setpoints. site_id is
        # injected so everything downstream keys on it. 0=idle 1=charge 2=discharge.
        - record: jupiter_shadow_zeus_intent_code
          expr: |
            label_replace(
              (zeus_target_charge_kw > bool 0) + 2 * (zeus_target_discharge_kw > bool 0),
              "site_id", "{{ .Values.site.id }}", "", ""
            )
        # lar shadow-plan intent, same encoding (already site_id-labelled).
        # (record name keeps the historical `_cell_` side-label; the input metric
        # is now jupiter_lar_* after the cell→lar rename, card #154.)
        - record: jupiter_shadow_cell_intent_code
          expr: |
            (jupiter_lar_target_charge_kw > bool 0) + 2 * (jupiter_lar_target_discharge_kw > bool 0)
        # Signed net setpoint (kW): + = net discharge, - = net charge. A single
        # comparable scalar per side (an optimizer never charges AND discharges
        # in the same slot, so this is lossless for the current slot).
        - record: jupiter_shadow_zeus_setpoint_kw
          expr: |
            label_replace(
              zeus_target_discharge_kw - zeus_target_charge_kw,
              "site_id", "{{ .Values.site.id }}", "", ""
            )
        - record: jupiter_shadow_cell_setpoint_kw
          expr: |
            jupiter_lar_target_discharge_kw - jupiter_lar_target_charge_kw
        # Degrade CLASS per side (0=primary/healthy, 1=degraded=any non-primary
        # code). Normalises the two DIFFERENT source enums (zeus 0..4, lar 0..2)
        # onto a common axis so a class comparison is meaningful.
        - record: jupiter_shadow_zeus_price_degraded
          expr: |
            label_replace(zeus_price_source > bool 0, "site_id", "{{ .Values.site.id }}", "", "")
        - record: jupiter_shadow_cell_price_degraded
          expr: |
            jupiter_lar_price_source > bool 0
        - record: jupiter_shadow_zeus_forecast_degraded
          expr: |
            label_replace(zeus_forecast_source > bool 0, "site_id", "{{ .Values.site.id }}", "", "")
        - record: jupiter_shadow_cell_forecast_degraded
          expr: |
            jupiter_lar_forecast_source > bool 0
        # Fine-grained inputs (card #147): SoC per side. Both read the same HA
        # entity, at different instants — equality is the tolerance band below.
        # The cell term is ABSENT until the jupiter release shipping
        # jupiter_lar_soc_pct is deployed.
        - record: jupiter_shadow_zeus_soc_pct
          expr: |
            label_replace(zeus_soc_percent, "site_id", "{{ .Values.site.id }}", "", "")
        - record: jupiter_shadow_cell_soc_pct
          expr: |
            jupiter_lar_soc_pct
        # Fine-grained inputs (card #147): running (billing-register) month peak
        # per side. The cell term is the reporting-service's re-exposition of the
        # lar plan doc's inputs.running_peak_kw — ABSENT until the #147 jupiter
        # release is deployed AND the lar has a live peak read.
        - record: jupiter_shadow_zeus_peak_kw
          expr: |
            label_replace(zeus_capacity_peak_kw, "site_id", "{{ .Values.site.id }}", "", "")
        - record: jupiter_shadow_cell_peak_kw
          expr: |
            jupiter_reporting_capacity_peak_kw

    # ------------------------------------------------------------------ #
    # 2. Parity series — the harness output the dashboard + soak read.     #
    # ------------------------------------------------------------------ #
    - name: jupiter-shadow-parity
      interval: 30s
      rules:
        # Both stacks currently exporting (setpoint gauge present each side).
        # 1 when both present; ABSENT (not 0) when either is missing — so the
        # dashboard distinguishes "compared and agree" from "nothing to compare".
        - record: jupiter_shadow_both_present
          expr: |
            (jupiter_shadow_zeus_intent_code > bool -1)
            * on(site_id)
            (jupiter_shadow_cell_intent_code > bool -1)

        # INTENT-MATCH: 1 iff both chose the same charge/discharge/idle intent.
        - record: jupiter_shadow_intent_match
          expr: |
            jupiter_shadow_zeus_intent_code == bool on(site_id) jupiter_shadow_cell_intent_code

        # DIVERGENCE: the complement, for easy alerting/soak counting.
        - record: jupiter_shadow_divergence
          expr: |
            jupiter_shadow_zeus_intent_code != bool on(site_id) jupiter_shadow_cell_intent_code

        # SETPOINT-DELTA (kW): zeus_net - cell_net. Signed (who is more
        # discharge-leaning) and absolute (magnitude of disagreement).
        - record: jupiter_shadow_setpoint_delta_kw
          expr: |
            jupiter_shadow_zeus_setpoint_kw - on(site_id) jupiter_shadow_cell_setpoint_kw
        - record: jupiter_shadow_setpoint_abs_delta_kw
          expr: |
            abs(jupiter_shadow_zeus_setpoint_kw - on(site_id) jupiter_shadow_cell_setpoint_kw)

        # INPUTS attribution (source-CLASS dimension, the metric-visible part).
        # 1 iff both saw the same price degrade-class; likewise forecast.
        - record: jupiter_shadow_price_source_class_match
          expr: |
            jupiter_shadow_zeus_price_degraded == bool on(site_id) jupiter_shadow_cell_price_degraded
        - record: jupiter_shadow_forecast_source_class_match
          expr: |
            jupiter_shadow_zeus_forecast_degraded == bool on(site_id) jupiter_shadow_cell_forecast_degraded
        # Combined: both price AND forecast source-classes agree. This is the
        # metric-visible slice of inputs_equal (see the header note: it does NOT
        # cover curve-etag / trained-at / soc equality — those need the MQTT doc).
        - record: jupiter_shadow_inputs_source_match
          expr: |
            jupiter_shadow_price_source_class_match * on(site_id) jupiter_shadow_forecast_source_class_match

        # ---- fine-grained inputs equality (card #147) ------------------- #
        # SoC delta + within-band match. Both sides read the SAME HA entity at
        # different instants, so "equal" is a small band, never == on floats.
        - record: jupiter_shadow_soc_delta_pct
          expr: |
            abs(jupiter_shadow_zeus_soc_pct - on(site_id) jupiter_shadow_cell_soc_pct)
        - record: jupiter_shadow_soc_match
          expr: |
            abs(jupiter_shadow_zeus_soc_pct - on(site_id) jupiter_shadow_cell_soc_pct)
            <= bool {{ .Values.prometheusRule.socDeltaPct }}
        # Running-peak delta + match (same billing register on both sides).
        - record: jupiter_shadow_peak_delta_kw
          expr: |
            abs(jupiter_shadow_zeus_peak_kw - on(site_id) jupiter_shadow_cell_peak_kw)
        - record: jupiter_shadow_peak_match
          expr: |
            abs(jupiter_shadow_zeus_peak_kw - on(site_id) jupiter_shadow_cell_peak_kw)
            <= bool {{ .Values.prometheusRule.peakDeltaKw }}
        # FINE-GRAINED inputs_equal (the #147 goal): source-classes agree AND
        # the SoC inputs agree AND the running peaks agree. ABSENT (not 0)
        # until every constituent series exists — i.e. until the #147 jupiter
        # release is deployed. The source-class-only jupiter_shadow_
        # inputs_source_match keeps working unchanged alongside.
        - record: jupiter_shadow_inputs_equal
          expr: |
            jupiter_shadow_inputs_source_match
            * on(site_id) jupiter_shadow_soc_match
            * on(site_id) jupiter_shadow_peak_match

        # LOGIC divergence: intents differ AND the metric-visible inputs agree
        # (same source-class). i.e. the divergence is NOT explained by one side
        # running on a degraded feed while the other ran primary — so it points
        # at the DISPATCH LOGIC (or a same-class-but-different input the metrics
        # can't see; see header). This is THE gate signal: a soak that keeps
        # this at 0 means the shadow logic matches the live logic, safe to flip.
        - record: jupiter_shadow_logic_divergence
          expr: |
            jupiter_shadow_divergence * on(site_id) jupiter_shadow_inputs_source_match

        # INPUTS-attributed divergence: intents differ BUT the source-classes
        # also differ — the divergence is (at least partly) an INPUTS artefact,
        # expected/benign, not a logic bug.
        - record: jupiter_shadow_inputs_divergence
          expr: |
            jupiter_shadow_divergence
            * on(site_id) (jupiter_shadow_inputs_source_match == bool 0)

        # STRICT logic divergence (card #147): intents differ while the FULL
        # fine-grained inputs agree (source-class AND SoC AND running peak) —
        # the tightened gate signal. Where the classic logic_divergence can
        # still be a same-class-but-different-SoC artefact, a 1 here has had
        # every metric-visible inputs excuse removed. ABSENT until the #147
        # series exist (see header); the classic series is untouched above.
        - record: jupiter_shadow_logic_divergence_strict
          expr: |
            jupiter_shadow_divergence * on(site_id) jupiter_shadow_inputs_equal

        # INPUTS divergence SPLIT BY WHICH INPUT DIFFERS (card #147): one
        # series per attributable input, so the soak review reads "diverged
        # because the SoC inputs differed" straight off the dashboard instead
        # of re-deriving it. Not mutually exclusive — a cycle can differ on
        # several inputs at once.
        - record: jupiter_shadow_inputs_divergence_price
          expr: |
            jupiter_shadow_divergence
            * on(site_id) (jupiter_shadow_price_source_class_match == bool 0)
        - record: jupiter_shadow_inputs_divergence_forecast
          expr: |
            jupiter_shadow_divergence
            * on(site_id) (jupiter_shadow_forecast_source_class_match == bool 0)
        - record: jupiter_shadow_inputs_divergence_soc
          expr: |
            jupiter_shadow_divergence
            * on(site_id) (jupiter_shadow_soc_match == bool 0)
        - record: jupiter_shadow_inputs_divergence_peak
          expr: |
            jupiter_shadow_divergence
            * on(site_id) (jupiter_shadow_peak_match == bool 0)

        # GUARD-CONFLICT — REDEFINED for the post-cutover roles (card #147):
        # the LIVE lar tripped its charge-guard in the last 15m (a REAL charge
        # veto on the real battery, jupiter_charge_guard_trips_total from
        # guard.py #137 — the #137 metric name, kept deliberately) WHILE
        # zeus's demoted cross-check plan wanted to charge. The mirror of the
        # original #141 rule (zeus trips vs lar charge intent), roles swapped
        # now the lar commands and zeus advises. The lar pre-seeds the counter
        # at 0 since #147, so once that release is deployed this series is a
        # live 0/1 rather than absent-until-first-trip.
        - record: jupiter_shadow_guard_conflict
          expr: |
            (increase(jupiter_charge_guard_trips_total{site_id="{{ .Values.site.id }}"}[15m]) > bool 0)
            * on(site_id)
            (
              label_replace(
                zeus_target_charge_kw, "site_id", "{{ .Values.site.id }}", "", ""
              ) > bool 0
            )

    # ------------------------------------------------------------------ #
    # 3. Soak alerts. WARNING only — the shadow harness never actuates; a    #
    #    fire means "not yet clean enough to cut this site over", a P4       #
    #    readiness signal, not a live-battery incident.                      #
    # ------------------------------------------------------------------ #
    - name: jupiter-shadow-alerts
      rules:
        - alert: JupiterShadowHarnessNoData
          # Neither parity series is producing — one stack stopped exporting,
          # so the soak is blind. (Absent, not 0: nothing to compare.)
          expr: absent(jupiter_shadow_both_present)
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: jupiter shadow parity harness has no data
            description: >-
              jupiter_shadow_both_present has been absent for 30m — zeus_* or
              jupiter_lar_* stopped being scraped, so the shadow parity harness
              cannot compare the live dispatch against the lar's shadow plan.
              Check the zeus and jupiter-cell ServiceMonitors / pods.
        - alert: JupiterShadowLogicDivergence
          # Sustained LOGIC-attributed intent divergence: the lar's shadow plan
          # disagrees with the live dispatch on identical (source-class) inputs.
          # This is the cutover blocker — it must sit at 0 through a clean soak
          # before P4 flips the site live. LONG for: rides out single-cycle
          # boundary blips (the two stacks cycle independently).
          expr: max by (site_id) (jupiter_shadow_logic_divergence) > 0
          for: 2h
          labels:
            severity: warning
          annotations:
            summary: jupiter shadow plan diverges from live dispatch (logic)
            description: >-
              Site {{ "{{ $labels.site_id }}" }} — the two stacks' plan intents
              have differed for 2h while both saw the same price/forecast
              source-class (so it is NOT a source-class inputs artefact).
              Check jupiter_shadow_logic_divergence_strict (card #147: also
              requires SoC + running-peak equality) and the per-input
              jupiter_shadow_inputs_divergence_{price,forecast,soc,peak} split
              to attribute it; curve identity / model vintage are on
              jupiter_reporting_plan_price_curve_etag_info /
              _plan_forecast_trained_at_timestamp_seconds.
        - alert: JupiterShadowSetpointDelta
          # The setpoint magnitudes disagree materially even when intents may
          # match — a sizing (not direction) parity gap.
          expr: max by (site_id) (jupiter_shadow_setpoint_abs_delta_kw) > {{ .Values.prometheusRule.setpointDeltaKw }}
          for: 2h
          labels:
            severity: warning
          annotations:
            summary: jupiter shadow setpoint differs materially from live
            description: >-
              Site {{ "{{ $labels.site_id }}" }} — |zeus_net - cell_net| setpoint
              has exceeded {{ .Values.prometheusRule.setpointDeltaKw }} kW for 2h.
              The shadow plan and live dispatch disagree on charge/discharge
              magnitude; review before cutover.
        - alert: JupiterShadowGuardConflict
          # The LIVE lar's charge-guard actively suppressed a charge zeus's
          # cross-check plan wanted (roles swapped post-cutover, card #147) —
          # a guard-shaped divergence between the two stacks, not a pure logic one.
          expr: max by (site_id) (jupiter_shadow_guard_conflict) > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: live lar charge-guard conflicts with the zeus cross-check plan
            description: >-
              Site {{ "{{ $labels.site_id }}" }} — the LIVE lar tripped its
              charge-guard (a real charge veto) while zeus's demoted cross-check
              plan wanted to charge, sustained 30m. A guard-shaped disagreement
              between the live dispatch and the cross-check; review whether the
              two stacks' peak tracking / guard thresholds have drifted.
{{- end }}
