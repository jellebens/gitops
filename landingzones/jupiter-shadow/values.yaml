# jupiter-shadow landing zone — the shadow parity harness (jupiter P3.6, #141).
#
# A MONITORING-ONLY chart: no Deployment, no Service, no Secret, no PVC. It
# ships only (a) a PrometheusRule of jupiter_shadow_* RECORDING rules that join
# the already-scraped zeus_* (live dispatch) and jupiter_lar_* (shadow plan)
# series, and (b) a Grafana dashboard ConfigMap the sidecar discovers. Nothing
# here reaches the live battery or the lar; it observes both from Prometheus.

# The site under shadow. zeus_* has NO site_id label (the single tervuren
# battery), so the recording rules inject this value onto every zeus term
# before joining `on(site_id)` against the site-labelled jupiter_lar_* series.
# One harness instance = one site today; a second site becomes a second landing
# zone (or a values-driven loop) once a second lar soaks.
site:
  id: tervuren

# Grafana dashboard provisioned as a ConfigMap, discovered by the
# kube-prometheus-stack Grafana sidecar (watches all namespaces). Same pattern
# as landingzones/zeus. Adds ONE new dashboard (uid jupiter-shadow-parity);
# the kiosk and every existing dashboard are untouched.
dashboard:
  enabled: true
  # Label the sidecar watches for (kube-prometheus-stack default).
  sidecarLabel: grafana_dashboard

# Prometheus recording + alerting rules (kube-prometheus-stack ruleSelector
# picks these up by label). The recording rules are the harness itself.
prometheusRule:
  enabled: true
  releaseLabel: kube-prometheus-stack
  # JupiterShadowSetpointDelta warning threshold (kW): the absolute net-setpoint
  # gap |zeus_net - cell_net| that, sustained 2h, means the shadow plan and live
  # dispatch disagree on magnitude enough to review before cutover. Deliberately
  # conservative starting pick — tune against observed soak deltas.
  setpointDeltaKw: 0.5
  # Fine-grained inputs-equality tolerances (card #147). Both sides read the
  # SAME HA entities, but at different instants within a cycle — so equality is
  # a small band, never == on floats.
  # SoC "equal" band (percentage points): |zeus_soc_percent - jupiter_lar_soc_pct|
  # within this is the same SoC input. 2 pp ≈ one cycle of drift on the 13 kWh pack.
  socDeltaPct: 2.0
  # Running-peak "equal" band (kW): both read the meter's own monthly billing
  # register, so they should match near-exactly; 0.1 kW absorbs read-timing skew
  # across a quarter boundary.
  peakDeltaKw: 0.1

  # GATE-BLINDNESS guard (card #196) — its own flag + file
  # (templates/gate-blind-prometheusrule.yaml) so it can be turned off
  # independently of the harness. It guards the VALIDITY of the logic-divergence
  # gate rather than being part of the harness: when inputs_source_match is 0,
  # jupiter_shadow_logic_divergence is pinned to 0 by construction and its green
  # 0 proves NOTHING. Becomes moot at zeus decommission (#169) — which is
  # exactly why it is kept separable.
  gateBlind:
    enabled: true
    releaseLabel: kube-prometheus-stack
    # Sustained window before the guard fires. Long enough that a brief feed
    # blip (one stack momentarily on cache/fallback while the other is primary)
    # during a normal refresh does not page, but the permanent mismatch — 0 for
    # the entire life of the series since 2026-07-05 — fires within 30m. Matches
    # the #181 savings-source guard's 30m, for the same reason.
    for: 30m
