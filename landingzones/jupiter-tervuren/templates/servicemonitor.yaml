{{- if .Values.serviceMonitor.enabled }}
# Scrapes GET /metrics on the lar's http port (8080). The lar emits ONLY
# jupiter_lar_* series, each carrying a site_id="tervuren" label — no zeus_*
# names, so there is NO collision with the live zeus_* series. Picked up by the
# kube-prometheus-stack Prometheus via the `release` label. NOTE: this scrape has
# NO metricRelabelings/keep filter — it ingests whatever the target emits — so the
# cell→lar metric rename (jupiter_cell_* → jupiter_lar_*) needs no change here;
# Prometheus keeps scraping the renamed series automatically after the image swap.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jupiter-cell
  namespace: jupiter-tervuren
  labels:
    app.kubernetes.io/name: jupiter-cell
    app.kubernetes.io/instance: jupiter-tervuren
    app.kubernetes.io/part-of: jupiter
    release: {{ .Values.serviceMonitor.releaseLabel | quote }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: jupiter-cell
      app.kubernetes.io/instance: jupiter-tervuren
  namespaceSelector:
    matchNames:
      - jupiter-tervuren
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
