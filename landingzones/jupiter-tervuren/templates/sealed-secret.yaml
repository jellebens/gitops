{{- if and .Values.secret.sealedSecret.enabled .Values.secret.sealedSecret.encryptedData }}
# Per-site SealedSecret jupiter-tervuren-secrets (#138 secret contract).
# Rendered ONLY when encryptedData is non-empty — until the main session seals
# the real blobs into .config/lab/jupiter-tervuren.yaml, this is skipped and the
# Deployment's envFrom (optional: true) keeps the pod up. Keys: MQTT_USER /
# MQTT_PASS (required for publish) and HA_TOKEN (optional until #142).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.secret.name }}
  namespace: jupiter-tervuren
spec:
  encryptedData:
    {{- range $k, $v := .Values.secret.sealedSecret.encryptedData }}
    {{- if $v }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- end }}
  template:
    metadata:
      name: {{ .Values.secret.name }}
      namespace: jupiter-tervuren
    type: Opaque
{{- end }}
