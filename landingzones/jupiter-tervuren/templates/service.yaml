# In-cluster endpoint for the cell's /metrics + /healthz (one port, 8080).
# Scraped by the ServiceMonitor; not consumed by any other workload (the cell
# is a control loop, not a request/response API).
apiVersion: v1
kind: Service
metadata:
  name: jupiter-cell
  namespace: jupiter-tervuren
  labels:
    app.kubernetes.io/name: jupiter-cell
    app.kubernetes.io/instance: jupiter-tervuren
    app.kubernetes.io/part-of: jupiter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jupiter-cell
    app.kubernetes.io/instance: jupiter-tervuren
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
