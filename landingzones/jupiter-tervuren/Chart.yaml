apiVersion: v2
name: jupiter-tervuren
version: 0.1.0
type: application
appVersion: "0.6.0"
description: >-
  Jupiter per-site LAR (renamed from "cell", card #154) landing zone for the
  tervuren site (jupiter P3.4, card #139). The lar computes a full dispatch
  plan every cycle, publishes it to MQTT, and — as of the #153 cutover
  (`controller: live`) — is the LIVE battery controller, gated by the
  single-controller interlock (exactly one controller per battery). See
  values.yaml and README.md for the safety model and rollback.
