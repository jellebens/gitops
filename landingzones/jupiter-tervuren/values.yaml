# jupiter-tervuren landing zone — the per-site LAR (renamed from "cell",
# card #154) for the tervuren site,
# deployed in SHADOW mode (jupiter P3.4, card #139).
#
# THE LOAD-BEARING SAFETY PROPERTY (do not weaken):
#   controller: shadow  (hard default, see siteConfig.controller below and the
#   SITE_ID/config wiring). In shadow the lar computes a full plan every cycle
#   and publishes it to MQTT, but ACTUATES NOTHING. zeus remains the SOLE live
#   battery controller until the P4 cutover (#142 wires the live HA reads + the
#   `live` controller; this chart only ships shadow). The image itself refuses
#   to run `live` in 0.4.0 (config.py CONTROLLER_MODES stub), so shadow is
#   belt-and-braces.
#
# METRIC ISOLATION: the lar emits ONLY jupiter_lar_* series (all carrying a
# site_id="tervuren" label) — it never re-emits any zeus_* name, so there is no
# collision with the LIVE zeus_* Prometheus series (verified #137/#140). Nothing
# in this chart enables any zeus_* dual-emit.

image:
  # cell → lar rename (card #154): image renamed jupiter-cell → jupiter-lar and
  # the emitted metrics jupiter_cell_* → jupiter_lar_* in lockstep at v0.6.0.
  repository: jellebens/jupiter-lar
  # jupiter repo release tag v0.6.0 (arm64, --provenance=false — cluster is arm64).
  # 0.6.0 = the cell→lar rename of 0.5.0 (live HA reads #148 + live actuation #149
  # + commander-keyed interlock #151); identical runtime behaviour, only the unit
  # name / image / metric prefix change. REQUIRED with the ha:/entities:/control:
  # siteConfig below — older images' load_site_config raises on the unknown ha:
  # key. Stays controller: live per the #153 cutover (siteConfig.controller below).
  tag: "0.10.1"
  pullPolicy: IfNotPresent

# Single control loop per site. NEVER run two side by side — two cells for one
# site would publish conflicting plans (and, post-cutover, conflicting commands).
# Recreate for the same reason as zeus.
replicaCount: 1

# D4 site identity. Exported as the SITE_ID env var (jupiter_shared.site): the
# lar's app.py reads it via config_from_env(), stamps it on every metric label,
# cache path and MQTT topic (jupiter/tervuren/...), and derives the per-site
# secret name jupiter-tervuren-secrets from it.
siteId: tervuren

service:
  # Container/service port; exported to the app as PORT. The lar serves
  # GET /metrics + GET /healthz on this one port (services/lar/app.py).
  port: 8080

# --- The mounted site-config document -------------------------------------
# Vendored value-for-value from the jupiter repo
# services/lar/sites/tervuren.yaml (origin/develop, #138) so the lar
# dispatches tervuren EXACTLY as zeus does today. Rendered verbatim into the
# jupiter-tervuren-config ConfigMap (templates/configmap.yaml) and mounted at
# CELL_CONFIG_DIR (/config/site.yaml).
#
# NOTE ON 0.4.0 RUNTIME: the shipping 0.4.0 entrypoint (app.py:main) builds its
# config from config_from_env() — it reads SITE_ID + env, and does NOT yet parse
# this mounted document (site_config.load_site_config is present but not wired
# into main() until the config-wiring card). The ConfigMap is mounted now so the
# document is in place and ready the moment that wiring lands; shipping it now is
# harmless (an unused read-only mount) and keeps the deploy a no-op change then.
# controller stays `shadow` in BOTH paths regardless.
siteConfig:
  site:
    id: tervuren
  # CUTOVER 2026-07-06 (#153): the tervuren lar is now the LIVE battery
  # controller. zeus is demoted to a check (zeus_commander=0); the single-
  # controller interlock gates EVERY command on that signal (refuses unless it
  # sees a fresh commander==0). ROLLBACK: set back to shadow (+ re-arm zeus).
  controller: live
  battery:
    usable_capacity_kwh: 13.0
    max_charge_kw: 2.2
    max_discharge_kw: 3.84
    max_grid_import_kw: 2.2
    soc_min_pct: 10
    soc_max_pct: 100
    charge_efficiency: 0.95
    discharge_efficiency: 0.95
    backup_reserve_pct: 30
    hot_weather_temp_c: 25
    hot_weather_reserve_pct: 10
  optimizer:
    horizon_hours: 36
    slot_minutes: 15
    cycle_penalty: 0.0
    terminal_value_price: null
    capacity:
      enabled: true
      rate_eur_per_kw_month: 3.3
      floor_kw: 2.5
      peak_reserve_pct: 10
      peak_discharge_incentive_eur_per_kwh: 0.05
      charge_guard_enabled: true
      guard_margin_kw: 0.2
      detector_use_fluvius: true
      detector_fluvius_days: 365
  # Central price-service client (in-cluster). On an outage the loop degrades to
  # the local last-good cache (lar invariant).
  price:
    base_url: http://price-service.jupiter-central.svc.cluster.local:8080
    zone: "10YBE----------2"
    timeout_seconds: 5.0
    cache_path: cache/price_last_good.json
    import_markup: 0.0
    export_price: 0.0
    price_scale: 1.0
  # Central forecast-service client (in-cluster).
  forecast:
    base_url: http://forecast-service.jupiter-central.svc.cluster.local:8080
    target: critical_load
    timeout_seconds: 5.0
    max_artifact_age_hours: 48.0
    cache_path: cache/forecast_last_good.json
  # Home Assistant REST connection (card #152 — the READ wiring). Value-for-value
  # from the LIVE zeus config (landingzones/zeus/values.yaml `home_assistant:`) so
  # the lar talks to the SAME HA instance zeus does today. base_url is
  # vesta.local (NOT homeassistant.local — the jupiter repo tervuren.yaml carries
  # homeassistant.local, which does NOT match the live zeus value; zeus's
  # vesta.local is authoritative — flagged on the card). vesta.local resolves
  # in-cluster via coredns-config (forwards vesta.local -> router 192.168.50.1,
  # which serves the DHCP-reserved HA host 192.168.50.18). The long-lived token is
  # NEVER stored here — it is ${HA_TOKEN}, expanded from the per-site sealed secret
  # jupiter-tervuren-secrets at load time (site_config.py _expand_env reads env,
  # injected via the Deployment envFrom). An empty base_url would disable the live
  # read path; this is set so the READ ability is wired. NOTE: the lar still stays
  # SHADOW (controller: shadow + control.enabled: false below), so it READS HA but
  # actuates NOTHING — the live flip is the supervised cutover (#153).
  ha:
    base_url: http://vesta.local:8123
    token: ${HA_TOKEN}
    verify_ssl: true
    timeout_seconds: 10.0
  # HA entity ids — value-for-value from the LIVE zeus config
  # (landingzones/zeus/values.yaml `entities:`). Consumed by the lar's live HA
  # read path once the lar reads them; carried here so the read wiring is
  # complete. Field names match zeus/EntitiesConfig exactly.
  entities:
    soc: sensor.ap3002532000565690_battery_level
    grid_input_power: sensor.buzzbrick_ap3002532000565690_grid_input_power
    ac_output_power: sensor.buzzbrick_ap3002532000565690_alternating_current_out_power
    house_load_power: sensor.buzzbrick_ap3002532000565690_alternating_current_out_power
    house_load_is_counter: false
    ac_power: sensor.office_a_c_power
    solar_power: sensor.buzzbrick_ap3002532000565690_photovoltaics_input_power
    current_price: ""
    capacity_peak_power: sensor.fluvius_meter_1sag1100121989_peak_power
    grid_power_import: sensor.utility_room_home_energy_meter_electric_consumption_w
  # Live actuation control (card #152 wires it; the COMMAND path stays inert).
  # Value-for-value from the LIVE zeus config (landingzones/zeus/values.yaml
  # `control:`) — the SAME working-mode SELECT entity with the SAME options zeus
  # drives today. SAFETY: `enabled: false` keeps the lar shadow-only regardless
  # of `controller` (zeus's live config has enabled: true; the lar deliberately
  # does NOT). The supervised cutover (#153) is what flips BOTH `controller: live`
  # AND `control.enabled: true`; even then the single-controller interlock still
  # gates every command on zeus's commander signal. This card only lands the
  # values so #153 is a clean flip — it does NOT command the battery.
  control:
    # CUTOVER 2026-07-06 (#153): arm the command gate. With controller: live
    # above, the lar now actuates — but ONLY when the interlock sees zeus's
    # fresh commander==0 AND the charge guard does not veto. ROLLBACK: false.
    enabled: true
    mode: working_mode
    working_mode:
      entity: select.apex300_working_mode
      charge_option: "CHARGING"
      discharge_option: "DISCHARGING"
      idle_option: "PASSTHROUGH"
      intent_threshold_kw: 0.1
  weather:
    latitude: 50.857017
    longitude: 4.5362013
    base_temp_c: 21.0
    past_days: 14
    forecast_days: 2
  # #177 reactive spike responder - OBSERVE phase (owner-approved 2026-07-09):
  # logs would-have-triggered events + jupiter_lar_spike_* metrics, COMMANDS
  # NOTHING. Flip mode: active only after threshold review on real data.
  spike_responder:
    mode: observe
    trigger_kw: 2.5
    release_kw: 1.0
    trigger_consecutive: 2
    release_consecutive: 3
    cooldown_seconds: 120

  run:
    interval_minutes: 15
    poll_seconds: 10
    replan_load_drop_kw: 0.4
    replan_load_rise_kw: 0.4
    input_failure_retry_seconds: 60
    # Actively poke the whole-home Aeotec HEM (via zwave_js.refresh_value) before
    # reading it, so the live capacity-peak grid register isn't stale. Ported
    # value-for-value from the LIVE zeus config (landingzones/zeus/values.yaml
    # run.grid_power_poll_seconds: 60). Part of the #152 HA READ wiring — the read
    # path is inert until the lar reads it; harmless in shadow.
    # #177 spike responder observation: poke the HEM every 15s so sub-minute
    # spike detection is real (was 60). Watch Z-Wave latency after deploy.
    grid_power_poll_seconds: 15
  # Cluster EMQX broker publish creds (#139). host defaults to
  # mqtt.lab.local:1883; username/password expand (load_site_config ${VAR})
  # from the envFrom sealed secret jupiter-tervuren-secrets (the minted
  # cell-tervuren user, ACL allow jupiter/tervuren/#). Publish is best-effort:
  # a broker/cred failure never blocks a cycle (telemetry only, never actuation).
  mqtt:
    username: ${MQTT_USER}
    password: ${MQTT_PASS}
    client_id: cell-tervuren

# Where the site-config ConfigMap is mounted. The document lands at
# {mountPath}/{fileName}; SITE_CONFIG_PATH env points the lar at the full path
# (read once the config-wiring card lands — see the siteConfig note above).
config:
  mountPath: /config
  fileName: site.yaml

# --- Writable last-good cache (card #146) ----------------------------------
# The lar persists the last-good price + forecast curves to disk so a pod
# restart during an upstream (price/forecast-service) outage rehydrates the
# in-memory last-good cache instead of cold-starting (jupiter_shared.cache /
# jupiter_lar.clients). It writes to price.cache_path / forecast.cache_path
# from the site-config document. Those default to a RELATIVE `cache/...` path,
# which resolves against the container WORKDIR (/app) — root-owned and NOT
# writable by the non-root runtime uid (1000) — so the lar logs, every cycle:
#   WARNING could not persist last-good curve to cache/price_last_good.json:
#   [Errno 13] Permission denied: 'cache'   (and the same for forecast)
# Effect: cross-restart rehydration is degraded (in-memory last-good still holds
# within a pod lifetime, so the fail-safe is intact — this is hardening).
#
# Fix (REUSABLE — every future site lar gets a writable cache the same way):
# mount a writable emptyDir at `dir` and, in templates/configmap.yaml, override
# price.cache_path / forecast.cache_path to absolute files under `dir`. `dir` is
# the SINGLE source of truth for both the mount and the config paths, so they
# can never drift. An emptyDir (not a PVC) is deliberate: the cache is a
# warm-start optimization, not durable state, and the Recreate single-writer
# model wants no shared/persistent volume. fsGroup (runtime.gid) makes the
# emptyDir group-writable by uid 1000. Set enabled:false to revert to the
# (broken) relative-path behaviour.
cache:
  enabled: true
  # Absolute, writable mount point for the last-good cache. Anything outside the
  # root-owned WORKDIR works; /var/cache is the conventional home for regenerable
  # cache data.
  dir: /var/cache/jupiter-cell
  # File names under `dir` (kept identical to the lar's historical relative
  # names so the on-disk artefacts are unsurprising).
  priceFileName: price_last_good.json
  forecastFileName: forecast_last_good.json

# Scoped CiliumNetworkPolicy. INGRESS-ONLY BY DEFAULT (repo convention, same as
# zeus + jupiter-central): a Cilium policy with only `ingress` rules default-
# denies inbound while leaving EGRESS FULLY OPEN. The lar needs egress to the
# in-cluster price/forecast services AND — critically — to the EMQX broker at
# mqtt.lab.local (a LoadBalancer VIP 192.168.50.181 on the LAN, reached as a
# `world`/CIDR entity, not a cluster endpoint) plus cluster DNS. A broad egress
# default-deny that missed any of those would SEVER the lar, so it is left as a
# deliberate, human-reviewed opt-in (egress.enabled, default false).
networkPolicy:
  enabled: true
  # Namespace Prometheus (kube-prometheus-stack) runs in — allowed to scrape
  # /metrics + /healthz on the service port.
  metricsScrapeNamespace: observability
  # OPT-IN egress lockdown. Default false = ingress-only (egress stays open),
  # matching zeus/jupiter-central and the "never sever live connectivity" rule.
  # Flip to true only as a reviewed step once every destination below is
  # confirmed. When true the lar is put into egress default-deny and ONLY the
  # destinations below are reachable.
  egress:
    enabled: false
    # In-cluster central services (price + forecast) in jupiter-central:8080.
    centralNamespace: jupiter-central
    centralPort: 8080
    # EMQX broker VIP on the LAN (mqtt.lab.local). /32 CIDR — LoadBalancer
    # traffic leaves the cluster to a LAN address, so this is a toCIDR rule,
    # not toEndpoints.
    mqttCIDR: 192.168.50.181/32
    mqttPort: 1883
    # Home Assistant (vesta) REST egress — the HA READ target (card #152).
    # CONFIRMED against the LIVE zeus config: zeus reaches HA at
    # http://vesta.local:8123, and vesta.local is the DHCP-reserved HA host
    # 192.168.50.18 (coredns-config forwards vesta.local -> router, which serves
    # .18; the zone file pins `vesta IN A 192.168.50.18`). Egress leaves the
    # cluster to that LAN address, so this is a /32 toCIDR rule on 8123, mirroring
    # how zeus reaches HA. NOTE: this rule is only ENFORCED when
    # networkPolicy.egress.enabled is true. It stays FALSE (ingress-only default),
    # so the lar's egress is fully open and its HA reads are NOT gated today — no
    # broad egress default-deny is shipped by this card (that is a separate,
    # human-reviewed step). This entry is here so that if/when egress lockdown is
    # enabled, the HA read path is already whitelisted and won't be severed.
    haCIDR: 192.168.50.18/32
    haPort: 8123

# Prometheus Operator ServiceMonitor, scraping GET /metrics on the service port
# (jupiter_lar_* series with a site_id label — see services/lar/metrics.py).
serviceMonitor:
  enabled: true
  interval: 30s
  # Prometheus selects ServiceMonitors carrying this release label.
  releaseLabel: kube-prometheus-stack

# Small stdlib HTTP server + a control loop that talks to two in-cluster
# services and one broker. Modest footprint (mirrors zeus/price-service).
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Probes on GET /healthz — served by the stdlib ThreadingHTTPServer on a daemon
# thread, up before any price/forecast I/O, and returns 200 with status "ok"
# even before the first cycle (it is a liveness target). Generous thresholds:
# a shadow lar restart-loop is noise, and a degraded cycle (no price/forecast)
# is NOT unhealthy — it self-heals. See the lar app.py health contract.
probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 4

runtime:
  uid: 1000
  gid: 1000

# Per-site secret injected as env via envFrom. SealedSecret name derived from
# the site id: jupiter-tervuren-secrets (site_config.SECRET_NAME_TEMPLATE, #138).
# optional: true so the FIRST sync comes up before the seal is provided.
#
# Keys (site_config.REQUIRED_SECRET_ENV):
#   MQTT_USER / MQTT_PASS  — REQUIRED for the lar's MQTT publish (#140). The
#                            EMQX per-site user (cell-tervuren) must be minted by
#                            the main
#                            session before publishing works; until then MQTT
#                            connect fails best-effort (telemetry only, never the
#                            actuation path — the loop keeps running).
#   HA_TOKEN               — NOT required by the 0.4.0 shadow lar (live HA reads
#                            are deferred to #142; the loop defaults SoC to
#                            soc_min and grid power to None). Sealed here anyway
#                            so #142 is a value-only change, but the lar starts
#                            fine without it.
#
# PLACEHOLDER: encryptedData is EMPTY so the SealedSecret is NOT rendered yet
# (see templates/sealed-secret.yaml — it only renders when encryptedData is
# non-empty). The main session mints the EMQX per-site user (cell-tervuren), runs kubeseal for THIS
# namespace, and pastes the sealed blobs into
# .config/lab/jupiter-tervuren.yaml. envFrom optional:true keeps the pod up in
# the meantime. Do NOT put plaintext secrets here or invent fake sealed data.
secret:
  name: jupiter-tervuren-secrets
  sealedSecret:
    enabled: true
    encryptedData: {} # { MQTT_USER: "Ag...", MQTT_PASS: "Ag...", HA_TOKEN: "Ag..." } — main session fills via kubeseal
