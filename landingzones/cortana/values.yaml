image:
  repository: nousresearch/hermes-agent
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

namespace:
  create: true
  name: cortana

persistence:
  enabled: true
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /opt/data

resources:
  requests:
    cpu: "1"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

runtime:
  uid: "10000"
  gid: "10000"

openai:
  enabled: true
  secretName: cortana-openai-api-key
  secretKey: api-key
  sealedSecret:
    encryptedApiKey: ""

discord:
  enabled: false
  secretName: cortana-discord-token
  secretKey: discord-token
  envName: DISCORD_BOT_TOKEN
  homeChannel: ""
  homeChannelName: cortana
  sealedSecret:
    encryptedToken: ""

todoist:
  enabled: false
  secretName: cortana-todoist-api-token
  secretKey: api-token
  envName: TODOIST_API_TOKEN
  sealedSecret:
    encryptedToken: ""

dashboard:
  enabled: false
  port: 9119
  host: 0.0.0.0
  insecure: true

service:
  type: ClusterIP
  port: 80
  targetPort: 9119

gateway:
  enabled: false
  parentRef:
    name: cilium-gateway
    namespace: gateway
    sectionName: http
  hostnames:
    - cortana.lab.local
  httpToHttpsRedirect:
    enabled: false
    sectionName: http

tlsCertificate:
  enabled: false
  secretName: cortana-server-tls
  commonName: cortana.lab.local
  dnsNames:
    - cortana.lab.local
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

gatewayProcess:
  args:
    - sleep
    - infinity

config:
  display:
    skin: ares
  mcp:
    servers:
      ms365:
        command: npx
        args:
          - -y
          - "@softeria/ms-365-mcp-server"
          - --preset
          - mail,calendar
          - --allowed-scopes
          - User.Read Mail.ReadWrite Mail.Send Calendars.ReadWrite
        env:
          HOME: /opt/data
          XDG_CACHE_HOME: /opt/data/.cache
          XDG_CONFIG_HOME: /opt/data/.config
          MS365_MCP_EXPECTED_USERNAME: jellebens@outlook.com
          MS365_MCP_TENANT_ID: consumers
        toolFilter:
          include:
            - list-mail-*
            - get-mail-*
            - create-mail-*
            - create-draft-email
            - send-mail
            - send-draft-message
            - update-mail-*
            - delete-mail-*
            - move-mail-*
            - copy-mail-*
            - reply-mail-*
            - reply-all-mail-*
            - forward-mail-*
            - create-reply-*
            - create-reply-all-*
            - create-forward-*
            - add-mail-*
            - list-calendar-*
            - get-calendar-*
            - create-calendar-event
            - update-calendar-event
            - delete-calendar-event
            - cancel-calendar-event
            - get-schedule
            - find-meeting-times
        requestTimeoutMs: 30000
        connectionTimeoutMs: 30000
        supportsParallelToolCalls: false
  model:
    default: gpt-5.4-mini
    provider: openai-api
    base_url: https://api.openai.com/v1
  terminal:
    backend: local
    cwd: /opt/data/workspace
    timeout: 180
    home_mode: profile
  platform_toolsets:
    discord:
      - hermes-discord
  platforms:
    discord:
      enabled: true
      home_channel:
        platform: discord
        chat_id: ""
        name: cortana
  plugins:
    enabled:
      - platforms/discord
    disabled: []
  discord:
    require_mention: false
    auto_thread: false
    dm_policy: allowlist
    allow_from: []
    allowed_channels: []
    free_response_channels: []
    no_thread_channels: []
    gateway_restart_notification: false
  tts:
    provider: edge
  stt:
    enabled: true
    provider: local
  voice:
    enabled: true
    auto_tts: true
    listen: true
  agent:
    system_prompt: |-
      You are Cortana, a voice-first Hermes agent.

      You support multiple personae selected by task context:
      - Personal assistant: monitor mail, summarize important messages, create calendar activities, create Todoist tasks from voice commands, and prepare daily and weekly briefings.
      - Technical writer: turn rough notes into clear technical documents, implementation plans, runbooks, release notes, and user-facing explanations.

      When connected through Discord voice, listen for spoken requests and prefer natural spoken responses unless the user asks for detail, code, or a written artifact.

      For personal-assistant work, be concise and action-oriented. Confirm before sending email, deleting or moving mail, creating external commitments, or making changes that could surprise the user. When asked for an overview, include upcoming calendar activity, open todos, important mail, and the cheapest electricity windows when that integration is available. On Sunday evening, prepare a week-ahead briefing and call out public holidays when that integration is available.

      For technical writing, preserve technical accuracy over polish. Ask for missing audience, scope, or source details only when the document would otherwise be materially wrong.
  cortana:
    personae:
      personal_assistant:
        enabled: true
        responsibilities:
          - monitor_mail
          - create_calendar_activities
          - create_todoist_todos_from_voice
          - daily_overview
          - weekly_sunday_overview
          - electricity_price_overview
          - bank_holiday_awareness
      technical_writer:
        enabled: true
        responsibilities:
          - technical_docs
          - implementation_plans
          - runbooks
          - release_notes
          - user_facing_explanations
    planned_integrations:
      todoist:
        status: needs_mcp_server_and_sealed_token
      electricity_prices:
        status: needs_price_source
      bank_holidays:
        status: needs_holiday_source
      schedules:
        daily_overview: "08:00 Europe/Brussels"
        weekly_overview: "Sunday 19:00 Europe/Brussels"
  toolsets:
    - hermes-cli
    - mcp
  memory:
    memory_enabled: true
    user_profile_enabled: true
