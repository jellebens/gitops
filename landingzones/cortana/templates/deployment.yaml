apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortana
  namespace: {{ .Values.namespace.name | quote }}
  labels:
    app.kubernetes.io/name: cortana
    app.kubernetes.io/part-of: cortana
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: cortana
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortana
        app.kubernetes.io/part-of: cortana
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if and .Values.openai.enabled .Values.openai.sealedSecret.encryptedApiKey }}
        checksum/openai-api-key: {{ .Values.openai.sealedSecret.encryptedApiKey | sha256sum }}
        {{- end }}
        {{- if and .Values.discord.enabled .Values.discord.sealedSecret.encryptedToken }}
        checksum/discord-token: {{ .Values.discord.sealedSecret.encryptedToken | sha256sum }}
        {{- end }}
        {{- if and .Values.todoist.enabled .Values.todoist.sealedSecret.encryptedToken }}
        checksum/todoist-token: {{ .Values.todoist.sealedSecret.encryptedToken | sha256sum }}
        {{- end }}
    spec:
      {{- if .Values.persistence.enabled }}
      securityContext:
        fsGroup: {{ .Values.runtime.gid }}
      {{- end }}
      initContainers:
        - name: seed-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              mkdir -p /opt/data/workspace
              cp /config/config.yaml /opt/data/config.yaml
              chown -R {{ .Values.runtime.uid }}:{{ .Values.runtime.gid }} /opt/data
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: state
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            - name: config
              mountPath: /config/config.yaml
              subPath: config.yaml
              readOnly: true
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml .Values.gatewayProcess.args | nindent 12 }}
          env:
            - name: HERMES_UID
              value: {{ .Values.runtime.uid | quote }}
            - name: HERMES_GID
              value: {{ .Values.runtime.gid | quote }}
            - name: HERMES_GATEWAY_BOOTSTRAP_STATE
              value: "running"
            {{- if .Values.dashboard.enabled }}
            - name: HERMES_DASHBOARD
              value: "true"
            - name: HERMES_DASHBOARD_HOST
              value: {{ .Values.dashboard.host | quote }}
            - name: HERMES_DASHBOARD_PORT
              value: {{ .Values.dashboard.port | quote }}
            - name: HERMES_DASHBOARD_INSECURE
              value: {{ .Values.dashboard.insecure | quote }}
            {{- end }}
            {{- if .Values.openai.enabled }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.secretName | quote }}
                  key: {{ .Values.openai.secretKey | quote }}
            {{- end }}
            {{- if .Values.discord.enabled }}
            - name: {{ .Values.discord.envName | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.discord.secretName | quote }}
                  key: {{ .Values.discord.secretKey | quote }}
            - name: DISCORD_HOME_CHANNEL
              value: {{ .Values.discord.homeChannel | quote }}
            - name: DISCORD_HOME_CHANNEL_NAME
              value: {{ .Values.discord.homeChannelName | quote }}
            {{- end }}
            {{- if .Values.todoist.enabled }}
            - name: {{ .Values.todoist.envName | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.todoist.secretName | quote }}
                  key: {{ .Values.todoist.secretKey | quote }}
            {{- end }}
          {{- if .Values.dashboard.enabled }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          {{- end }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: state
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: state
          persistentVolumeClaim:
            claimName: cortana-state
        {{- end }}
        - name: config
          configMap:
            name: cortana-config
