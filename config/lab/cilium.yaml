# config/lab/cilium.yaml
ipPools:
  - name: infra
    serviceSelector:
      matchExpressions:
      - key: io.kubernetes.service.namespace
        operator: In
        values:
          - kube-system
    blocks:
      - start: 192.168.50.166
        stop: 192.168.50.179

  - name: platform
    serviceSelector:
      matchLabels:
        lb-pool: platform
    blocks:
      - start: 192.168.50.180
        stop: 192.168.50.199

  - name: default
    blocks:
      - start: 192.168.50.200
        stop: 192.168.50.240

l2Policies:
  - name: default
    disabled: false
    nodeSelector: {}
    # interfaces:
    #   - eth0
    loadBalancerIPs: true
    externalIPs: false