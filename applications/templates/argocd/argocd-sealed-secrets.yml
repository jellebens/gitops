apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: platform-services
  source:
    # OCI (Bitnami catalog) — durable transport; the GitHub Pages repo proved fragile (org move -> 404).
    # Argo v3 OCI Helm: registry+namespace in repoURL, chart separate, NO oci:// scheme; public anon pull.
    # Catalog OCI has no 2.17.x; 2.19.1 = controller 0.38.4, in-place upgrade from 0.31.0 (same resource names incl. CRD).
    repoURL: registry-1.docker.io/bitnamicharts
    chart: sealed-secrets
    targetRevision: 2.19.1
    helm:
      releaseName: sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
