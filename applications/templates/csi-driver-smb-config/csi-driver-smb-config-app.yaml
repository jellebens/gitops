apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csi-driver-smb-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # After the driver (wave 10), before workloads that consume the smb class.
    argocd.argoproj.io/sync-wave: "11"
spec:
  project: platform-services
  sources:
    - repoURL: https://github.com/jellebens/gitops.git
      targetRevision: master
      path: platform/csi-driver-smb-config
      helm:
        releaseName: csi-driver-smb-config
        valueFiles:
          - $values/.config/shared/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/csi-driver-smb-config.yaml
    - repoURL: https://github.com/jellebens/gitops.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
