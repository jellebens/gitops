apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jupiter-central
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Central jupiter services (price-service). After the platform layer —
    # sealed-secrets/cilium, and mqtt at 16 — and BEFORE the zeus landing zone
    # (30): the central price API must exist before any consumer that might be
    # flipped onto it (card #107).
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: landing-zones
  destination:
    server: https://kubernetes.default.svc
    namespace: jupiter-central
  sources:
    - repoURL: {{ .Values.repos.config.url | quote }}
      targetRevision: {{ .Values.repos.config.targetRevision | default "HEAD" }}
      path: landingzones/jupiter-central
      helm:
        releaseName: jupiter-central
        ignoreMissingValueFiles: true
        valueFiles:
          - $values/.config/shared/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/jupiter-central.yaml
    - repoURL: {{ .Values.repos.config.url | quote }}
      targetRevision: {{ .Values.repos.config.targetRevision | default "HEAD" }}
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
