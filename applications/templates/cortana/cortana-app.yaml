{{- if .Values.cortana.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cortana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: landing-zones
  destination:
    server: https://kubernetes.default.svc
    namespace: cortana
  sources:
    - repoURL: {{ .Values.repos.config.url | quote }}
      targetRevision: {{ .Values.repos.config.targetRevision | default "HEAD" }}
      path: landingzones/cortana
      helm:
        releaseName: cortana
        ignoreMissingValueFiles: true
        valueFiles:
          - $values/.config/shared/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/cortana.yaml
    - repoURL: {{ .Values.repos.config.url | quote }}
      targetRevision: {{ .Values.repos.config.targetRevision | default "HEAD" }}
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
