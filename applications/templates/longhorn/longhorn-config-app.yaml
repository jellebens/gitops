apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Local config riding next to the upstream longhorn chart (same split as
    # csi-driver-smb / csi-driver-smb-config): CiliumNetworkPolicy from birth
    # (#145), PrometheusRule alerts, Grafana dashboard, and the (placeholder)
    # sealed backup credentials. One wave after the longhorn app.
    argocd.argoproj.io/sync-wave: "13"
spec:
  project: platform-services
  sources:
    - repoURL: https://github.com/jellebens/gitops.git
      targetRevision: master
      path: platform/longhorn
      helm:
        releaseName: longhorn-config
        ignoreMissingValueFiles: true
        valueFiles:
          - $values/.config/shared/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/longhorn-config.yaml
    - repoURL: https://github.com/jellebens/gitops.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
