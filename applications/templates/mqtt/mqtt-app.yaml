apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mqtt
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Platform MQTT broker (EMQX). After cilium-config (5) so the platform
    # LB-IPAM pool exists for the VIP, and after sealed-secrets so mqtt-auth
    # can unseal; before the workloads that will ride it (zeus, wave 30).
    argocd.argoproj.io/sync-wave: "16"
spec:
  project: platform-services
  sources:
    - repoURL: https://github.com/jellebens/gitops.git
      targetRevision: master
      path: platform/mqtt
      helm:
        releaseName: mqtt
        ignoreMissingValueFiles: true
        valueFiles:
          - $values/.config/shared/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/mqtt.yaml
    - repoURL: https://github.com/jellebens/gitops.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: mqtt
  # spec.volumeClaimTemplates is an ATOMIC list that argocd-controller owns
  # wholly under ServerSideApply, and the API server defaults PVC TypeMeta and
  # runtime status into each entry (apiVersion/kind/status.phase). Git can
  # never declare status, so Argo's ServerSideDiff (default with SSA since
  # v3.x) reports the StatefulSet perpetually OutOfSync with an empty visible
  # diff (card #114). volumeMode is declared in the chart instead of ignored,
  # so genuine Filesystem/Block drift still surfaces.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: mqtt
      namespace: mqtt
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]?.apiVersion
        - .spec.volumeClaimTemplates[]?.kind
        - .spec.volumeClaimTemplates[]?.status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
