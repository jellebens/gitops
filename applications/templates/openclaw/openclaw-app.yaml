apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: landing-zones
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  source:
    repoURL: https://github.com/jellebens/gitops.git
    targetRevision: main
    path: landingzones/openclaw
    helm:
      releaseName: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
