apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: coredns-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Core DNS plumbing — sync early so names resolve before workloads need them.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform-services
  sources:
    - repoURL: https://github.com/jellebens/gitops.git
      targetRevision: main
      path: platform/coredns-config
      helm:
        releaseName: coredns-config
        valueFiles:
          - $values/.config/shared/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/values.yaml
          - $values/.config/{{ .Values.environment | default "lab" }}/coredns-config.yaml
    - repoURL: https://github.com/jellebens/gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
