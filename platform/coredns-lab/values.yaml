# In-cluster CoreDNS acting as the AUTHORITATIVE PRIMARY for the lab.local zone
# (zone-in-git, served via the `file` plugin). The Synology DS918+ is now a
# SLAVE that AXFRs this zone (see corednsLab.transferTo). Because clients use
# this VIP as their primary resolver, the deployment is also a full recursive
# forwarder for everything else (catch-all `.` block -> corednsLab.upstreams).
# See README.md.
corednsLab:
  # Multi-arch image (arm64 cluster). file + transfer plugins are in the default build.
  image: coredns/coredns:1.11.3
  replicas: 3
  zone: lab.local
  # LoadBalancer VIP for LAN clients (DHCP hands this out as DNS1).
  # Set per-env; comes from the Cilium `platform` LB-IPAM pool (.180-.199).
  loadBalancerIP: ""
  # Secondaries allowed to pull the zone via AXFR and receive NOTIFY
  # (e.g. the DS918 slave). Set per-env in .config/<env>/coredns-lab.yaml.
  transferTo: []
  # Upstream resolvers for the catch-all (non-lab.local) queries: the router
  # answers home `.local` names and recurses to the internet; 1.1.1.1 is a
  # fallback. Set per-env.
  upstreams: []
  # Authoritative zone file (zone-in-git). BUMP the SOA serial on every change.
  # Set per-env in .config/<env>/coredns-lab.yaml.
  zoneFile: ""
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

# The kube-system `coredns-custom` ConfigMap is owned by the separate
# `coredns-config` app (it manages the per-FQDN forwards). Keep this OFF so two
# Argo apps don't fight over the same ConfigMap and wipe each other's keys. The
# lab.local -> primary forward is added to coredns-config instead.
clusterForward:
  enabled: false
