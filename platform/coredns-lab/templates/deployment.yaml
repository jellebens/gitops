apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns-lab
  namespace: kube-system
  labels:
    app.kubernetes.io/name: coredns-lab
    app.kubernetes.io/part-of: platform
spec:
  replicas: {{ .Values.corednsLab.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: coredns-lab
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coredns-lab
      annotations:
        # roll the pods when the Corefile or the zone file changes
        checksum/config: {{ toYaml .Values.corednsLab | sha256sum }}
    spec:
      # spread replicas across nodes so a single node loss keeps the replica up
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: coredns-lab
                topologyKey: kubernetes.io/hostname
      containers:
        - name: coredns
          image: {{ .Values.corednsLab.image }}
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - { name: dns, containerPort: 53, protocol: UDP }
            - { name: dns-tcp, containerPort: 53, protocol: TCP }
            - { name: health, containerPort: 8080, protocol: TCP }
            - { name: ready, containerPort: 8181, protocol: TCP }
            - { name: metrics, containerPort: 9153, protocol: TCP }
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet: { path: /ready, port: 8181 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
{{ toYaml .Values.corednsLab.resources | indent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              add: ["NET_BIND_SERVICE"]
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
            - name: zone
              mountPath: /etc/coredns-zones
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: coredns-lab
            items:
              - key: Corefile
                path: Corefile
        - name: zone
          configMap:
            name: coredns-lab-zone
