apiVersion: v1
kind: Service
metadata:
  name: coredns-lab
  namespace: kube-system
  labels:
    app.kubernetes.io/name: coredns-lab
    app.kubernetes.io/part-of: platform
    lb-pool: platform
  annotations:
    lbipam.cilium.io/ips: {{ required "corednsLab.loadBalancerIP is required" .Values.corednsLab.loadBalancerIP | quote }}
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: coredns-lab
  ports:
    - { name: dns, port: 53, targetPort: 53, protocol: UDP }
    - { name: dns-tcp, port: 53, targetPort: 53, protocol: TCP }
