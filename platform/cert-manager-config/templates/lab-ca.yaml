{{- if .Values.labCA.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.labCA.selfSignedIssuerName | quote }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.labCA.rootSecretName | quote }}
  namespace: cert-manager
spec:
  isCA: true
  commonName: {{ .Values.labCA.commonName | quote }}
  secretName: {{ .Values.labCA.rootSecretName | quote }}
  duration: {{ .Values.labCA.duration | quote }}
  renewBefore: {{ .Values.labCA.renewBefore | quote }}
  issuerRef:
    name: {{ .Values.labCA.selfSignedIssuerName | quote }}
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.labCA.caIssuerName | quote }}
spec:
  ca:
    secretName: {{ .Values.labCA.rootSecretName | quote }}
{{- end }}
