# Badger data volume. Standalone PVC (not a volumeClaimTemplate): the app is a
# single-replica Deployment, and a plain PVC avoids the StatefulSet
# volumeClaimTemplates ServerSideDiff pitfall (card #114) entirely.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jaeger-badger
  namespace: jaeger
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: platform
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.jaeger.persistence.storageClassName | quote }}
  volumeMode: Filesystem
  resources:
    requests:
      storage: {{ .Values.jaeger.persistence.size }}
