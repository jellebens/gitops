# InfluxDB admin token for the Grafana InfluxDB datasource. Mounted into Grafana
# as env INFLUXDB_TOKEN (grafana.envFromSecret) and referenced by the datasource
# as $INFLUXDB_TOKEN. Sealed copy of influxdb/influxdb-auth:admin-token.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-influxdb-token
  namespace: observability
spec:
  encryptedData:
    INFLUXDB_TOKEN: 
  template:
    metadata:
      name: grafana-influxdb-token
      namespace: observability
    type: Opaque
