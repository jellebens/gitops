# Admin credentials for InfluxDB, consumed by the influxdb2 chart's
# adminUser.existingSecret. Keys: admin-password, admin-token.
# The actual sealed values are provided per-environment in
# .config/<env>/influxdb-config.yaml.
secret:
  name: influxdb-auth
  namespace: influxdb
  sealedSecret:
    encryptedData: {}

# TLS cert (lab CA) for exposing InfluxDB on the shared gateway so Home Assistant
# (outside the cluster) can write to it. Secret consumed by the gateway listener.
tlsCertificate:
  enabled: true
  secretName: influxdb-server-tls
  commonName: influxdb.lab.local
  dnsNames:
    - influxdb.lab.local
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer

# Nightly `influx backup` to the NAS (smb StorageClass) — durable archive +
# disaster recovery + the migration vehicle to Proxmox/Ceph (see ADR-0009).
backup:
  enabled: true
  schedule: "30 3 * * *" # 03:30 daily (full backup)
  retentionDays: 14
  storageClass: smb
  size: 10Gi
  image: influxdb:2.7
  org: zeus
  # Incremental: hourly line-protocol/CSV export of the recent window per bucket
  # to the NAS, between the nightly fulls (tighter recovery point). InfluxDB OSS
  # has no native incremental; restore = restore the last full, then replay the
  # increments with `influx write --format csv` (idempotent, overlap-safe).
  incremental:
    enabled: true
    schedule: "5 * * * *" # hourly at :05
    windowMinutes: 75 # > 60 so consecutive runs overlap and never gap
    retentionDays: 3
    buckets:
      - zeus
      - homeassistant
