# Admin credentials for InfluxDB, consumed by the influxdb2 chart's
# adminUser.existingSecret. Keys: admin-password, admin-token.
# The actual sealed values are provided per-environment in
# .config/<env>/influxdb-config.yaml.
secret:
  name: influxdb-auth
  namespace: influxdb
  sealedSecret:
    encryptedData: {}

# TLS cert (lab CA) for exposing InfluxDB on the shared gateway so Home Assistant
# (outside the cluster) can write to it. Secret consumed by the gateway listener.
tlsCertificate:
  enabled: true
  secretName: influxdb-server-tls
  commonName: influxdb.lab.local
  dnsNames:
    - influxdb.lab.local
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer
