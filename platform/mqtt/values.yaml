# Platform MQTT broker — EMQX 3-node HA cluster (jupiter D1, owner signed off
# 2026-07-03). ONE broker for everything: Home Assistant's MQTT integration,
# zeus (transition), jupiter cells/services. Single-replica Mosquitto + PVC is
# the documented fallback if EMQX proves too heavy on the arm64 nodes.
#
# Stable address convention: every client connects to mqtt.lab.local:1883 — a
# Cilium LB-IPAM VIP from the `platform` pool — never a pod/node IP. The
# mqtt.lab.local A record lives in the zone-in-git (.config/<env>/coredns-lab.yaml).
#
# The broker is on telemetry/nudge paths ONLY, never on the battery actuation
# path (zeus/cell actuates Home Assistant directly on the site LAN).
mqtt:
  # Official multi-arch image (arm64 cluster). Pin the exact version.
  image: emqx/emqx:5.8.9
  # 3 nodes spread across k3s nodes: a single node loss keeps the broker up
  # (sessions, retained messages and the auth DB are replicated via mnesia).
  replicas: 3
  # LoadBalancer VIP from the Cilium `platform` LB-IPAM pool (.180-.199).
  # Set per-env in .config/<env>/mqtt.yaml; must match the mqtt.lab.local A record.
  loadBalancerIP: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  persistence:
    # Broker state (mnesia: retained messages, sessions, built-in auth DB)
    # needs POSIX/block semantics -> node-local storage like InfluxDB, NOT the
    # flaky SMB share. One PVC per replica via volumeClaimTemplates.
    storageClassName: local-path
    size: 1Gi

# Auth material — SealedSecret (controller `sealed-secrets`, ns `argocd`).
# Keys:
#   node-cookie        : Erlang cluster cookie shared by the 3 nodes
#   dashboard-password : EMQX dashboard `admin` user password
#   users.csv          : EMQX authn bootstrap file (header: user_id,password,is_superuser)
# Sealed values are set per-env in .config/<env>/mqtt.yaml. Until all keys are
# present the Secret does not exist and the StatefulSet stays Pending (same
# pattern as influxdb-auth).
secret:
  name: mqtt-auth
  sealedSecret:
    encryptedData: {}

# Git-managed ACL (authz) — DR durability for the per-user rules (card #156).
# The per-user ACLs are created at runtime via the admin REST API and live only
# in replicated mnesia (the built_in_database authz source). This ships a
# declarative fallback: platform/mqtt/files/acl.conf is rendered into a
# ConfigMap and subPath-mounted over the stock ${EMQX_ETC_DIR}/acl.conf, which
# is exactly where the live `file` authz source already points. It is
# NON-DISRUPTIVE on the running cluster: built_in_database is first in the authz
# chain and every live user's mnesia ruleset ends in `deny #`, so the file
# source is never consulted for connected clients — it only takes effect on a
# fresh cluster (empty mnesia), i.e. disaster recovery. Keep the rules in sync
# with the mnesia rules documented in README.md.
acl:
  enabled: true

# Scoped, INGRESS-ONLY CiliumNetworkPolicy (repo convention — see zeus):
# egress stays fully open; inbound is limited to MQTT 1883 (LAN + cluster),
# intra-cluster EMQX gossip/RPC, and the dashboard from inside the cluster.
networkPolicy:
  enabled: true

# Prometheus scrape (kube-prometheus-stack, ns observability). EMQX 5.8 serves
# Prometheus text at GET /api/v5/prometheus/stats on the dashboard listener
# (18083); that endpoint is unauthenticated (EMQX default, pinned explicitly in
# the StatefulSet) and reachable only in-cluster — the existing CNP allows
# 18083 from the `cluster` entity (which includes the Prometheus pods) and the
# LB exposes 1883 only. Scraped per pod via the headless service so each of the
# 3 cluster nodes is its own target.
serviceMonitor:
  enabled: true
  # Broker telemetry, not on the kiosk hot path — the global 30s cadence is fine
  # (zeus uses 15s for the near-real-time dashboard; this doesn't need it).
  interval: 30s
  # Prometheus selects ServiceMonitors with this label (serviceMonitorSelector).
  releaseLabel: kube-prometheus-stack

# USE-method alerting rules (kube-prometheus-stack picks these up by label).
prometheusRule:
  enabled: true
  releaseLabel: kube-prometheus-stack

# Grafana dashboard (USE method) provisioned as a ConfigMap, discovered by the
# kube-prometheus-stack Grafana dashboard sidecar (watches all namespaces).
dashboard:
  enabled: true
  # Label the sidecar watches for (kube-prometheus-stack default).
  sidecarLabel: grafana_dashboard
