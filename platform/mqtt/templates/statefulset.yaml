apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mqtt
  namespace: mqtt
  labels:
    app.kubernetes.io/name: mqtt
    app.kubernetes.io/part-of: platform
spec:
  replicas: {{ .Values.mqtt.replicas }}
  serviceName: mqtt-headless
  # Parallel: EMQX DNS discovery needs the peers resolvable while they boot;
  # ordered startup would deadlock the initial cluster formation.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: mqtt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mqtt
    spec:
      # Spread replicas across nodes so a single node loss keeps the broker up
      # (same pattern as coredns-lab).
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: mqtt
                topologyKey: kubernetes.io/hostname
      containers:
        - name: emqx
          image: {{ .Values.mqtt.image }}
          ports:
            - { name: mqtt, containerPort: 1883, protocol: TCP }
            - { name: dashboard, containerPort: 18083, protocol: TCP }
            - { name: ekka, containerPort: 4370, protocol: TCP }
            - { name: rpc, containerPort: 5370, protocol: TCP }
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Stable per-pod Erlang node name on the headless-service FQDN.
            - name: EMQX_NODE__NAME
              value: "emqx@$(POD_NAME).mqtt-headless.mqtt.svc.cluster.local"
            - name: EMQX_NODE__COOKIE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: node-cookie
            # Static cluster discovery via k8s DNS SRV records on the headless
            # service (no extra RBAC needed, unlike the k8s-API strategy).
            - name: EMQX_CLUSTER__DISCOVERY_STRATEGY
              value: "dns"
            - name: EMQX_CLUSTER__DNS__NAME
              value: "mqtt-headless.mqtt.svc.cluster.local"
            - name: EMQX_CLUSTER__DNS__RECORD_TYPE
              value: "srv"
            # MQTT auth: username/password against the built-in database,
            # seeded ONCE (at authenticator creation) from the sealed bootstrap
            # file. With an authenticator configured, anonymous clients are
            # denied by default — exactly the card's "default deny anonymous".
            - name: EMQX_AUTHENTICATION__1__MECHANISM
              value: "password_based"
            - name: EMQX_AUTHENTICATION__1__BACKEND
              value: "built_in_database"
            - name: EMQX_AUTHENTICATION__1__USER_ID_TYPE
              value: "username"
            - name: EMQX_AUTHENTICATION__1__BOOTSTRAP_FILE
              value: "/opt/emqx/auth/users.csv"
            - name: EMQX_AUTHENTICATION__1__BOOTSTRAP_TYPE
              value: "plain"
            # Dashboard `admin` password. The dashboard is NOT exposed outside
            # the cluster (no LB/HTTPRoute; reach it via kubectl port-forward).
            - name: EMQX_DASHBOARD__DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: dashboard-password
          readinessProbe:
            httpGet: { path: /status, port: 18083 }
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /status, port: 18083 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          resources:
{{ toYaml .Values.mqtt.resources | indent 12 }}
          volumeMounts:
            - name: data
              mountPath: /opt/emqx/data
            - name: auth-bootstrap
              mountPath: /opt/emqx/auth
              readOnly: true
      volumes:
        - name: auth-bootstrap
          secret:
            secretName: {{ .Values.secret.name }}
            items:
              - key: users.csv
                path: users.csv
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.mqtt.persistence.storageClassName | quote }}
        # Declared explicitly: volumeClaimTemplates is atomic under
        # ServerSideApply, so a server-defaulted volumeMode would keep the
        # ServerSideDiff comparison OutOfSync forever (card #114).
        volumeMode: Filesystem
        resources:
          requests:
            storage: {{ .Values.mqtt.persistence.size }}
