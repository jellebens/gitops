%%--------------------------------------------------------------------
%% mqtt platform broker — git-managed ACL (EMQX `file` authz source).
%%
%% WHY THIS FILE EXISTS (card #156 — DR durability):
%%   The per-user ACLs are created at runtime via the admin REST API and live
%%   ONLY in replicated mnesia (the `built_in_database` authz source). They
%%   survive pod restart / single-node loss, but a full 3-node cluster rebuild
%%   (fresh mnesia) would lose them. This file is the declarative, git-managed
%%   fallback that restores least-privilege authorization on a fresh cluster.
%%
%% HOW IT IS EVALUATED (non-disruptive by construction):
%%   The live authorization chain is, in order:
%%     1. built_in_database   (mnesia — the runtime per-user rules)
%%     2. file  ->  ${EMQX_ETC_DIR}/acl.conf   (THIS FILE)
%%   with authorization.no_match = allow. EMQX walks sources top-to-bottom and
%%   stops at the FIRST source that yields a match. Every live user's mnesia
%%   ruleset ends in an explicit `deny #` catch-all, so on the running cluster
%%   the built_in_database source is ALWAYS terminal for every connected client
%%   and this file is never consulted for them — replacing the default acl.conf
%%   content therefore cannot change any live client's authorization outcome.
%%   On a fresh DR cluster mnesia is empty, built_in_database matches nothing,
%%   and these rules take effect — restoring the same least-privilege grants.
%%
%%   Rules are matched top-to-bottom; first match wins. Keep in sync with the
%%   mnesia rules documented in platform/mqtt/README.md ("Per-client user
%%   management"). When you add/change a runtime ACL via the REST API, mirror
%%   it here so DR stays faithful.
%%
%% NOTE: EMQX treats the `path` file as immutable (read-only). Runtime edits go
%%   to data/authz/acl.conf instead; this file is the boot-time source of truth.
%%--------------------------------------------------------------------

%%==================================================================
%% EMQX system rules (preserved verbatim from the stock acl.conf).
%% Guard the dashboard's $SYS access, allow node-local admin, and block
%% the naked-wildcard firehose subscriptions. Do NOT remove.
%%==================================================================
{allow, {username, {re, "^dashboard$"}}, subscribe, ["$SYS/#"]}.

{allow, {ipaddr, "127.0.0.1"}, all, ["$SYS/#", "#"]}.

{deny, all, subscribe, ["$SYS/#", {eq, "#"}, {eq, "+/#"}]}.

%%==================================================================
%% Per-client least-privilege grants (DR mirror of the mnesia rules).
%%==================================================================

%% homeassistant — Home Assistant's MQTT integration.
{allow, {username, "homeassistant"}, all, ["homeassistant/#"]}.
{allow, {username, "homeassistant"}, all, ["zeus/#"]}.
{deny,  {username, "homeassistant"}, all, ["#"]}.

%% zeus-mqtt — the zeus battery optimizer.
{allow, {username, "zeus-mqtt"}, all, ["homeassistant/#"]}.
{allow, {username, "zeus-mqtt"}, all, ["zeus/#"]}.
{deny,  {username, "zeus-mqtt"}, all, ["#"]}.

%% cell-tervuren — the live tervuren lar/cell (jupiter). The
%% `subscribe zeus/tervuren/commander` grant is what the single-controller
%% interlock needs to read zeus's commander heartbeat (card #139/#153 fix).
{allow, {username, "cell-tervuren"}, all, ["jupiter/tervuren/#"]}.
{allow, {username, "cell-tervuren"}, subscribe, ["zeus/tervuren/commander"]}.
{deny,  {username, "cell-tervuren"}, all, ["#"]}.

%% reporting — the central fleet-reporting/savings service (jupiter
%% reporting-service, gitops card #161-F). SUBSCRIBE-ONLY across all sites: it
%% consumes every lar's retained plan + heartbeat to re-expose jupiter_reporting_*
%% gauges. It PUBLISHES nothing (pure consumer, never on any actuation path),
%% so only a subscribe grant is given — no publish, no other topic. The `+`
%% single-level wildcard covers all present + future sites without an ACL change.
{allow, {username, "reporting"}, subscribe, ["jupiter/+/plan", "jupiter/+/heartbeat"]}.
{deny,  {username, "reporting"}, all, ["#"]}.

%%==================================================================
%% Default-deny fallback. Replaces the stock `{allow, all}.` — any
%% authenticated client without an explicit grant above (or a matching
%% mnesia rule) is denied. mqtt-admin is a built-in-DB superuser and
%% bypasses authz entirely, so it is unaffected by this rule.
%%==================================================================
{deny, all}.
