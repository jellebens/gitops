{{- range .Values.routes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/part-of: platform
spec:
  parentRefs:
    {{- $listeners := .listeners | default (list $.Values.gateway.listenerName) }}
    {{- range $ln := $listeners }}
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.gateway.namespace }}
      sectionName: {{ $ln }}
    {{- end }}
  hostnames:
    {{- toYaml .hostnames | nindent 4 }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path | default "/" }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .backend.name }}
          port: {{ .backend.port }}
          weight: 1
{{- end }}
