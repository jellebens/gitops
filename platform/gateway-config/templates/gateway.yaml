apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.gateway.name }}
    app.kubernetes.io/part-of: platform
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  {{- with .Values.gateway.annotations }}
  infrastructure:
    annotations:
      {{- toYaml . | nindent 6 }}
  {{- end }}
  listeners:
    - name: {{ .Values.gateway.listenerName }}
      protocol: HTTP
      port: {{ .Values.gateway.listenerPort }}
      allowedRoutes:
        namespaces:
          from: All
    {{- if .Values.gateway.https.enabled }}
    - name: {{ .Values.gateway.https.listenerName }}
      protocol: HTTPS
      port: {{ .Values.gateway.https.listenerPort }}
      {{- with .Values.gateway.https.hostname }}
      hostname: {{ . | quote }}
      {{- end }}
      tls:
        mode: {{ .Values.gateway.https.tls.mode | default "Terminate" }}
        certificateRefs:
          {{- toYaml .Values.gateway.https.tls.certificateRefs | nindent 10 }}
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
    {{- range .Values.gateway.additionalHttpsListeners }}
    - name: {{ .name }}
      protocol: HTTPS
      port: {{ .port | default 443 }}
      {{- with .hostname }}
      hostname: {{ . | quote }}
      {{- end }}
      tls:
        mode: {{ .tls.mode | default "Terminate" }}
        certificateRefs:
          {{- toYaml .tls.certificateRefs | nindent 10 }}
      allowedRoutes:
        namespaces:
          from: All
    {{- end }}
