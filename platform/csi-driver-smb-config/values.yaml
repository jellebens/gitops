# SMB-backed StorageClass for NAS001 (csi-driver-smb). Each PVC gets a subdir
# under the share, so this is reusable cluster-wide.
storageClass:
  name: smb
  # NAS001 = 192.168.50.102 (the name 'nas001' does not resolve in-cluster).
  source: //192.168.50.102/zeus-data
  reclaimPolicy: Retain        # keep NAS data when a PVC is deleted
  # SMB mount maps files to this uid/gid (zeus runs as 1000).
  uid: 1000
  gid: 1000

secret:
  name: smbcreds
  namespace: kube-system
  sealedSecret:
    # Filled per-env (.config/<env>/csi-driver-smb-config.yaml) from kubeseal:
    #   { username: "Ag...", password: "Ag..." }
    encryptedData: {}

# Additional StorageClasses sharing the same SMB credentials/share. Each entry
# renders one StorageClass; the CSI driver gives every PVC its own subdirectory
# under `source`, so consumers stay isolated even on a shared share.
# Example:
#   - name: smb-hermes
#     source: //192.168.50.102/zeus-data
#     reclaimPolicy: Retain
#     uid: 10000
#     gid: 10000
extraStorageClasses: []
