# SMB-backed StorageClass for NAS001 (csi-driver-smb). Each PVC gets a subdir
# under the share, so this is reusable cluster-wide.
storageClass:
  name: smb
  # NAS001 — addressed by name (resolves in-cluster via coredns-config, which
  # forwards nas001.lab.local -> 192.168.50.144 -> 192.168.50.2). The old static
  # IP 192.168.50.102 went stale when the NAS got a new DHCP lease.
  source: //nas001.lab.local/zeus-data
  reclaimPolicy: Retain        # keep NAS data when a PVC is deleted
  # SMB mount maps files to this uid/gid (zeus runs as 1000).
  uid: 1000
  gid: 1000

secret:
  name: smbcreds
  namespace: kube-system
  sealedSecret:
    # Filled per-env (.config/<env>/csi-driver-smb-config.yaml) from kubeseal:
    #   { username: "Ag...", password: "Ag..." }
    encryptedData: {}

# Additional SMB credential secrets (sealed), e.g. a dedicated per-tenant NAS
# user. Each entry renders one SealedSecret. Referenced by extraStorageClasses
# via secretName/secretNamespace to keep tenants strictly separated.
# Example:
#   - name: cortana-smbcreds
#     namespace: kube-system
#     sealedSecret:
#       encryptedData: { username: "Ag...", password: "Ag..." }
extraSecrets: []

# Additional StorageClasses. Each entry renders one StorageClass; the CSI driver
# gives every PVC its own subdirectory under `source`. Set secretName/
# secretNamespace to use dedicated credentials (defaults to the shared secret).
# Example:
#   - name: smb-cortana
#     source: //192.168.50.102/cortana-backup
#     reclaimPolicy: Retain
#     uid: 10000
#     gid: 10000
#     secretName: cortana-smbcreds
#     secretNamespace: kube-system
extraStorageClasses: []
