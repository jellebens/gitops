apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    lb-pool: infra
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.50.180
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: https
      port: 443
      targetPort: 8080